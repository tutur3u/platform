x-web-service: &web-service
  build:
    context: ..
    dockerfile: apps/web/Dockerfile
    target: runner
    cache_from:
      - ${DOCKER_WEB_CACHE_WEB_FROM:-}
    cache_to:
      - ${DOCKER_WEB_CACHE_WEB_TO:-}
    args:
      DOCKER_WEB_BUILD_MEMORY: ${DOCKER_WEB_BUILD_MEMORY:-12g}
      DOCKER_WEB_BUILD_MAX_PARALLELISM: ${DOCKER_WEB_BUILD_MAX_PARALLELISM:-1}
      DOCKER_WEB_DOCKER_MEMORY_LIMIT: ${DOCKER_WEB_DOCKER_MEMORY_LIMIT:-}
      DOCKER_WEB_NEXT_APP_ONLY: ${DOCKER_WEB_NEXT_APP_ONLY:-1}
      DOCKER_WEB_NEXT_BUILD_ENGINE: ${DOCKER_WEB_NEXT_BUILD_ENGINE:-turbopack}
      DOCKER_WEB_NODE_MAX_OLD_SPACE_SIZE: ${DOCKER_WEB_NODE_MAX_OLD_SPACE_SIZE:-auto}
      DOCKER_WEB_REACT_COMPILER: ${DOCKER_WEB_REACT_COMPILER:-1}
      DOCKER_WEB_TURBO_CONCURRENCY: ${DOCKER_WEB_TURBO_CONCURRENCY:-}
      PLATFORM_BUILD_BUILT_AT: ${PLATFORM_BUILD_BUILT_AT:-}
      PLATFORM_BUILD_COMMIT_HASH: ${PLATFORM_BUILD_COMMIT_HASH:-}
      PLATFORM_BUILD_COMMIT_MESSAGE: ${PLATFORM_BUILD_COMMIT_MESSAGE:-}
      PLATFORM_BUILD_COMMIT_SHORT_HASH: ${PLATFORM_BUILD_COMMIT_SHORT_HASH:-}
      PLATFORM_BUILD_DEPLOYMENT_STAMP: ${PLATFORM_BUILD_DEPLOYMENT_STAMP:-}
      PLATFORM_BUILD_DEPLOYMENT_URL: ${PLATFORM_BUILD_DEPLOYMENT_URL:-}
      PLATFORM_BUILD_ENVIRONMENT: ${PLATFORM_BUILD_ENVIRONMENT:-}
      PLATFORM_BUILD_REF_NAME: ${PLATFORM_BUILD_REF_NAME:-}
    secrets:
      - web_env
      - turbo_team
      - turbo_token
  env_file:
    - path: ${DOCKER_WEB_COMPOSE_LEGACY_ENV_FILE:-../apps/web/.env.local}
      required: false
    - path: ${DOCKER_WEB_COMPOSE_ENV_FILE:-../.env.local}
      required: false
  environment: &web-environment
    - BACKEND_INTERNAL_TOKEN
    - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:7820}
    - CHAT_REALTIME_INTERNAL_URL=${CHAT_REALTIME_INTERNAL_URL:-http://chat-realtime:7817}
    - CHAT_REALTIME_TOKEN_SECRET
    - CRON_SECRET
    - DISCORD_APP_DEPLOYMENT_URL
    - DRIVE_AUTO_EXTRACT_PROXY_TOKEN
    - DRIVE_AUTO_EXTRACT_PROXY_URL
    - HIVE_DATABASE_URL=${HIVE_DATABASE_URL:-postgres://hive:hive@hive-postgres:5432/hive}
    - HIVE_OLLAMA_BASE_URL=${HIVE_OLLAMA_BASE_URL:-http://hive-ollama:11434}
    - HIVE_REALTIME_TOKEN_SECRET
    - HIVE_REALTIME_URL=${HIVE_REALTIME_URL:-http://hive-realtime:7815/realtime}
    - HOSTNAME=0.0.0.0
    - INTERNAL_WEB_API_ORIGIN
    - MARKITDOWN_ENDPOINT_SECRET
    - MARKITDOWN_ENDPOINT_URL
    - MEET_REALTIME_TOKEN_SECRET
    - MEET_REALTIME_URL=${MEET_REALTIME_URL:-wss://meet.tuturuuu.com/realtime}
    - NEXT_PUBLIC_HIVE_REALTIME_URL=${NEXT_PUBLIC_HIVE_REALTIME_URL:-wss://hive.tuturuuu.com/realtime}
    - NEXT_PUBLIC_MEET_REALTIME_URL=${NEXT_PUBLIC_MEET_REALTIME_URL:-wss://meet.tuturuuu.com/realtime}
    - NEXT_TELEMETRY_DISABLED=1
    - NODE_ENV=production
    - PORT=7803
    - __NEXT_PRIVATE_ORIGIN=${DOCKER_WEB_NEXT_PRIVATE_ORIGIN:-http://127.0.0.1:7803}
    - PLATFORM_BLUE_GREEN_COLOR
    - PLATFORM_BUILD_BUILT_AT
    - PLATFORM_BUILD_COMMIT_HASH
    - PLATFORM_BUILD_COMMIT_MESSAGE
    - PLATFORM_BUILD_COMMIT_SHORT_HASH
    - PLATFORM_BUILD_DEPLOYMENT_STAMP
    - PLATFORM_BUILD_DEPLOYMENT_URL
    - PLATFORM_BUILD_ENVIRONMENT
    - PLATFORM_BUILD_REF_NAME
    - PLATFORM_BLUE_GREEN_CONTROL_DIR=/app/runtime/docker-web-control
    - PLATFORM_BLUE_GREEN_MONITORING_DIR=/app/runtime/docker-web
    - PLATFORM_DEPLOYMENT_STAMP
    - PLATFORM_DOCKER_CONTROL_TOKEN
    - PLATFORM_DOCKER_CONTROL_URL=${PLATFORM_DOCKER_CONTROL_URL:-http://web-docker-control:7810}
    - PLATFORM_LOG_DRAIN_DATABASE_URL=postgres://platform_log_drain:platform_log_drain@log-drain-postgres:5432/platform_log_drain
    - PLATFORM_LOG_DRAIN_ENABLED=${PLATFORM_LOG_DRAIN_ENABLED:-true}
    - PLATFORM_LOG_DRAIN_RAW_RETENTION_DAYS=${PLATFORM_LOG_DRAIN_RAW_RETENTION_DAYS:-30}
    - PLATFORM_LOG_DRAIN_SUMMARY_RETENTION_DAYS=${PLATFORM_LOG_DRAIN_SUMMARY_RETENTION_DAYS:-90}
    - SUPABASE_SERVER_URL
    - SUPERMEMORY_API_KEY
    - SUPERMEMORY_BASE_URL=${SUPERMEMORY_BASE_URL:-http://supermemory:8787}
    - SUPERMEMORY_ENABLED=${SUPERMEMORY_ENABLED:-false}
    - SUPERMEMORY_FAIL_OPEN=${SUPERMEMORY_FAIL_OPEN:-true}
    - SUPERMEMORY_TIMEOUT_MS=${SUPERMEMORY_TIMEOUT_MS:-1500}
    - UPSTASH_REDIS_REST_TOKEN
    - UPSTASH_REDIS_REST_URL
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test:
      [
        "CMD-SHELL",
        'node -e "fetch(''http://127.0.0.1:'' + (process.env.PORT || 7803) + ''/__platform/drain-status'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
      ]
    interval: 30s
    timeout: 5s
    start_period: 10s
    retries: 3
  init: true
  restart: unless-stopped
  volumes:
    - ../tmp/docker-web/watch/control:/app/runtime/docker-web-control
    - ../tmp/docker-web:/app/runtime/docker-web:ro

x-tanstack-web-service: &tanstack-web-service
  build:
    context: ..
    dockerfile: apps/tanstack-web/Dockerfile
    target: runner
    cache_from:
      - ${DOCKER_WEB_CACHE_TANSTACK_FROM:-}
    cache_to:
      - ${DOCKER_WEB_CACHE_TANSTACK_TO:-}
    secrets:
      - turbo_team
      - turbo_token
  env_file:
    - path: ${DOCKER_WEB_COMPOSE_LEGACY_ENV_FILE:-../apps/web/.env.local}
      required: false
    - path: ${DOCKER_WEB_COMPOSE_ENV_FILE:-../.env.local}
      required: false
  environment:
    - BACKEND_INTERNAL_TOKEN
    - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:7820}
    - BACKEND_PUBLIC_ORIGIN=${BACKEND_PUBLIC_ORIGIN:-http://backend:7820}
    - HOST=0.0.0.0
    - NODE_ENV=production
    - PLATFORM_BLUE_GREEN_COLOR
    - PLATFORM_DEPLOYMENT_STAMP
    - PORT=7824
  extra_hosts:
    - "host.docker.internal:host-gateway"
  expose:
    - "7824"
  healthcheck:
    test:
      [
        "CMD",
        "node",
        "docker/healthcheck.mjs",
      ]
    interval: 30s
    timeout: 5s
    start_period: 10s
    retries: 3
  init: true
  restart: unless-stopped
  depends_on:
    backend:
      condition: service_healthy

services:
  web:
    <<: *web-service
    ports:
      - "127.0.0.1:${DOCKER_WEB_DIRECT_HOST_PORT:-7803}:7803"

  web-blue:
    <<: *web-service

  web-green:
    <<: *web-service

  tanstack-web:
    <<: *tanstack-web-service
    ports:
      - "127.0.0.1:${DOCKER_TANSTACK_WEB_DIRECT_HOST_PORT:-7824}:7824"

  tanstack-web-blue:
    <<: *tanstack-web-service

  tanstack-web-green:
    <<: *tanstack-web-service
