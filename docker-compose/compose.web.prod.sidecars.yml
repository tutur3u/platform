x-hive-service: &hive-service
  build:
    context: ..
    dockerfile: apps/hive/Dockerfile
    target: runner
    secrets:
      - web_env
  env_file:
    - path: ${DOCKER_WEB_COMPOSE_LEGACY_ENV_FILE:-../apps/web/.env.local}
      required: false
    - path: ${DOCKER_WEB_COMPOSE_ENV_FILE:-../.env.local}
      required: false
  environment:
    - HIVE_DATABASE_URL=${HIVE_DATABASE_URL:-postgres://hive:hive@hive-postgres:5432/hive}
    - HIVE_OLLAMA_BASE_URL=${HIVE_OLLAMA_BASE_URL:-http://hive-ollama:11434}
    - HIVE_REALTIME_TOKEN_SECRET
    - HIVE_REALTIME_URL=${HIVE_REALTIME_URL:-http://hive-realtime:7815/realtime}
    - HOSTNAME=0.0.0.0
    - INTERNAL_WEB_API_ORIGIN=${INTERNAL_WEB_API_ORIGIN:-http://web-proxy:7803}
    - NEXT_PUBLIC_HIVE_REALTIME_URL=${NEXT_PUBLIC_HIVE_REALTIME_URL:-wss://hive.tuturuuu.com/realtime}
    - NEXT_TELEMETRY_DISABLED=1
    - NODE_ENV=production
    - PLATFORM_BLUE_GREEN_COLOR
    - PLATFORM_DEPLOYMENT_STAMP
    - PORT=7814
    - SUPABASE_SERVER_URL
  expose:
    - "7814"
  healthcheck:
    test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:7814/login').then((response) => process.exit(response.status < 500 ? 0 : 1)).catch(() => process.exit(1))\""]
    interval: 30s
    timeout: 5s
    start_period: 10s
    retries: 3
  init: true
  restart: unless-stopped
  depends_on:
    hive-db-migrate:
      condition: service_completed_successfully

services:
  hive-postgres:
    container_name: ${COMPOSE_PROJECT_NAME:-tuturuuu}-hive-postgres-1
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_USER: hive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d hive"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"
    volumes:
      - platform-hive-postgres:/var/lib/postgresql/data
      - ../apps/hive/db/001_schema.sql:/docker-entrypoint-initdb.d/001-hive.sql:ro

  hive-db-migrate:
    image: postgres:16-alpine
    command: ["/bin/sh", "/hive-db/migrate-forward.sh"]
    env_file:
      - path: ${DOCKER_WEB_COMPOSE_LEGACY_ENV_FILE:-../apps/web/.env.local}
        required: false
      - path: ${DOCKER_WEB_COMPOSE_ENV_FILE:-../.env.local}
        required: false
    environment:
      - HIVE_DATABASE_URL=${HIVE_DATABASE_URL:-postgres://hive:hive@hive-postgres:5432/hive}
      - HIVE_DB_ALLOW_DESTRUCTIVE_RESET=${HIVE_DB_ALLOW_DESTRUCTIVE_RESET:-0}
      - HIVE_DB_DEVOPS_ADMIN_APPROVED=${HIVE_DB_DEVOPS_ADMIN_APPROVED:-0}
      - HIVE_DB_OPERATOR_ROLE=${HIVE_DB_OPERATOR_ROLE:-runtime}
    depends_on:
      hive-postgres:
        condition: service_healthy
    restart: "no"
    volumes:
      - ../apps/hive/db:/hive-db:ro

  hive-ollama:
    profiles: ["hive-ollama"]
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - platform-hive-ollama:/root/.ollama

  markitdown:
    build:
      context: ../apps/discord
      dockerfile: Dockerfile.markitdown
    environment:
      - PORT=8000
      - SUPABASE_URL
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    init: true

  storage-unzip-proxy:
    build:
      context: ../apps/storage-unzip-proxy
    environment:
      - DRIVE_UNZIP_PROXY_SHARED_TOKEN
      - PORT=8788
    expose:
      - "8788"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8788/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    init: true

  hive-realtime:
    build:
      context: ..
      dockerfile: apps/hive-realtime/Dockerfile
    env_file:
      - path: ${DOCKER_WEB_COMPOSE_LEGACY_ENV_FILE:-../apps/web/.env.local}
        required: false
      - path: ${DOCKER_WEB_COMPOSE_ENV_FILE:-../.env.local}
        required: false
    environment:
      - HIVE_DATABASE_URL=${HIVE_DATABASE_URL:-postgres://hive:hive@hive-postgres:5432/hive}
      - HIVE_REALTIME_TOKEN_SECRET
      - NODE_ENV=production
      - PORT=7815
    expose:
      - "7815"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:7815/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    init: true
    restart: unless-stopped
    depends_on:
      hive-db-migrate:
        condition: service_completed_successfully

  hive-blue:
    <<: *hive-service

  hive-green:
    <<: *hive-service
