services:
  buildkit:
    command:
      [
        "--addr",
        "tcp://0.0.0.0:1234",
        "--config",
        "/etc/buildkit/buildkitd.toml",
      ]
    container_name: ${COMPOSE_PROJECT_NAME:-tuturuuu}-buildkit-1
    cpus: ${DOCKER_WEB_BUILD_CPUS:-4}
    healthcheck:
      test: ["CMD", "buildctl", "--addr", "tcp://127.0.0.1:1234", "debug", "workers"]
      interval: 10s
      timeout: 5s
      retries: 5
    image: moby/buildkit:buildx-stable-1
    mem_limit: ${DOCKER_WEB_BUILD_MEMORY:-12g}
    privileged: true
    ports:
      - "127.0.0.1:${DOCKER_WEB_BUILDKIT_PORT:-7914}:1234"
    volumes:
      - platform-buildkit-state:/var/lib/buildkit
      - ./tmp/docker-web/buildkit/buildkitd.toml:/etc/buildkit/buildkitd.toml:ro
