services:
  buildkit:
    command:
      [
        "--addr",
        "tcp://0.0.0.0:1234",
        "--config",
        "/etc/buildkit/buildkitd.toml",
      ]
    container_name: ${COMPOSE_PROJECT_NAME:-tuturuuu}-buildkit-1
    cpus: ${DOCKER_WEB_BUILD_CPUS:-4}
    healthcheck:
      test:
        [
          "CMD",
          "buildctl",
          "--addr",
          "tcp://127.0.0.1:1234",
          "debug",
          "workers",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    image: moby/buildkit:buildx-stable-1
    mem_limit: ${DOCKER_WEB_BUILD_MEMORY:-12g}
    privileged: true
    ports:
      - "127.0.0.1:${DOCKER_WEB_BUILDKIT_PORT:-7914}:1234"
    volumes:
      - platform-buildkit-state:/var/lib/buildkit
      - ./tmp/docker-web/buildkit/buildkitd.toml:/etc/buildkit/buildkitd.toml:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    command: ["bun", "run", "dev:web"]
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - BACKEND_INTERNAL_TOKEN=${BACKEND_INTERNAL_TOKEN:-platform-local-backend-token}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:7820}
      - CHAT_REALTIME_INTERNAL_URL=${CHAT_REALTIME_INTERNAL_URL:-http://chat-realtime:7817}
      - CHAT_REALTIME_TOKEN_SECRET
      - CHOKIDAR_INTERVAL=1000
      - CHOKIDAR_USEPOLLING=1
      - HOSTNAME=0.0.0.0
      - HIVE_DATABASE_URL=${HIVE_DATABASE_URL:-postgres://hive:hive@hive-postgres:5432/hive}
      - HIVE_OLLAMA_BASE_URL=${HIVE_OLLAMA_BASE_URL:-http://hive-ollama:11434}
      - HIVE_REALTIME_URL=${HIVE_REALTIME_URL:-http://hive-realtime:7815/realtime}
      - NEXT_PUBLIC_HIVE_REALTIME_URL=${NEXT_PUBLIC_HIVE_REALTIME_URL:-ws://localhost:7815/realtime}
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_ENV=development
      - PORT=7803
      - __NEXT_PRIVATE_ORIGIN=${DOCKER_WEB_NEXT_PRIVATE_ORIGIN:-http://127.0.0.1:7803}
      - PLATFORM_LOG_DRAIN_DATABASE_URL=postgres://platform_log_drain:platform_log_drain@log-drain-postgres:5432/platform_log_drain
      - PLATFORM_LOG_DRAIN_ENABLED=${PLATFORM_LOG_DRAIN_ENABLED:-true}
      - PLATFORM_LOG_DRAIN_RAW_RETENTION_DAYS=${PLATFORM_LOG_DRAIN_RAW_RETENTION_DAYS:-30}
      - PLATFORM_LOG_DRAIN_SUMMARY_RETENTION_DAYS=${PLATFORM_LOG_DRAIN_SUMMARY_RETENTION_DAYS:-90}
      - TSC_WATCHDIRECTORY=DynamicPriorityPolling
      - TSC_WATCHFILE=DynamicPriorityPolling
      - WATCHPACK_POLLING=true
      - SUPABASE_SERVER_URL
      - UPSTASH_REDIS_REST_TOKEN
      - UPSTASH_REDIS_REST_URL
      - VALSEA_PRONUNCIATION_ASSESSOR_URL=${VALSEA_PRONUNCIATION_ASSESSOR_URL:-http://pronunciation-assessor:8010/assess}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    ports:
      - "7803:7803"
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - platform-bun-install:/root/.bun/install/cache
      # Root workspace dependencies and package-local artifacts stay inside
      # container-managed volumes so host installs cannot shadow them.
      - platform-web-next:/workspace/apps/web/.next
      - platform-web-app-node_modules:/workspace/apps/web/node_modules
      - platform-web-node_modules:/workspace/node_modules
      - platform-web-ai-node_modules:/workspace/packages/ai/node_modules
      - platform-web-ai-dist:/workspace/packages/ai/dist
      - platform-web-apis-node_modules:/workspace/packages/apis/node_modules
      - platform-web-apis-dist:/workspace/packages/apis/dist
      - platform-web-auth-node_modules:/workspace/packages/auth/node_modules
      - platform-web-auth-dist:/workspace/packages/auth/dist
      - platform-web-devbox-node_modules:/workspace/packages/devbox/node_modules
      - platform-web-devbox-dist:/workspace/packages/devbox/dist
      - platform-web-education-core-node_modules:/workspace/packages/education-core/node_modules
      - platform-web-education-core-dist:/workspace/packages/education-core/dist
      - platform-web-finance-core-node_modules:/workspace/packages/finance-core/node_modules
      - platform-web-finance-core-dist:/workspace/packages/finance-core/dist
      - platform-web-email-service-node_modules:/workspace/packages/email-service/node_modules
      - platform-web-email-service-dist:/workspace/packages/email-service/dist
      - platform-web-games-node_modules:/workspace/packages/games/node_modules
      - platform-web-games-dist:/workspace/packages/games/dist
      - platform-web-google-node_modules:/workspace/packages/google/node_modules
      - platform-web-google-dist:/workspace/packages/google/dist
      - platform-web-hive-ui-node_modules:/workspace/packages/hive-ui/node_modules
      - platform-web-hive-ui-dist:/workspace/packages/hive-ui/dist
      - platform-web-hooks-node_modules:/workspace/packages/hooks/node_modules
      - platform-web-hooks-dist:/workspace/packages/hooks/dist
      - platform-web-icons-node_modules:/workspace/packages/icons/node_modules
      - platform-web-icons-dist:/workspace/packages/icons/dist
      - platform-web-internal-api-node_modules:/workspace/packages/internal-api/node_modules
      - platform-web-internal-api-dist:/workspace/packages/internal-api/dist
      - platform-web-inventory-core-node_modules:/workspace/packages/inventory-core/node_modules
      - platform-web-inventory-core-dist:/workspace/packages/inventory-core/dist
      - platform-web-storage-core-node_modules:/workspace/packages/storage-core/node_modules
      - platform-web-storage-core-dist:/workspace/packages/storage-core/dist
      - platform-web-masonry-node_modules:/workspace/packages/masonry/node_modules
      - platform-web-masonry-dist:/workspace/packages/masonry/dist
      - platform-web-microsoft-node_modules:/workspace/packages/microsoft/node_modules
      - platform-web-microsoft-dist:/workspace/packages/microsoft/dist
      - platform-web-mind-core-node_modules:/workspace/packages/mind-core/node_modules
      - platform-web-mind-core-dist:/workspace/packages/mind-core/dist
      - platform-web-mind-ui-node_modules:/workspace/packages/mind-ui/node_modules
      - platform-web-mind-ui-dist:/workspace/packages/mind-ui/dist
      - platform-web-offline-node_modules:/workspace/packages/offline/node_modules
      - platform-web-offline-dist:/workspace/packages/offline/dist
      - platform-web-payment-node_modules:/workspace/packages/payment/node_modules
      - platform-web-payment-dist:/workspace/packages/payment/dist
      - platform-web-realtime-node_modules:/workspace/packages/realtime/node_modules
      - platform-web-realtime-dist:/workspace/packages/realtime/dist
      - platform-web-satellite-node_modules:/workspace/packages/satellite/node_modules
      - platform-web-satellite-dist:/workspace/packages/satellite/dist
      - platform-web-sdk-node_modules:/workspace/packages/sdk/node_modules
      - platform-web-sdk-dist:/workspace/packages/sdk/dist
      - platform-web-supabase-node_modules:/workspace/packages/supabase/node_modules
      - platform-web-supabase-dist:/workspace/packages/supabase/dist
      - platform-web-turbo:/workspace/.turbo
      - platform-web-transactional-node_modules:/workspace/packages/transactional/node_modules
      - platform-web-transactional-dist:/workspace/packages/transactional/dist
      - platform-web-trigger-node_modules:/workspace/packages/trigger/node_modules
      - platform-web-trigger-dist:/workspace/packages/trigger/dist
      - platform-web-turnstile-node_modules:/workspace/packages/turnstile/node_modules
      - platform-web-turnstile-dist:/workspace/packages/turnstile/dist
      - platform-web-types-node_modules:/workspace/packages/types/node_modules
      - platform-web-types-dist:/workspace/packages/types/dist
      - platform-web-typescript-config-node_modules:/workspace/packages/typescript-config/node_modules
      - platform-web-typescript-config-dist:/workspace/packages/typescript-config/dist
      - platform-web-ui-node_modules:/workspace/packages/ui/node_modules
      - platform-web-ui-dist:/workspace/packages/ui/dist
      - platform-web-utils-node_modules:/workspace/packages/utils/node_modules
      - platform-web-utils-dist:/workspace/packages/utils/dist
      - platform-web-vercel-node_modules:/workspace/packages/vercel/node_modules
      - platform-web-vercel-dist:/workspace/packages/vercel/dist
      - platform-web-workflows-node_modules:/workspace/packages/workflows/node_modules
      - platform-web-workflows-dist:/workspace/packages/workflows/dist
    depends_on:
      hive-db-migrate:
        condition: service_completed_successfully
      log-drain-postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - BACKEND_ENV=development
      - BACKEND_INTERNAL_TOKEN=${BACKEND_INTERNAL_TOKEN:-platform-local-backend-token}
      - PORT=7820
    healthcheck:
      test: ["CMD", "/app/backend", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    init: true
    ports:
      - "7820:7820"

  tanstack-web:
    build:
      context: .
      dockerfile: apps/tanstack-web/Dockerfile
      target: dev
    command: ["bun", "run", "--filter", "@tuturuuu/tanstack-web", "dev:app"]
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - BACKEND_INTERNAL_TOKEN=${BACKEND_INTERNAL_TOKEN:-platform-local-backend-token}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:7820}
      - BACKEND_PUBLIC_ORIGIN=${BACKEND_PUBLIC_ORIGIN:-http://backend:7820}
      - HOST=0.0.0.0
      - NODE_ENV=development
      - PORT=7824
      - TANSTACK_WEB_E2E_BASE_URL=${TANSTACK_WEB_E2E_BASE_URL:-https://tanstack.tuturuuu.localhost}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    ports:
      - "7824:7824"
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - platform-bun-install:/root/.bun/install/cache
      - platform-tanstack-web-node_modules:/workspace/apps/tanstack-web/node_modules
      - platform-tanstack-web-output:/workspace/apps/tanstack-web/.output
      - platform-web-node_modules:/workspace/node_modules
      - platform-web-internal-api-dist:/workspace/packages/internal-api/dist
      - platform-web-internal-api-node_modules:/workspace/packages/internal-api/node_modules
      - platform-web-inventory-core-dist:/workspace/packages/inventory-core/dist
      - platform-web-inventory-core-node_modules:/workspace/packages/inventory-core/node_modules
      - platform-web-storage-core-dist:/workspace/packages/storage-core/dist
      - platform-web-storage-core-node_modules:/workspace/packages/storage-core/node_modules
      - platform-web-mind-core-dist:/workspace/packages/mind-core/dist
      - platform-web-mind-core-node_modules:/workspace/packages/mind-core/node_modules
      - platform-web-types-dist:/workspace/packages/types/dist
      - platform-web-types-node_modules:/workspace/packages/types/node_modules
      - platform-web-ui-dist:/workspace/packages/ui/dist
      - platform-web-ui-node_modules:/workspace/packages/ui/node_modules
      - platform-web-utils-dist:/workspace/packages/utils/dist
      - platform-web-utils-node_modules:/workspace/packages/utils/node_modules
    depends_on:
      backend:
        condition: service_healthy

  chat-realtime:
    build:
      context: .
      dockerfile: apps/chat-realtime/Dockerfile
    command: ["bun", "--watch", "apps/chat-realtime/src/index.ts"]
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - CHAT_REALTIME_TOKEN_SECRET
      - PORT=7817
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://127.0.0.1:7817/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    init: true
    ports:
      - "7817:7817"
    volumes:
      - .:/workspace
      - platform-web-node_modules:/workspace/node_modules

  hive-realtime:
    build:
      context: .
      dockerfile: apps/hive-realtime/Dockerfile
    command: ["bun", "run", "--filter", "@tuturuuu/hive-realtime", "dev"]
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - HIVE_DATABASE_URL=${HIVE_DATABASE_URL:-postgres://hive:hive@hive-postgres:5432/hive}
      - HIVE_REALTIME_TOKEN_SECRET
      - PORT=7815
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://127.0.0.1:7815/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    init: true
    ports:
      - "7815:7815"
    depends_on:
      hive-db-migrate:
        condition: service_completed_successfully
    volumes:
      - .:/workspace
      - platform-hive-realtime-node_modules:/workspace/apps/hive-realtime/node_modules
      - platform-web-node_modules:/workspace/node_modules

  hive:
    build:
      context: .
      dockerfile: apps/hive/Dockerfile
      target: dev
    command: ["bun", "run", "--filter", "@tuturuuu/hive", "dev"]
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - HIVE_DATABASE_URL=${HIVE_DATABASE_URL:-postgres://hive:hive@hive-postgres:5432/hive}
      - HIVE_OLLAMA_BASE_URL=${HIVE_OLLAMA_BASE_URL:-http://hive-ollama:11434}
      - HIVE_REALTIME_TOKEN_SECRET
      - HIVE_REALTIME_URL=${HIVE_REALTIME_URL:-http://hive-realtime:7815/realtime}
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_HIVE_REALTIME_URL=${NEXT_PUBLIC_HIVE_REALTIME_URL:-ws://localhost:7815/realtime}
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_ENV=development
      - PORT=7814
      - SUPABASE_SERVER_URL
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://127.0.0.1:7814/login'').then((response) => process.exit(response.status < 500 ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    init: true
    ports:
      - "7814:7814"
    depends_on:
      hive-db-migrate:
        condition: service_completed_successfully
    volumes:
      - .:/workspace
      - platform-hive-next:/workspace/apps/hive/.next
      - platform-hive-node_modules:/workspace/apps/hive/node_modules
      - platform-web-node_modules:/workspace/node_modules

  log-drain-postgres:
    container_name: ${COMPOSE_PROJECT_NAME:-tuturuuu}-log-drain-postgres-1
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform_log_drain
      POSTGRES_PASSWORD: platform_log_drain
      POSTGRES_USER: platform_log_drain
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U platform_log_drain -d platform_log_drain"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "7903:5432"
    volumes:
      - platform-web-log-drain-postgres:/var/lib/postgresql/data
      - ./apps/web/docker/log-drain-init.sql:/docker-entrypoint-initdb.d/001-log-drain.sql:ro

  hive-postgres:
    container_name: ${COMPOSE_PROJECT_NAME:-tuturuuu}-hive-postgres-1
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_USER: hive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d hive"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${DOCKER_HIVE_POSTGRES_HOST_PORT:-7904}:5432"
    volumes:
      - platform-hive-postgres:/var/lib/postgresql/data
      - ./apps/hive/db/001_schema.sql:/docker-entrypoint-initdb.d/001-hive.sql:ro

  hive-db-migrate:
    image: postgres:16-alpine
    command: ["/bin/sh", "/hive-db/migrate-forward.sh"]
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - HIVE_DATABASE_URL=${HIVE_DATABASE_URL:-postgres://hive:hive@hive-postgres:5432/hive}
      - HIVE_DB_ALLOW_DESTRUCTIVE_RESET=${HIVE_DB_ALLOW_DESTRUCTIVE_RESET:-0}
      - HIVE_DB_DEVOPS_ADMIN_APPROVED=${HIVE_DB_DEVOPS_ADMIN_APPROVED:-0}
      - HIVE_DB_OPERATOR_ROLE=${HIVE_DB_OPERATOR_ROLE:-runtime}
    depends_on:
      hive-postgres:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./apps/hive/db:/hive-db:ro

  hive-ollama:
    profiles: ["hive-ollama"]
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:${HIVE_OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - platform-hive-ollama:/root/.ollama

  cloudflared:
    profiles: ["cloudflared"]
    command:
      ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARED_TOKEN:-}"]
    depends_on:
      web:
        condition: service_started
    image: cloudflare/cloudflared:latest
    init: true
    network_mode: "service:web"
    restart: unless-stopped

  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  serverless-redis-http:
    profiles: ["redis"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SRH_CONNECTION_STRING: redis://redis:6379
      SRH_MODE: env
      SRH_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-platform-local-redis-token}
    image: hiett/serverless-redis-http:latest
    ports:
      - "127.0.0.1:8079:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -q -O - --header="Authorization: Bearer $$SRH_TOKEN" --header="Content-Type: application/json" --post-data=''["PING"]'' http://127.0.0.1:80/ | grep -q ''"PONG"''',
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  pronunciation-assessor:
    profiles: ["ai"]
    build:
      context: apps/pronunciation-assessor
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - PORT=8010
      - PRONUNCIATION_ASSESSOR_DEFAULT_MODEL=${PRONUNCIATION_ASSESSOR_DEFAULT_MODEL:-local-whisper-large-v3-turbo}
      - PRONUNCIATION_ASSESSOR_IDLE_TTL_SECONDS=${PRONUNCIATION_ASSESSOR_IDLE_TTL_SECONDS:-900}
      - PRONUNCIATION_ASSESSOR_MAX_LOADED_MODELS=${PRONUNCIATION_ASSESSOR_MAX_LOADED_MODELS:-1}
      - PRONUNCIATION_ASSESSOR_MODEL=${PRONUNCIATION_ASSESSOR_MODEL:-facebook/wav2vec2-base-960h}
      - PRONUNCIATION_ASSESSOR_PRELOAD=${PRONUNCIATION_ASSESSOR_PRELOAD:-true}
      - PRONUNCIATION_ASSESSOR_WHISPER_BASE_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_BASE_MODEL:-openai/whisper-base}
      - PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_MODEL:-openai/whisper-large-v3}
      - PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_TURBO_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_TURBO_MODEL:-openai/whisper-large-v3-turbo}
      - PRONUNCIATION_ASSESSOR_WHISPER_MEDIUM_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_MEDIUM_MODEL:-openai/whisper-medium}
      - PRONUNCIATION_ASSESSOR_WHISPER_SMALL_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_SMALL_MODEL:-openai/whisper-small}
      - PRONUNCIATION_ASSESSOR_WHISPER_TINY_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_TINY_MODEL:-openai/whisper-tiny}
      - PIPER_DATA_DIR=/root/.cache/piper
      - PIPER_DEFAULT_VOICE=${PIPER_DEFAULT_VOICE:-en_US-lessac-high}
    expose:
      - "8010"
    ports:
      - "8010:8010"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8010/health'', timeout=3).read()" || exit 1',
        ]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 10
    init: true
    volumes:
      - platform-pronunciation-assessor-cache:/root/.cache/huggingface
      - platform-voice-lab-cache:/root/.cache/piper

volumes:
  platform-buildkit-state:
  platform-pronunciation-assessor-cache:
  platform-tanstack-web-node_modules:
  platform-tanstack-web-output:
  platform-voice-lab-cache:
  platform-web-app-node_modules:
  platform-web-ai-node_modules:
  platform-web-ai-dist:
  platform-web-apis-node_modules:
  platform-web-apis-dist:
  platform-web-auth-node_modules:
  platform-web-auth-dist:
  platform-web-devbox-node_modules:
  platform-web-devbox-dist:
  platform-web-education-core-node_modules:
  platform-web-education-core-dist:
  platform-web-finance-core-node_modules:
  platform-web-finance-core-dist:
  platform-bun-install:
  platform-web-email-service-node_modules:
  platform-web-email-service-dist:
  platform-web-games-node_modules:
  platform-web-games-dist:
  platform-web-google-node_modules:
  platform-web-google-dist:
  platform-web-hive-ui-node_modules:
  platform-web-hive-ui-dist:
  platform-web-hooks-node_modules:
  platform-web-hooks-dist:
  platform-web-icons-node_modules:
  platform-web-icons-dist:
  platform-hive-next:
  platform-hive-node_modules:
  platform-hive-ollama:
  platform-hive-postgres:
  platform-hive-realtime-node_modules:
  platform-web-internal-api-node_modules:
  platform-web-internal-api-dist:
  platform-web-inventory-core-node_modules:
  platform-web-inventory-core-dist:
