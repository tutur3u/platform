services:
  buildkit:
    command:
      [
        "--addr",
        "tcp://0.0.0.0:1234",
        "--config",
        "/etc/buildkit/buildkitd.toml",
      ]
    container_name: ${COMPOSE_PROJECT_NAME:-tuturuuu}-buildkit-1
    cpus: ${DOCKER_WEB_BUILD_CPUS:-2}
    healthcheck:
      test: ["CMD", "buildctl", "--addr", "tcp://127.0.0.1:1234", "debug", "workers"]
      interval: 10s
      timeout: 5s
      retries: 5
    image: moby/buildkit:buildx-stable-1
    mem_limit: ${DOCKER_WEB_BUILD_MEMORY:-16g}
    privileged: true
    ports:
      - "127.0.0.1:${DOCKER_WEB_BUILDKIT_PORT:-7914}:1234"
    volumes:
      - platform-buildkit-state:/var/lib/buildkit
      - ./tmp/docker-web/buildkit/buildkitd.toml:/etc/buildkit/buildkitd.toml:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    command: ["bun", "run", "dev:web"]
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - CHOKIDAR_INTERVAL=1000
      - CHOKIDAR_USEPOLLING=1
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_ENV=development
      - PORT=7803
      - PLATFORM_LOG_DRAIN_DATABASE_URL=postgres://platform_log_drain:platform_log_drain@log-drain-postgres:5432/platform_log_drain
      - PLATFORM_LOG_DRAIN_ENABLED=${PLATFORM_LOG_DRAIN_ENABLED:-true}
      - PLATFORM_LOG_DRAIN_RAW_RETENTION_DAYS=${PLATFORM_LOG_DRAIN_RAW_RETENTION_DAYS:-30}
      - PLATFORM_LOG_DRAIN_SUMMARY_RETENTION_DAYS=${PLATFORM_LOG_DRAIN_SUMMARY_RETENTION_DAYS:-90}
      - TSC_WATCHDIRECTORY=DynamicPriorityPolling
      - TSC_WATCHFILE=DynamicPriorityPolling
      - WATCHPACK_POLLING=true
      - SUPABASE_SERVER_URL
      - UPSTASH_REDIS_REST_TOKEN
      - UPSTASH_REDIS_REST_URL
      - VALSEA_PRONUNCIATION_ASSESSOR_URL=${VALSEA_PRONUNCIATION_ASSESSOR_URL:-http://pronunciation-assessor:8010/assess}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    ports:
      - "7803:7803"
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - platform-bun-install:/root/.bun/install/cache
      # Root workspace dependencies and package-local artifacts stay inside
      # container-managed volumes so host installs cannot shadow them.
      - platform-web-next:/workspace/apps/web/.next
      - platform-web-app-node_modules:/workspace/apps/web/node_modules
      - platform-web-node_modules:/workspace/node_modules
      - platform-web-ai-node_modules:/workspace/packages/ai/node_modules
      - platform-web-ai-dist:/workspace/packages/ai/dist
      - platform-web-apis-node_modules:/workspace/packages/apis/node_modules
      - platform-web-apis-dist:/workspace/packages/apis/dist
      - platform-web-auth-node_modules:/workspace/packages/auth/node_modules
      - platform-web-auth-dist:/workspace/packages/auth/dist
      - platform-web-email-service-node_modules:/workspace/packages/email-service/node_modules
      - platform-web-email-service-dist:/workspace/packages/email-service/dist
      - platform-web-games-node_modules:/workspace/packages/games/node_modules
      - platform-web-games-dist:/workspace/packages/games/dist
      - platform-web-google-node_modules:/workspace/packages/google/node_modules
      - platform-web-google-dist:/workspace/packages/google/dist
      - platform-web-hooks-node_modules:/workspace/packages/hooks/node_modules
      - platform-web-hooks-dist:/workspace/packages/hooks/dist
      - platform-web-icons-node_modules:/workspace/packages/icons/node_modules
      - platform-web-icons-dist:/workspace/packages/icons/dist
      - platform-web-internal-api-node_modules:/workspace/packages/internal-api/node_modules
      - platform-web-internal-api-dist:/workspace/packages/internal-api/dist
      - platform-web-masonry-node_modules:/workspace/packages/masonry/node_modules
      - platform-web-masonry-dist:/workspace/packages/masonry/dist
      - platform-web-microsoft-node_modules:/workspace/packages/microsoft/node_modules
      - platform-web-microsoft-dist:/workspace/packages/microsoft/dist
      - platform-web-offline-node_modules:/workspace/packages/offline/node_modules
      - platform-web-offline-dist:/workspace/packages/offline/dist
      - platform-web-payment-node_modules:/workspace/packages/payment/node_modules
      - platform-web-payment-dist:/workspace/packages/payment/dist
      - platform-web-satellite-node_modules:/workspace/packages/satellite/node_modules
      - platform-web-satellite-dist:/workspace/packages/satellite/dist
      - platform-web-sdk-node_modules:/workspace/packages/sdk/node_modules
      - platform-web-sdk-dist:/workspace/packages/sdk/dist
      - platform-web-supabase-node_modules:/workspace/packages/supabase/node_modules
      - platform-web-supabase-dist:/workspace/packages/supabase/dist
      - platform-web-turbo:/workspace/.turbo
      - platform-web-transactional-node_modules:/workspace/packages/transactional/node_modules
      - platform-web-transactional-dist:/workspace/packages/transactional/dist
      - platform-web-trigger-node_modules:/workspace/packages/trigger/node_modules
      - platform-web-trigger-dist:/workspace/packages/trigger/dist
      - platform-web-turnstile-node_modules:/workspace/packages/turnstile/node_modules
      - platform-web-turnstile-dist:/workspace/packages/turnstile/dist
      - platform-web-types-node_modules:/workspace/packages/types/node_modules
      - platform-web-types-dist:/workspace/packages/types/dist
      - platform-web-typescript-config-node_modules:/workspace/packages/typescript-config/node_modules
      - platform-web-typescript-config-dist:/workspace/packages/typescript-config/dist
      - platform-web-ui-node_modules:/workspace/packages/ui/node_modules
      - platform-web-ui-dist:/workspace/packages/ui/dist
      - platform-web-utils-node_modules:/workspace/packages/utils/node_modules
      - platform-web-utils-dist:/workspace/packages/utils/dist
      - platform-web-vercel-node_modules:/workspace/packages/vercel/node_modules
      - platform-web-vercel-dist:/workspace/packages/vercel/dist
      - platform-web-workflows-node_modules:/workspace/packages/workflows/node_modules
      - platform-web-workflows-dist:/workspace/packages/workflows/dist
    depends_on:
      log-drain-postgres:
        condition: service_healthy

  log-drain-postgres:
    container_name: ${COMPOSE_PROJECT_NAME:-tuturuuu}-log-drain-postgres-1
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform_log_drain
      POSTGRES_PASSWORD: platform_log_drain
      POSTGRES_USER: platform_log_drain
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_log_drain -d platform_log_drain"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "7903:5432"
    volumes:
      - platform-web-log-drain-postgres:/var/lib/postgresql/data
      - ./apps/web/docker/log-drain-init.sql:/docker-entrypoint-initdb.d/001-log-drain.sql:ro

  cloudflared:
    profiles: ["cloudflared"]
    command:
      [
        "tunnel",
        "--no-autoupdate",
        "run",
        "--token",
        "${CLOUDFLARED_TOKEN:-}",
      ]
    depends_on:
      web:
        condition: service_started
    image: cloudflare/cloudflared:latest
    init: true
    restart: unless-stopped

  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  serverless-redis-http:
    profiles: ["redis"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SRH_CONNECTION_STRING: redis://redis:6379
      SRH_MODE: env
      SRH_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-platform-local-redis-token}
    image: hiett/serverless-redis-http:latest
    ports:
      - "8079:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -q -O - --header="Authorization: Bearer $$SRH_TOKEN" --header="Content-Type: application/json" --post-data=''["PING"]'' http://127.0.0.1:80/ | grep -q ''"PONG"''',
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  pronunciation-assessor:
    profiles: ["ai"]
    build:
      context: apps/pronunciation-assessor
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - PORT=8010
      - PRONUNCIATION_ASSESSOR_DEFAULT_MODEL=${PRONUNCIATION_ASSESSOR_DEFAULT_MODEL:-local-whisper-large-v3-turbo}
      - PRONUNCIATION_ASSESSOR_IDLE_TTL_SECONDS=${PRONUNCIATION_ASSESSOR_IDLE_TTL_SECONDS:-900}
      - PRONUNCIATION_ASSESSOR_MAX_LOADED_MODELS=${PRONUNCIATION_ASSESSOR_MAX_LOADED_MODELS:-1}
      - PRONUNCIATION_ASSESSOR_MODEL=${PRONUNCIATION_ASSESSOR_MODEL:-facebook/wav2vec2-base-960h}
      - PRONUNCIATION_ASSESSOR_PRELOAD=${PRONUNCIATION_ASSESSOR_PRELOAD:-true}
      - PRONUNCIATION_ASSESSOR_WHISPER_BASE_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_BASE_MODEL:-openai/whisper-base}
      - PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_MODEL:-openai/whisper-large-v3}
      - PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_TURBO_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_TURBO_MODEL:-openai/whisper-large-v3-turbo}
      - PRONUNCIATION_ASSESSOR_WHISPER_MEDIUM_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_MEDIUM_MODEL:-openai/whisper-medium}
      - PRONUNCIATION_ASSESSOR_WHISPER_SMALL_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_SMALL_MODEL:-openai/whisper-small}
      - PRONUNCIATION_ASSESSOR_WHISPER_TINY_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_TINY_MODEL:-openai/whisper-tiny}
      - PIPER_DATA_DIR=/root/.cache/piper
      - PIPER_DEFAULT_VOICE=${PIPER_DEFAULT_VOICE:-en_US-lessac-high}
    expose:
      - "8010"
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=3).read()\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 10
    init: true
    volumes:
      - platform-pronunciation-assessor-cache:/root/.cache/huggingface
      - platform-voice-lab-cache:/root/.cache/piper

volumes:
  platform-buildkit-state:
  platform-pronunciation-assessor-cache:
  platform-voice-lab-cache:
  platform-web-app-node_modules:
  platform-web-ai-node_modules:
  platform-web-ai-dist:
  platform-web-apis-node_modules:
  platform-web-apis-dist:
  platform-web-auth-node_modules:
  platform-web-auth-dist:
  platform-bun-install:
  platform-web-email-service-node_modules:
  platform-web-email-service-dist:
  platform-web-games-node_modules:
  platform-web-games-dist:
  platform-web-google-node_modules:
  platform-web-google-dist:
  platform-web-hooks-node_modules:
  platform-web-hooks-dist:
  platform-web-icons-node_modules:
  platform-web-icons-dist:
  platform-web-internal-api-node_modules:
  platform-web-internal-api-dist:
  platform-web-masonry-node_modules:
  platform-web-masonry-dist:
  platform-web-microsoft-node_modules:
  platform-web-microsoft-dist:
  platform-web-next:
  platform-web-node_modules:
  platform-web-log-drain-postgres:
  platform-web-offline-node_modules:
  platform-web-offline-dist:
  platform-web-payment-node_modules:
  platform-web-payment-dist:
  platform-web-satellite-node_modules:
  platform-web-satellite-dist:
  platform-web-sdk-node_modules:
  platform-web-sdk-dist:
  platform-web-supabase-node_modules:
  platform-web-supabase-dist:
  platform-web-turbo:
  platform-web-transactional-node_modules:
  platform-web-transactional-dist:
  platform-web-trigger-node_modules:
  platform-web-trigger-dist:
  platform-web-turnstile-node_modules:
  platform-web-turnstile-dist:
  platform-web-types-node_modules:
  platform-web-types-dist:
  platform-web-typescript-config-node_modules:
  platform-web-typescript-config-dist:
  platform-web-ui-node_modules:
  platform-web-ui-dist:
  platform-web-utils-node_modules:
