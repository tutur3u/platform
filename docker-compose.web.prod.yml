x-web-service: &web-service
  build:
    context: .
    dockerfile: apps/web/Dockerfile
    target: runner
    secrets:
      - web_env
  env_file:
    - path: apps/web/.env.local
      required: true
  environment: &web-environment
    HOSTNAME: "0.0.0.0"
    NEXT_TELEMETRY_DISABLED: "1"
    NODE_ENV: production
    PORT: "7803"
    SUPABASE_SERVER_URL: ${DOCKER_INTERNAL_SUPABASE_URL}
    UPSTASH_REDIS_REST_TOKEN: ${DOCKER_UPSTASH_REDIS_REST_TOKEN}
    UPSTASH_REDIS_REST_URL: ${DOCKER_UPSTASH_REDIS_REST_URL:-http://serverless-redis-http:80}
  extra_hosts:
    - "host.docker.internal:host-gateway"
  init: true

services:
  web:
    <<: *web-service
    ports:
      - "7803:7803"

  web-blue:
    <<: *web-service

  web-green:
    <<: *web-service

  web-proxy:
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:7803/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    image: nginx:1.27-alpine
    init: true
    ports:
      - "7803:7803"
    volumes:
      - ./tmp/docker-web/prod/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  serverless-redis-http:
    profiles: ["redis"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SRH_CONNECTION_STRING: redis://redis:6379
      SRH_MODE: env
      SRH_TOKEN: ${DOCKER_UPSTASH_REDIS_REST_TOKEN}
    image: hiett/serverless-redis-http:latest
    ports:
      - "8079:80"

secrets:
  web_env:
    file: apps/web/.env.local
