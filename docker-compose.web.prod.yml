x-web-service: &web-service
  build:
    context: .
    dockerfile: apps/web/Dockerfile
    target: runner
    secrets:
      - web_env
  env_file:
    - path: apps/web/.env.local
      required: false
    - path: .env.local
      required: false
  environment: &web-environment
    - CRON_SECRET
    - DISCORD_APP_DEPLOYMENT_URL
    - DRIVE_AUTO_EXTRACT_PROXY_TOKEN
    - DRIVE_AUTO_EXTRACT_PROXY_URL
    - HIVE_REALTIME_TOKEN_SECRET
    - HIVE_REALTIME_URL=${HIVE_REALTIME_URL:-http://hive-realtime:7815/realtime}
    - HOSTNAME=0.0.0.0
    - INTERNAL_WEB_API_ORIGIN
    - MARKITDOWN_ENDPOINT_SECRET
    - MARKITDOWN_ENDPOINT_URL
    - NEXT_PUBLIC_HIVE_REALTIME_URL=${NEXT_PUBLIC_HIVE_REALTIME_URL:-wss://hive.tuturuuu.com/realtime}
    - NEXT_TELEMETRY_DISABLED=1
    - NODE_ENV=production
    - PORT=7803
    - PLATFORM_BLUE_GREEN_COLOR
    - PLATFORM_BLUE_GREEN_CONTROL_DIR=/app/runtime/docker-web-control
    - PLATFORM_BLUE_GREEN_MONITORING_DIR=/app/runtime/docker-web
    - PLATFORM_DEPLOYMENT_STAMP
    - PLATFORM_LOG_DRAIN_DATABASE_URL=postgres://platform_log_drain:platform_log_drain@log-drain-postgres:5432/platform_log_drain
    - PLATFORM_LOG_DRAIN_ENABLED=${PLATFORM_LOG_DRAIN_ENABLED:-true}
    - PLATFORM_LOG_DRAIN_RAW_RETENTION_DAYS=${PLATFORM_LOG_DRAIN_RAW_RETENTION_DAYS:-30}
    - PLATFORM_LOG_DRAIN_SUMMARY_RETENTION_DAYS=${PLATFORM_LOG_DRAIN_SUMMARY_RETENTION_DAYS:-90}
    - SUPABASE_SERVER_URL
    - UPSTASH_REDIS_REST_TOKEN
    - UPSTASH_REDIS_REST_URL
    - VALSEA_PRONUNCIATION_ASSESSOR_URL=${VALSEA_PRONUNCIATION_ASSESSOR_URL:-http://pronunciation-assessor:8010/assess}
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 7803) + '/__platform/drain-status').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
    interval: 30s
    timeout: 5s
    start_period: 10s
    retries: 3
  init: true
  volumes:
    - ./tmp/docker-web/watch/control:/app/runtime/docker-web-control
    - ./tmp/docker-web:/app/runtime/docker-web:ro
  depends_on:
    log-drain-postgres:
      condition: service_healthy

services:
  buildkit:
    command:
      [
        "--addr",
        "tcp://0.0.0.0:1234",
        "--config",
        "/etc/buildkit/buildkitd.toml",
      ]
    container_name: ${COMPOSE_PROJECT_NAME:-tuturuuu}-buildkit-1
    cpus: ${DOCKER_WEB_BUILD_CPUS:-2}
    healthcheck:
      test: ["CMD", "buildctl", "--addr", "tcp://127.0.0.1:1234", "debug", "workers"]
      interval: 10s
      timeout: 5s
      retries: 5
    image: moby/buildkit:buildx-stable-1
    mem_limit: ${DOCKER_WEB_BUILD_MEMORY:-12g}
    privileged: true
    ports:
      - "127.0.0.1:${DOCKER_WEB_BUILDKIT_PORT:-7914}:1234"
    volumes:
      - platform-buildkit-state:/var/lib/buildkit
      - ./tmp/docker-web/buildkit/buildkitd.toml:/etc/buildkit/buildkitd.toml:ro

  web:
    <<: *web-service
    ports:
      - "${DOCKER_WEB_DIRECT_HOST_PORT:-7803}:7803"

  web-blue:
    <<: *web-service

  web-green:
    <<: *web-service

  web-proxy:
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:7803/__platform/drain-status || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    image: nginx:1.27-alpine
    init: true
    ports:
      - "${DOCKER_WEB_PROXY_HOST_PORT:-7803}:7803"
    volumes:
      - ./tmp/docker-web/prod/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  cloudflared:
    profiles: ["cloudflared"]
    command:
      [
        "tunnel",
        "--no-autoupdate",
        "run",
        "--token",
        "${CLOUDFLARED_TOKEN:-}",
      ]
    depends_on:
      web-proxy:
        condition: service_healthy
    image: cloudflare/cloudflared:latest
    init: true
    restart: unless-stopped

  markitdown:
    build:
      context: apps/discord
      dockerfile: Dockerfile.markitdown
    environment:
      - PORT=8000
      - SUPABASE_URL
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    init: true

  storage-unzip-proxy:
    build:
      context: apps/storage-unzip-proxy
    environment:
      - DRIVE_UNZIP_PROXY_SHARED_TOKEN
      - PORT=8788
    expose:
      - "8788"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8788/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    init: true

  hive-realtime:
    build:
      context: .
      dockerfile: apps/hive-realtime/Dockerfile
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - HIVE_REALTIME_TOKEN_SECRET
      - NODE_ENV=production
      - PORT=7815
    expose:
      - "7815"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:7815/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    init: true
    restart: unless-stopped

  hive:
    build:
      context: .
      dockerfile: apps/hive/Dockerfile
      target: runner
      secrets:
        - web_env
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - HIVE_REALTIME_TOKEN_SECRET
      - HIVE_REALTIME_URL=${HIVE_REALTIME_URL:-http://hive-realtime:7815/realtime}
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_HIVE_REALTIME_URL=${NEXT_PUBLIC_HIVE_REALTIME_URL:-wss://hive.tuturuuu.com/realtime}
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_ENV=production
      - PORT=7814
      - SUPABASE_SERVER_URL
    ports:
      - "7814:7814"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:7814/login').then((response) => process.exit(response.status < 500 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    init: true
    restart: unless-stopped

  pronunciation-assessor:
    build:
      context: apps/pronunciation-assessor
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - PORT=8010
      - PRONUNCIATION_ASSESSOR_DEFAULT_MODEL=${PRONUNCIATION_ASSESSOR_DEFAULT_MODEL:-local-whisper-large-v3-turbo}
      - PRONUNCIATION_ASSESSOR_IDLE_TTL_SECONDS=${PRONUNCIATION_ASSESSOR_IDLE_TTL_SECONDS:-900}
      - PRONUNCIATION_ASSESSOR_MAX_LOADED_MODELS=${PRONUNCIATION_ASSESSOR_MAX_LOADED_MODELS:-1}
      - PRONUNCIATION_ASSESSOR_MODEL=${PRONUNCIATION_ASSESSOR_MODEL:-facebook/wav2vec2-base-960h}
      - PRONUNCIATION_ASSESSOR_PRELOAD=${PRONUNCIATION_ASSESSOR_PRELOAD:-true}
      - PRONUNCIATION_ASSESSOR_WHISPER_BASE_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_BASE_MODEL:-openai/whisper-base}
      - PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_MODEL:-openai/whisper-large-v3}
      - PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_TURBO_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_LARGE_V3_TURBO_MODEL:-openai/whisper-large-v3-turbo}
      - PRONUNCIATION_ASSESSOR_WHISPER_MEDIUM_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_MEDIUM_MODEL:-openai/whisper-medium}
      - PRONUNCIATION_ASSESSOR_WHISPER_SMALL_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_SMALL_MODEL:-openai/whisper-small}
      - PRONUNCIATION_ASSESSOR_WHISPER_TINY_MODEL=${PRONUNCIATION_ASSESSOR_WHISPER_TINY_MODEL:-openai/whisper-tiny}
      - PIPER_DATA_DIR=/root/.cache/piper
      - PIPER_DEFAULT_VOICE=${PIPER_DEFAULT_VOICE:-en_US-lessac-high}
    expose:
      - "8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=3).read()\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 10
    init: true
    volumes:
      - platform-pronunciation-assessor-cache:/root/.cache/huggingface
      - platform-voice-lab-cache:/root/.cache/piper

  log-drain-postgres:
    container_name: ${COMPOSE_PROJECT_NAME:-tuturuuu}-log-drain-postgres-1
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform_log_drain
      POSTGRES_PASSWORD: platform_log_drain
      POSTGRES_USER: platform_log_drain
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_log_drain -d platform_log_drain"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - platform-log-drain-postgres:/var/lib/postgresql/data
      - ./apps/web/docker/log-drain-init.sql:/docker-entrypoint-initdb.d/001-log-drain.sql:ro

  web-blue-green-watcher:
    build:
      context: .
      dockerfile: apps/web/docker/blue-green-watcher.Dockerfile
    env_file:
      - path: apps/web/.env.local
        required: false
      - path: .env.local
        required: false
    environment:
      - CLOUDFLARED_TOKEN
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
      - DOCKER_WEB_BUILDKIT_ENDPOINT=tcp://buildkit:1234
      - DOCKER_WEB_BUILDKIT_PORT
      - DOCKER_WEB_COMPOSE_PROJECT_NAME
      - DOCKER_WEB_DIRECT_HOST_PORT
      - DOCKER_WEB_MIGRATE_FROM_COMPOSE_PROJECT
      - DOCKER_WEB_PROXY_HOST_PORT
      - DOCKER_WEB_REDIS_HOST_PORT
      - DOCKER_WEB_SERVERLESS_REDIS_HTTP_HOST_PORT
      - DOCKER_WEB_WITH_CLOUDFLARED
      - GITHUB_TOKEN
      - PLATFORM_HOST_WORKSPACE_DIR=${PLATFORM_HOST_WORKSPACE_DIR:-/workspace-host}
      - PLATFORM_LOG_DRAIN_DATABASE_URL=postgres://platform_log_drain:platform_log_drain@log-drain-postgres:5432/platform_log_drain
      - PLATFORM_LOG_DRAIN_ENABLED=${PLATFORM_LOG_DRAIN_ENABLED:-true}
      - UPSTASH_REDIS_REST_TOKEN
      - UPSTASH_REDIS_REST_URL
    depends_on:
      buildkit:
        condition: service_healthy
      log-drain-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[w]atch-blue-green-deploy.js'"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    init: true
    restart: unless-stopped
    volumes:
      - .:/workspace
      - .:${PLATFORM_HOST_WORKSPACE_DIR:-/workspace-host}
      - /var/run/docker.sock:/var/run/docker.sock
      - platform-bun-install:/root/.bun/install/cache
      - platform-blue-green-watcher-node_modules:/workspace/node_modules
      - platform-blue-green-watcher-node_modules:${PLATFORM_HOST_WORKSPACE_DIR:-/workspace-host}/node_modules

  web-cron-runner:
    build:
      context: .
      dockerfile: apps/web/docker/cron-runner.Dockerfile
    environment:
      - CRON_SECRET
      - INTERNAL_WEB_API_ORIGIN
      - PLATFORM_CRON_CONTROL_DIR=${PLATFORM_HOST_WORKSPACE_DIR:-/workspace-host}/tmp/docker-web/watch/control
      - PLATFORM_CRON_MONITORING_DIR=${PLATFORM_HOST_WORKSPACE_DIR:-/workspace-host}/tmp/docker-web/cron
      - PLATFORM_HOST_WORKSPACE_DIR=${PLATFORM_HOST_WORKSPACE_DIR:-/workspace-host}
      - VERCEL_CRON_SECRET
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[w]atch-web-crons.js'"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    init: true
    restart: unless-stopped
    volumes:
      - .:/workspace:ro
      - .:${PLATFORM_HOST_WORKSPACE_DIR:-/workspace-host}
      - /var/run/docker.sock:/var/run/docker.sock

  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    ports:
      - "${DOCKER_WEB_REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  serverless-redis-http:
    profiles: ["redis"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SRH_CONNECTION_STRING: redis://redis:6379
      SRH_MODE: env
      SRH_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-platform-local-redis-token}
    image: hiett/serverless-redis-http:latest
    ports:
      - "${DOCKER_WEB_SERVERLESS_REDIS_HTTP_HOST_PORT:-8079}:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -q -O - --header="Authorization: Bearer $$SRH_TOKEN" --header="Content-Type: application/json" --post-data=''["PING"]'' http://127.0.0.1:80/ | grep -q ''"PONG"''',
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

secrets:
  web_env:
    file: ${DOCKER_WEB_ENV_FILE:-apps/web/.env.local}

volumes:
  platform-buildkit-state:
  platform-log-drain-postgres:
  platform-bun-install:
  platform-blue-green-watcher-node_modules:
  platform-pronunciation-assessor-cache:
  platform-voice-lab-cache:
