services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
      secrets:
        - web_env
    env_file:
      - path: apps/web/.env.local
        required: true
    environment:
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      PORT: "7803"
      SUPABASE_SERVER_URL: ${DOCKER_INTERNAL_SUPABASE_URL:-http://host.docker.internal:8001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    ports:
      - "7803:7803"

  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  serverless-redis-http:
    profiles: ["redis"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SRH_CONNECTION_STRING: redis://redis:6379
      SRH_MODE: env
      # Export SRH_TOKEN from your shell or CI before enabling the production Redis profile.
      SRH_TOKEN: ${SRH_TOKEN}
    image: hiett/serverless-redis-http:latest
    ports:
      - "8079:80"

secrets:
  web_env:
    file: apps/web/.env.local
