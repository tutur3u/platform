x-web-service: &web-service
  build:
    context: .
    dockerfile: apps/web/Dockerfile
    target: runner
    secrets:
      - web_env
  env_file:
    - path: apps/web/.env.local
      required: true
  environment: &web-environment
    - DISCORD_APP_DEPLOYMENT_URL
    - DRIVE_AUTO_EXTRACT_PROXY_TOKEN
    - DRIVE_AUTO_EXTRACT_PROXY_URL
    - HOSTNAME=0.0.0.0
    - INTERNAL_WEB_API_ORIGIN
    - MARKITDOWN_ENDPOINT_SECRET
    - MARKITDOWN_ENDPOINT_URL
    - NEXT_TELEMETRY_DISABLED=1
    - NODE_ENV=production
    - PORT=7803
    - PLATFORM_BLUE_GREEN_COLOR
    - PLATFORM_BLUE_GREEN_CONTROL_DIR=/app/runtime/docker-web-control
    - PLATFORM_BLUE_GREEN_MONITORING_DIR=/app/runtime/docker-web
    - PLATFORM_DEPLOYMENT_STAMP
    - SUPABASE_SERVER_URL
    - UPSTASH_REDIS_REST_TOKEN
    - UPSTASH_REDIS_REST_URL
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 7803) + '/__platform/drain-status').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
    interval: 30s
    timeout: 5s
    start_period: 10s
    retries: 3
  init: true
  volumes:
    - ./tmp/docker-web/watch/control:/app/runtime/docker-web-control
    - ./tmp/docker-web:/app/runtime/docker-web:ro

services:
  web:
    <<: *web-service
    ports:
      - "7803:7803"

  web-blue:
    <<: *web-service

  web-green:
    <<: *web-service

  web-proxy:
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:7803/__platform/drain-status || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    image: nginx:1.27-alpine
    init: true
    ports:
      - "7803:7803"
    volumes:
      - ./tmp/docker-web/prod/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  markitdown:
    build:
      context: apps/discord
      dockerfile: Dockerfile.markitdown
    environment:
      - PORT=8000
      - SUPABASE_URL
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\" || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    init: true

  storage-unzip-proxy:
    build:
      context: apps/storage-unzip-proxy
    environment:
      - DRIVE_UNZIP_PROXY_SHARED_TOKEN
      - PORT=8788
    expose:
      - "8788"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8788/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    init: true

  web-blue-green-watcher:
    build:
      context: .
      dockerfile: apps/web/docker/blue-green-watcher.Dockerfile
    environment:
      - PLATFORM_HOST_WORKSPACE_DIR
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[w]atch-blue-green-deploy.js'"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    init: true
    volumes:
      - .:/workspace
      - .:${PLATFORM_HOST_WORKSPACE_DIR}
      - /var/run/docker.sock:/var/run/docker.sock
      - platform-bun-install:/root/.bun/install/cache
      - platform-blue-green-watcher-node_modules:/workspace/node_modules
      - platform-blue-green-watcher-node_modules:${PLATFORM_HOST_WORKSPACE_DIR}/node_modules

  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  serverless-redis-http:
    profiles: ["redis"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SRH_CONNECTION_STRING: redis://redis:6379
      SRH_MODE: env
      SRH_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:?UPSTASH_REDIS_REST_TOKEN must be set when enabling the redis profile}
    image: hiett/serverless-redis-http:latest
    ports:
      - "8079:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -q -O - --header="Authorization: Bearer $$SRH_TOKEN" --header="Content-Type: application/json" --post-data=''["PING"]'' http://127.0.0.1:80/ | grep -q ''"PONG"''',
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

secrets:
  web_env:
    file: apps/web/.env.local

volumes:
  platform-bun-install:
  platform-blue-green-watcher-node_modules:
