name: Vercel Platform Preview Deployment
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      preview_ref:
        description: Branch, tag, or SHA to deploy to preview.
        required: true
        type: string

permissions:
  contents: read

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: vercel-preview-platform.yaml
    permissions:
      contents: read
      deployments: read

  Deploy-Preview:
    needs: [check-ci]
    if: >-
      needs.check-ci.outputs.should_run == 'true' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (
          github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/main' &&
          contains(format(',{0},', vars.TRUSTED_PREVIEW_DEPLOY_ACTORS), format(',{0},', github.actor))
        )
      )
    environment: vercel-preview-platform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
          ref: ${{ github.event.inputs.preview_ref || github.sha }}

      - name: Confirm preview target
        id: check_commits
        run: |
          echo "Building preview ref ${{ github.event.inputs.preview_ref || github.sha }}."
          echo "skip_build=false" >> $GITHUB_OUTPUT

      - name: Resolve checked-out SHA
        if: steps.check_commits.outputs.skip_build != 'true'
        id: resolve_target
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Use Node.js 24
        if: steps.check_commits.outputs.skip_build != 'true'
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Check equivalent production platform build
        if: steps.check_commits.outputs.skip_build != 'true'
        id: equivalent_build
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node --experimental-strip-types scripts/ci/github-deployment-markers.ts has-successful-marker \
            --workflow vercel-production-platform.yaml \
            --sha "${{ steps.resolve_target.outputs.sha }}" \
            --marker-kind build

      - name: Setup bun
        if: steps.check_commits.outputs.skip_build != 'true' && steps.equivalent_build.outputs.found != 'true'
        uses: ./.github/actions/setup-bun-with-retry
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        if: steps.check_commits.outputs.skip_build != 'true' && steps.equivalent_build.outputs.found != 'true'
        run: bash scripts/ci/run-with-backoff.sh bun install

      - name: Install Vercel CLI
        if: steps.check_commits.outputs.skip_build != 'true' && steps.equivalent_build.outputs.found != 'true'
        run: bash scripts/ci/run-with-backoff.sh bun install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.check_commits.outputs.skip_build != 'true' && steps.equivalent_build.outputs.found != 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PLATFORM_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate shared build metadata
        if: steps.check_commits.outputs.skip_build != 'true' && steps.equivalent_build.outputs.found != 'true'
        env:
          PLATFORM_BUILD_ENVIRONMENT: preview
          PLATFORM_BUILD_REF_NAME: ${{ inputs.preview_ref || github.ref_name }}
        run: bun run --silent scripts/ci/generate-build-metadata.ts

      - name: Build Project Artifacts
        if: steps.check_commits.outputs.skip_build != 'true' && steps.equivalent_build.outputs.found != 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          TURBO_CONCURRENCY: "2"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PLATFORM_PROJECT_ID }}
        uses: ./.github/actions/run-with-turbo-remote-cache
        with:
          command: vercel build --token=${{ secrets.VERCEL_TOKEN }}
          token: ${{ github.actor != 'dependabot[bot]' && secrets.TURBO_TOKEN || '' }}
          team: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}

      - name: Record successful Vercel build marker
        if: steps.check_commits.outputs.skip_build != 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERCEL_MARKER_KIND: build
          VERCEL_MARKER_SHA: ${{ steps.resolve_target.outputs.sha }}
          VERCEL_WORKFLOW_NAME: vercel-preview-platform.yaml
        run: node --experimental-strip-types scripts/ci/record-vercel-deployment.ts
