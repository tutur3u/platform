name: Docker Setup Check

on:
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/docker-setup-check.yaml"
      - "apps/backend/**"
      - "apps/hive/Dockerfile"
      - "apps/tanstack-web/**"
      - "apps/*/package.json"
      - "apps/storage-unzip-proxy/Dockerfile"
      - "apps/web/Dockerfile"
      - "apps/web/docker/*.Dockerfile"
      - "bun.lock"
      - "docker-bake.web.prod.hcl"
      - "docker-compose.tanstack-dual.yml"
      - "docker-compose/compose.web.prod.*.yml"
      - "docker-compose.web.prod.yml"
      - "docker-compose.web.yml"
      - "package.json"
      - "packages/*/package.json"
      - "scripts/check-docker-web.js"
      - "scripts/check-docker-web.test.js"
      - "scripts/buildkit-builder.test.js"
      - "scripts/docker-web.js"
      - "scripts/docker-web/**/*.js"
      - "scripts/docker-web.test.js"
      - "scripts/run-tanstack-e2e-docker.js"
      - "scripts/run-tanstack-e2e-docker.test.js"
      - "scripts/watch-blue-green/**/*.js"
      - "turbo.json"
  push:
    branches: ["main", "production"]
    paths:
      - ".dockerignore"
      - ".github/workflows/docker-setup-check.yaml"
      - "apps/backend/**"
      - "apps/hive/Dockerfile"
      - "apps/tanstack-web/**"
      - "apps/*/package.json"
      - "apps/storage-unzip-proxy/Dockerfile"
      - "apps/web/Dockerfile"
      - "apps/web/docker/*.Dockerfile"
      - "bun.lock"
      - "docker-bake.web.prod.hcl"
      - "docker-compose.tanstack-dual.yml"
      - "docker-compose/compose.web.prod.*.yml"
      - "docker-compose.web.prod.yml"
      - "docker-compose.web.yml"
      - "package.json"
      - "packages/*/package.json"
      - "scripts/check-docker-web.js"
      - "scripts/check-docker-web.test.js"
      - "scripts/buildkit-builder.test.js"
      - "scripts/docker-web.js"
      - "scripts/docker-web/**/*.js"
      - "scripts/docker-web.test.js"
      - "scripts/run-tanstack-e2e-docker.js"
      - "scripts/run-tanstack-e2e-docker.test.js"
      - "scripts/watch-blue-green/**/*.js"
      - "turbo.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    permissions:
      contents: read
      deployments: read
    with:
      workflow_name: docker-setup-check.yaml

  verify:
    name: Verify Docker Setup
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Free runner disk before Docker image builds
        run: |
          df -h /
          docker system prune -af --volumes || true
          docker builder prune -af || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Pre-pull Docker BuildKit image
        run: |
          for attempt in 1 2 3; do
            if docker pull moby/buildkit:buildx-stable-1; then
              exit 0
            fi

            if [ "$attempt" = "3" ]; then
              echo "BuildKit image pull failed after $attempt attempts."
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Expose GitHub cache runtime to BuildKit
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      - name: Validate Docker parity checks
        run: node scripts/check-docker-web.js

      - name: Run Docker helper tests
        run: node --test scripts/check-docker-web.test.js scripts/docker-web.test.js scripts/buildkit-builder.test.js scripts/run-tanstack-e2e-docker.test.js

      - name: Prepare production Docker runtime files
        run: |
          mkdir -p tmp/docker-web/prod
          cat <<'EOF' > tmp/docker-web/prod/nginx.conf
          server {
            listen 7803;
            location / {
              proxy_pass http://web-blue:7803;
            }
          }
          EOF
          cat <<'EOF' > apps/web/.env.local
          NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=test-publishable-key
          SUPABASE_SECRET_KEY=test-secret-key
          EOF
          printf 'UPSTASH_REDIS_REST_TOKEN=test-token\n' >> "$GITHUB_ENV"
          printf 'SUPERMEMORY_POSTGRES_PASSWORD=test-supermemory-postgres-password\n' >> "$GITHUB_ENV"

      - name: Render Docker Compose configs
        run: |
          docker compose -f docker-compose.web.yml config > /tmp/docker-compose.web.yml
          docker compose -f docker-compose.web.yml --profile redis config > /tmp/docker-compose.web.redis.yml
          docker compose -f docker-compose.web.yml --profile cloudflared config > /tmp/docker-compose.web.cloudflared.yml
          docker compose -f docker-compose.web.prod.yml config > /tmp/docker-compose.web.prod.yml
          docker compose -f docker-compose.web.prod.yml --profile redis config > /tmp/docker-compose.web.prod.redis.yml
          docker compose -f docker-compose.web.prod.yml --profile cloudflared config > /tmp/docker-compose.web.prod.cloudflared.yml
          docker compose -f docker-compose.tanstack-dual.yml config > /tmp/docker-compose.tanstack-dual.yml

      - name: Build web dev image
        uses: ./.github/actions/run-with-turbo-remote-cache
        with:
          token: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') && github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && secrets.TURBO_TOKEN || '' }}
          team: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') && github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && (vars.TURBO_TEAM || secrets.TURBO_TEAM) || '' }}
          command: |
            turbo_secrets=()
            if [ -n "${TURBO_TEAM:-}" ]; then turbo_secrets+=(--secret id=turbo_team,env=TURBO_TEAM); fi
            if [ -n "${TURBO_TOKEN:-}" ]; then turbo_secrets+=(--secret id=turbo_token,env=TURBO_TOKEN); fi
            cache_to=()
            if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
              cache_to+=(--cache-to type=gha,scope=docker-web-dev,mode=min,timeout=10m,ignore-error=true)
            fi

            docker buildx build --load \
              --target dev \
              --cache-from type=gha,scope=docker-web-dev,timeout=10m \
              "${cache_to[@]}" \
              "${turbo_secrets[@]}" \
              -f apps/web/Dockerfile .

      - name: Free Docker disk after web dev image
        if: always()
        run: |
          df -h /
          docker system prune -af --volumes || true
          docker builder prune -af || true
          df -h /

      - name: Build web prod image
        uses: ./.github/actions/run-with-turbo-remote-cache
        with:
          token: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') && github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && secrets.TURBO_TOKEN || '' }}
          team: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') && github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && (vars.TURBO_TEAM || secrets.TURBO_TEAM) || '' }}
          command: |
            turbo_secrets=()
            if [ -n "${TURBO_TEAM:-}" ]; then turbo_secrets+=(--secret id=turbo_team,env=TURBO_TEAM); fi
            if [ -n "${TURBO_TOKEN:-}" ]; then turbo_secrets+=(--secret id=turbo_token,env=TURBO_TOKEN); fi
            cache_to=()
            if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
              cache_to+=(--cache-to type=gha,scope=docker-web-prod,mode=max,timeout=10m,ignore-error=true)
            fi

            docker buildx build --load \
              --target runner \
              --secret id=web_env,src=apps/web/.env.local \
              --cache-from type=gha,scope=docker-web-prod,timeout=10m \
              "${cache_to[@]}" \
              "${turbo_secrets[@]}" \
              -f apps/web/Dockerfile .

      - name: Free Docker disk after web prod image
        if: always()
        run: |
          df -h /
          docker system prune -af --volumes || true
          docker builder prune -af || true
          df -h /

      - name: Build TanStack web prod image
        uses: ./.github/actions/run-with-turbo-remote-cache
        with:
          token: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') && github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && secrets.TURBO_TOKEN || '' }}
          team: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') && github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && (vars.TURBO_TEAM || secrets.TURBO_TEAM) || '' }}
          command: |
            turbo_secrets=()
            if [ -n "${TURBO_TEAM:-}" ]; then turbo_secrets+=(--secret id=turbo_team,env=TURBO_TEAM); fi
            if [ -n "${TURBO_TOKEN:-}" ]; then turbo_secrets+=(--secret id=turbo_token,env=TURBO_TOKEN); fi
            cache_to=()
            if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
              cache_to+=(--cache-to type=gha,scope=docker-tanstack-web-prod,mode=max,timeout=10m,ignore-error=true)
            fi

            docker buildx build --load \
              --target runner \
              --cache-from type=gha,scope=docker-tanstack-web-prod,timeout=10m \
              "${cache_to[@]}" \
              "${turbo_secrets[@]}" \
              -f apps/tanstack-web/Dockerfile .

      - name: Free Docker disk after TanStack web prod image
        if: always()
        run: |
          df -h /
          docker system prune -af --volumes || true
          docker builder prune -af || true
          df -h /

      - name: Build storage unzip proxy image
        run: |
          cache_to=()
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            cache_to+=(--cache-to type=gha,scope=docker-storage-unzip-proxy,mode=min,timeout=10m,ignore-error=true)
          fi

          docker buildx build --load \
            --cache-from type=gha,scope=docker-storage-unzip-proxy,timeout=10m \
            "${cache_to[@]}" \
            -f apps/storage-unzip-proxy/Dockerfile apps/storage-unzip-proxy

      - name: Free Docker disk after storage unzip proxy image
        if: always()
        run: |
          df -h /
          docker system prune -af --volumes || true
          docker builder prune -af || true
          df -h /

      - name: Build backend image
        run: |
          docker buildx build --load \
            --cache-from type=gha,scope=docker-backend,timeout=10m \
            -f apps/backend/Dockerfile .
