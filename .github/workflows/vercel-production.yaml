name: Vercel Production Deployment Planner
on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: vercel-production-planner-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read
  deployments: write

jobs:
  plan:
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    outputs:
      workflows_json: ${{ steps.plan.outputs.workflows_json }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Resolve affected production apps
        id: plan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node --experimental-strip-types scripts/ci/resolve-production-vercel-targets.ts --step-summary "${GITHUB_STEP_SUMMARY}"

  deploy-apps:
    needs: plan
    if: contains(fromJSON(needs.plan.outputs.workflows_json), 'vercel-production-apps.yaml')
    uses: ./.github/workflows/vercel-production-apps.yaml
    secrets: inherit

  deploy-calendar:
    needs: plan
    if: contains(fromJSON(needs.plan.outputs.workflows_json), 'vercel-production-calendar.yaml')
    uses: ./.github/workflows/vercel-production-calendar.yaml
