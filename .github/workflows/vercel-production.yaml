name: Vercel Production Deployment Planner
on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: vercel-production-planner-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read
  deployments: read

jobs:
  plan-and-dispatch:
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Resolve affected production apps
        id: plan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node --experimental-strip-types scripts/ci/resolve-production-vercel-targets.ts --step-summary "${GITHUB_STEP_SUMMARY}"

      - name: Dispatch affected production deployments
        if: steps.plan.outputs.workflow_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOWS_JSON: ${{ steps.plan.outputs.workflows_json }}
        run: |
          while IFS= read -r workflow; do
            echo "Dispatching ${workflow} at production"
            gh workflow run "${workflow}" --ref production
          done < <(jq -r '.[]' <<< "${WORKFLOWS_JSON}")
