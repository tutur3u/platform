name: Supabase Production Migration

on:
  workflow_run:
    workflows:
      - "Vercel Platform Production Deployment"
      - "Supabase Staging Migration"
    types:
      - completed
    branches:
      - production
      - staging
  workflow_dispatch:

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: supabase-production.yaml

  evaluate-prerequisites:
    name: Evaluate production prerequisites
    runs-on: ubuntu-latest
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    outputs:
      should_deploy: ${{ steps.evaluate.outputs.should_deploy }}
    steps:
      - name: Evaluate prerequisite status
        id: evaluate
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          SHOULD_DEPLOY=false

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual dispatch detected. Proceeding with production migration."
            SHOULD_DEPLOY=true
          elif [ "$TRIGGER_CONCLUSION" != "success" ]; then
            echo "::notice::Skipping production migration because the triggering workflow concluded with '$TRIGGER_CONCLUSION'."
          else
            echo "Checking prerequisites for production migration..."

            echo "Checking Vercel production deployment status..."
            VERCEL_RUN=$(gh api \
              "repos/${{ github.repository }}/actions/workflows/vercel-production-platform.yaml/runs?branch=production&per_page=1" \
              --jq '.workflow_runs[0] // {} | {conclusion: .conclusion, status: .status, created_at: .created_at}')

            VERCEL_CONCLUSION=$(echo "$VERCEL_RUN" | jq -r '.conclusion // "missing"')
            VERCEL_STATUS=$(echo "$VERCEL_RUN" | jq -r '.status // "missing"')

            echo "Vercel production deployment status: $VERCEL_STATUS"
            echo "Vercel production deployment conclusion: $VERCEL_CONCLUSION"

            if [ "$VERCEL_CONCLUSION" != "success" ]; then
              echo "::notice::Skipping production migration because the latest production deployment has conclusion '$VERCEL_CONCLUSION'."
            else
              echo "Checking staging migration status..."
              STAGING_RUN=$(gh api \
                "repos/${{ github.repository }}/actions/workflows/supabase-staging.yaml/runs?branch=staging&per_page=1" \
                --jq '.workflow_runs[0] // {} | {conclusion: .conclusion, status: .status, created_at: .created_at}')

              STAGING_CONCLUSION=$(echo "$STAGING_RUN" | jq -r '.conclusion // "missing"')
              STAGING_STATUS=$(echo "$STAGING_RUN" | jq -r '.status // "missing"')

              echo "Staging migration status: $STAGING_STATUS"
              echo "Staging migration conclusion: $STAGING_CONCLUSION"

              if [ "$STAGING_CONCLUSION" = "success" ] || [ "$STAGING_CONCLUSION" = "skipped" ]; then
                echo "All production prerequisites are satisfied. Proceeding with migration."
                SHOULD_DEPLOY=true
              else
                echo "::notice::Skipping production migration because the latest staging migration has conclusion '$STAGING_CONCLUSION'."
              fi
            fi
          fi

          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"

  deploy:
    name: Migrate production database
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: [check-ci, evaluate-prerequisites]
    if: needs.check-ci.outputs.should_run == 'true' && needs.evaluate-prerequisites.outputs.should_deploy == 'true'

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
      PRODUCTION_PROJECT_ID: ${{ secrets.PRODUCTION_PROJECT_ID }}
      PRODUCTION_DB_URL: ${{ secrets.PRODUCTION_DB_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy migrations to production
        run: |
          cd apps/database
          supabase link --project-ref ${{ env.PRODUCTION_PROJECT_ID }}
          supabase db push
