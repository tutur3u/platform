name: Test

on:
  push:

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: turbo-unit-tests.yaml

  build:
    name: Unit Tests
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    env:
      # Configure production Supabase client
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PRODUCTION_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.PRODUCTION_SUPABASE_SECRET_KEY }}

      # Configure infrastructure
      PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
      NEXT_PUBLIC_PROXY_API_KEY: ${{ secrets.NEXT_PUBLIC_PROXY_API_KEY }}

    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Setup bun
        uses: ./.github/actions/setup-bun-with-retry
        with:
          bun-version: 1.3.14

      - name: Restore Turbo fallback cache
        uses: ./.github/actions/setup-turbo-fallback-cache
        with:
          family: unit-tests

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bash scripts/ci/run-with-backoff.sh bun install --frozen-lockfile

      - name: Build workspace setup
        uses: ./.github/actions/run-with-turbo-remote-cache
        with:
          command: bun turbo:local run build --concurrency=4 --filter=@tuturuuu/types --filter=@tuturuuu/supabase --filter=@tuturuuu/masonry --filter=@tuturuuu/internal-api --filter=tuturuuu
          token: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') && secrets.TURBO_TOKEN || '' }}
          team: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') && (vars.TURBO_TEAM || secrets.TURBO_TEAM) || '' }}

      - name: Test
        # Cap Turbo concurrency so parallel package test suites don't
        # oversubscribe the runner's CPUs and starve the event loop, which is a
        # common source of flaky "Test timed out in 5000ms" failures in
        # otherwise-fast mocked unit tests during repository-wide test runs.
        uses: ./.github/actions/run-with-turbo-remote-cache
        with:
          command: bun turbo:local run test --concurrency=4
          token: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') && secrets.TURBO_TOKEN || '' }}
          team: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production') && (vars.TURBO_TEAM || secrets.TURBO_TEAM) || '' }}
