name: Vercel Platform Production Deployment
on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Deploy-Production:
    if: github.ref == 'refs/heads/production'
    environment: vercel-production-platform
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      deployments: write
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Resolve checked-out SHA
        id: resolve_target
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Use Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Setup bun
        uses: ./.github/actions/setup-bun-with-retry
        with:
          bun-version: 1.3.14

      - name: Gate package release visibility
        id: package_release_gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/ci/package-release-readiness.js gate-changed-package-versions

      - name: Skip build while package releases publish
        if: steps.package_release_gate.outputs.packages_ready == 'false'
        run: |
          echo "Changed package versions are still publishing; skipping this platform build run without failing."
          echo 'Pending packages: ${{ steps.package_release_gate.outputs.pending_packages }}'

      - name: Install dependencies
        if: steps.package_release_gate.outputs.packages_ready == 'true'
        run: bash scripts/ci/run-with-backoff.sh bun install

      - name: Install Vercel CLI
        if: steps.package_release_gate.outputs.packages_ready == 'true'
        run: bash scripts/ci/run-with-backoff.sh bun install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.package_release_gate.outputs.packages_ready == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PLATFORM_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate shared build metadata
        if: steps.package_release_gate.outputs.packages_ready == 'true'
        env:
          PLATFORM_BUILD_ENVIRONMENT: production
          PLATFORM_BUILD_REF_NAME: production
        run: bun run --silent scripts/ci/generate-build-metadata.ts

      - name: Build Project Artifacts
        if: steps.package_release_gate.outputs.packages_ready == 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          TURBO_CONCURRENCY: "2"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PLATFORM_PROJECT_ID }}
        uses: ./.github/actions/run-with-turbo-remote-cache
        with:
          command: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          token: ${{ github.actor != 'dependabot[bot]' && secrets.TURBO_TOKEN || '' }}
          team: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}

      - name: Deploy Project Artifacts to Vercel
        if: steps.package_release_gate.outputs.packages_ready == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PLATFORM_PROJECT_ID }}
        run: vercel deploy --archive=tgz --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Record successful Vercel build marker
        if: steps.package_release_gate.outputs.packages_ready == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERCEL_MARKER_KIND: build
          VERCEL_MARKER_SHA: ${{ steps.resolve_target.outputs.sha }}
          VERCEL_WORKFLOW_NAME: vercel-production-platform.yaml
        run: node --experimental-strip-types scripts/ci/record-vercel-deployment.ts

      - name: Record successful Vercel deployment marker
        if: steps.package_release_gate.outputs.packages_ready == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERCEL_MARKER_SHA: ${{ steps.resolve_target.outputs.sha }}
          VERCEL_WORKFLOW_NAME: vercel-production-platform.yaml
        run: node --experimental-strip-types scripts/ci/record-vercel-deployment.ts
