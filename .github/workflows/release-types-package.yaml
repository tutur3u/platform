name: Release @tuturuuu/types package

on:
  push:
    branches: [production]
    paths:
      - "packages/types/package.json"
      - ".github/workflows/release-types-package.yaml"
  workflow_dispatch:

jobs:
  reject-non-production-ref:
    if: github.ref != 'refs/heads/production'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Reject non-production release ref
        run: |
          echo "::error::@tuturuuu/types releases can only run from refs/heads/production. Current ref: ${GITHUB_REF}."
          exit 1

  check-ci:
    if: github.ref == 'refs/heads/production'
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: release-types-package.yaml

  check-version-bump:
    needs: [check-ci]
    if: github.ref == 'refs/heads/production' && needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - id: check
        run: echo "should_release=true" >> $GITHUB_OUTPUT

  build:
    needs: check-version-bump
    if: needs.check-version-bump.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    env:
      # Use Vercel Remote Caching
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # Configure production Supabase client
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PRODUCTION_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.PRODUCTION_SUPABASE_SECRET_KEY }}

      # Configure infrastructure
      PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
      NEXT_PUBLIC_PROXY_API_KEY: ${{ secrets.NEXT_PUBLIC_PROXY_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install

      - name: Build package
        working-directory: packages/types
        run: bun run build

  publish-npm:
    needs: [build]
    runs-on: ubuntu-latest

    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Publish package
        working-directory: packages/types
        run: bun publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
