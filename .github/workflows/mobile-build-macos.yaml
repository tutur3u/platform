name: Mobile Build macOS

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-build-macos.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-build-macos.yaml"

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: mobile-build-macos.yaml

  build-macos:
    name: Build macOS (Development)
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.x"
          channel: stable
          cache: true
          pub-cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Cache CocoaPods downloads
        uses: actions/cache@v6
        with:
          path: |
            /Users/runner/Library/Caches/CocoaPods
            /Users/runner/.cocoapods/repos/trunk
          key: ${{ runner.os }}-${{ runner.arch }}-flutter-macos-pods-${{ hashFiles('apps/mobile/pubspec.lock', 'apps/mobile/macos/Podfile', 'apps/mobile/macos/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-flutter-macos-pods-

      - name: Create dummy GoogleService-Info.plist
        run: |
          mkdir -p macos/Runner
          cat << 'EOF' > macos/Runner/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CLIENT_ID</key>
            <string>dummy</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>dummy</string>
            <key>API_KEY</key>
            <string>dummy</string>
            <key>GCM_SENDER_ID</key>
            <string>dummy</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>dummy</string>
            <key>PROJECT_ID</key>
            <string>dummy</string>
            <key>STORAGE_BUCKET</key>
            <string>dummy</string>
            <key>IS_ADS_ENABLED</key>
            <false/>
            <key>IS_ANALYTICS_ENABLED</key>
            <false/>
            <key>IS_APPINVITE_ENABLED</key>
            <true/>
            <key>IS_GCM_ENABLED</key>
            <true/>
            <key>IS_SIGNIN_ENABLED</key>
            <true/>
            <key>GOOGLE_APP_ID</key>
            <string>1:dummy:ios:dummy</string>
          </dict>
          </plist>
          EOF

      - name: Build macOS
        run: flutter build macos --flavor development --target lib/main_development.dart

      - name: Archive macOS app bundle
        run: |
          app_path="$(find build/macos/Build/Products -maxdepth 2 -type d -name '*.app' -print -quit)"
          test -n "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$RUNNER_TEMP/macos-dev-app.zip"

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-dev-app
          path: ${{ runner.temp }}/macos-dev-app.zip
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
