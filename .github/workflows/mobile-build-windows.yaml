name: Mobile Build Windows

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

on:
    push:
        branches:
            - main
        paths:
            - "apps/mobile/**"
            - ".github/workflows/mobile-build-windows.yaml"
    pull_request:
        branches:
            - main
        paths:
            - "apps/mobile/**"
            - ".github/workflows/mobile-build-windows.yaml"

jobs:
    check-ci:
        uses: ./.github/workflows/ci-check.yml
        with:
            workflow_name: mobile-build-windows.yaml

    build-windows:
        name: Build Windows (Development)
        needs: [check-ci]
        if: needs.check-ci.outputs.should_run == 'true'
        runs-on: windows-latest
        defaults:
            run:
                working-directory: apps/mobile
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.44.x"
                  channel: stable
                  cache: true
                  pub-cache: true

            - name: Enable Windows desktop
              run: flutter config --enable-windows-desktop

            - name: Install dependencies
              run: flutter pub get

            - name: Build Windows
              run: flutter build windows --target lib/main_development.dart

            - name: Archive Windows app bundle
              shell: pwsh
              run: Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "$env:RUNNER_TEMP/windows-dev-app.zip"

            - name: Upload Windows app artifact
              uses: actions/upload-artifact@v7
              with:
                  name: windows-dev-app
                  path: ${{ runner.temp }}/windows-dev-app.zip
                  if-no-files-found: error
                  retention-days: 7
                  compression-level: 0
