name: Release Please

on:
  push:
    branches: [production]
  workflow_dispatch:

jobs:
  reject-non-production-ref:
    if: github.ref != 'refs/heads/production'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Reject non-production release ref
        run: |
          echo "::error::Release Please can only run from refs/heads/production. Current ref: ${GITHUB_REF}."
          exit 1

  check-ci:
    if: github.ref == 'refs/heads/production'
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: release-please.yaml

  release-please:
    needs: [check-ci]
    if: github.ref == 'refs/heads/production' && needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout release automation
        uses: actions/checkout@v7
        with:
          ref: production
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Recover overflow release notes
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: node scripts/ci/release-please-overflow-recovery.js --target-branch production

      - name: Create or update release PR
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          target-branch: production
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
