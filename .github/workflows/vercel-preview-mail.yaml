name: Vercel Mail Preview Deployment
on:
  workflow_dispatch:
    inputs:
      preview_ref:
        description: Branch, tag, or SHA to deploy to preview.
        required: true
        type: string

permissions:
  contents: read

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: vercel-preview-mail.yaml
    permissions:
      contents: read
      deployments: read

  Deploy-Preview:
    needs: [check-ci]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && contains(format(',{0},', vars.TRUSTED_PREVIEW_DEPLOY_ACTORS), format(',{0},', github.actor)) && needs.check-ci.outputs.should_run == 'true'
    environment: vercel-preview-mail
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 2
          ref: ${{ inputs.preview_ref }}
          persist-credentials: false

      - name: Confirm preview ref
        id: check_commits
        run: |
          echo "Deploying preview ref ${{ inputs.preview_ref }}."
          echo "skip_build=false" >> $GITHUB_OUTPUT

      - name: Setup bun
        if: steps.check_commits.outputs.skip_build != 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Use Node.js 24
        if: steps.check_commits.outputs.skip_build != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Install dependencies
        if: steps.check_commits.outputs.skip_build != 'true'
        run: bun install

      - name: Install Vercel CLI
        if: steps.check_commits.outputs.skip_build != 'true'
        run: bun install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.check_commits.outputs.skip_build != 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MAIL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build workspace dependencies
        if: steps.check_commits.outputs.skip_build != 'true'
        run: bun turbo:local run build --filter=@tuturuuu/types --filter=@tuturuuu/supabase --filter=@tuturuuu/internal-api

      - name: Generate shared build metadata
        if: steps.check_commits.outputs.skip_build != 'true'
        run: bun run --silent scripts/ci/generate-build-metadata.ts

      - name: Build Project Artifacts
        if: steps.check_commits.outputs.skip_build != 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MAIL_PROJECT_ID }}
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        if: steps.check_commits.outputs.skip_build != 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MAIL_PROJECT_ID }}
        run: vercel deploy --archive=tgz --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      - name: Record successful Vercel deployment marker
        if: steps.check_commits.outputs.skip_build != 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERCEL_WORKFLOW_NAME: vercel-preview-mail.yaml
        run: bun run --silent scripts/ci/record-vercel-deployment.ts
