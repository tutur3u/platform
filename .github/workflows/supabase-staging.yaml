name: Supabase Staging Migration

on:
  workflow_run:
    workflows: ["Vercel Platform Preview Deployment"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: supabase-staging-migration
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  migrate:
    name: Migrate staging database
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      STAGING_PROJECT_ID: ${{ secrets.STAGING_PROJECT_ID }}
      STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
      TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Check out migration target
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_SHA }}

      - name: Use Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Compute pending migration changes
        id: changed_files
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: supabase-staging.yaml
        run: >-
          node --experimental-strip-types scripts/ci/resolve-changed-files.ts
          --head-sha "$TARGET_SHA" --ref-name main

      - name: Check migration configuration
        id: check_config
        env:
          CHANGED_FILES_FILE: ${{ steps.changed_files.outputs.changed_files_path }}
          WORKFLOW_NAME: supabase-staging.yaml
        run: node --experimental-strip-types scripts/ci/check-workflow-config.ts

      - name: Evaluate staging prerequisites
        id: evaluate
        env:
          DATABASE_AFFECTED: ${{ steps.check_config.outputs.should_run }}
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          SHOULD_DEPLOY=false

          if [ "$DATABASE_AFFECTED" != "true" ]; then
            echo "::notice::Skipping staging migration because no database changes are pending."
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual dispatch detected. Proceeding with staging migration."
            SHOULD_DEPLOY=true
          elif [ "$TRIGGER_CONCLUSION" = "success" ]; then
            echo "Platform preview build completed successfully. Proceeding with staging migration."
            SHOULD_DEPLOY=true
          else
            echo "::notice::Skipping staging migration because the triggering workflow concluded with '$TRIGGER_CONCLUSION'."
          fi

          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"

      - name: Setup Supabase CLI
        if: steps.evaluate.outputs.should_deploy == 'true'
        uses: ./.github/actions/setup-supabase-cli-with-retry
        with:
          github-token: ${{ github.token }}

      - name: Deploy migrations to staging
        if: steps.evaluate.outputs.should_deploy == 'true'
        run: |
          cd apps/database
          supabase link --project-ref ${{ env.STAGING_PROJECT_ID }}
          supabase db push --include-all

      - name: Record successful staging migration marker
        if: steps.evaluate.outputs.should_deploy == 'true'
        env:
          DEPLOYMENT_MARKER_REF_NAME: main
          DEPLOYMENT_MARKER_SHA: ${{ env.TARGET_SHA }}
          DEPLOYMENT_MARKER_WORKFLOW_NAME: supabase-staging.yaml
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node --experimental-strip-types
          scripts/ci/record-deployment-marker.ts
