name: Supabase Staging Migration

on:
  workflow_run:
    workflows: ["Vercel Platform Preview Deployment"]
    types:
      - completed
    branches:
      - staging
  workflow_dispatch:

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: supabase-staging.yaml

  evaluate-prerequisites:
    name: Evaluate staging prerequisites
    runs-on: ubuntu-latest
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    outputs:
      should_deploy: ${{ steps.evaluate.outputs.should_deploy }}
    steps:
      - name: Evaluate trigger status
        id: evaluate
        env:
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          SHOULD_DEPLOY=false

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual dispatch detected. Proceeding with staging migration."
            SHOULD_DEPLOY=true
          elif [ "$TRIGGER_CONCLUSION" = "success" ]; then
            echo "Preview deployment completed successfully. Proceeding with staging migration."
            SHOULD_DEPLOY=true
          else
            echo "::notice::Skipping staging migration because the triggering workflow concluded with '$TRIGGER_CONCLUSION'."
          fi

          echo "should_deploy=$SHOULD_DEPLOY" >> "$GITHUB_OUTPUT"

  deploy:
    name: Migrate staging database
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: [check-ci, evaluate-prerequisites]
    if: needs.check-ci.outputs.should_run == 'true' && needs.evaluate-prerequisites.outputs.should_deploy == 'true'

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
      STAGING_PROJECT_ID: ${{ secrets.STAGING_PROJECT_ID }}
      STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy migrations to staging
        run: |
          cd apps/database
          supabase link --project-ref ${{ env.STAGING_PROJECT_ID }}
          supabase db push
