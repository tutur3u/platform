name: Vercel TanStack Web Preview Build
on:
  workflow_dispatch:
    inputs:
      preview_ref:
        description: Branch, tag, or SHA to validate with a Vercel preview build.
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.preview_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Build-Preview:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && contains(format(',{0},', vars.TRUSTED_PREVIEW_DEPLOY_ACTORS), format(',{0},', github.actor))
    environment: vercel-preview-tanstack-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      TANSTACK_WEB_RUNTIME: vercel
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 2
          ref: ${{ inputs.preview_ref }}
          persist-credentials: false

      - name: Confirm preview ref
        id: check_commits
        run: |
          echo "Building preview ref ${{ inputs.preview_ref }}."
          echo "skip_build=false" >> $GITHUB_OUTPUT

      - name: Setup bun
        if: steps.check_commits.outputs.skip_build != 'true'
        uses: ./.github/actions/setup-bun-with-retry
        with:
          bun-version: 1.3.14

      - name: Use Node.js 24
        if: steps.check_commits.outputs.skip_build != 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24

      - name: Install dependencies
        if: steps.check_commits.outputs.skip_build != 'true'
        run: bash scripts/ci/run-with-backoff.sh bun install

      - name: Install Vercel CLI
        if: steps.check_commits.outputs.skip_build != 'true'
        run: bash scripts/ci/run-with-backoff.sh bun install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.check_commits.outputs.skip_build != 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_TANSTACK_WEB_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate shared build metadata
        if: steps.check_commits.outputs.skip_build != 'true'
        env:
          PLATFORM_BUILD_ENVIRONMENT: preview
          PLATFORM_BUILD_REF_NAME: ${{ inputs.preview_ref || github.ref_name }}
        run: bun run --silent scripts/ci/generate-build-metadata.ts

      - name: Build Project Artifacts
        if: steps.check_commits.outputs.skip_build != 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          TURBO_CONCURRENCY: "2"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_TANSTACK_WEB_PROJECT_ID }}
        uses: ./.github/actions/run-with-turbo-remote-cache
        with:
          command: vercel build --token=${{ secrets.VERCEL_TOKEN }}
          token: ${{ github.actor != 'dependabot[bot]' && secrets.TURBO_TOKEN || '' }}
          team: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}

      - name: Record successful Vercel build marker
        if: steps.check_commits.outputs.skip_build != 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERCEL_MARKER_KIND: build
          VERCEL_WORKFLOW_NAME: vercel-preview-tanstack-web.yaml
        run: bun run --silent scripts/ci/record-vercel-deployment.ts
