name: Go Backend CI/CD

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - ".github/workflows/go-backend.yml"
      - "tuturuuu.ts"
  push:
    branches: ["main", "production"]
    paths:
      - "apps/backend/**"
      - ".github/workflows/go-backend.yml"
      - "tuturuuu.ts"
  workflow_dispatch:

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: go-backend.yml

  verify:
    name: Verify
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/backend/go.mod
          cache-dependency-path: apps/backend/go.mod

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o /tmp/tuturuuu-backend ./cmd/backend

  docker:
    name: Docker Image
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile .
