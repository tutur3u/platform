name: Release tuturuuu package

on:
  pull_request:
    types: [closed]
    paths:
      - "packages/sdk/package.json"
  workflow_dispatch:

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: release-sdk-package.yaml

  check-version-bump:
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true' && github.event.pull_request.merged == true && contains(github.event.pull_request.title, 'chore(tuturuuu)')
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - id: check
        run: echo "should_release=true" >> $GITHUB_OUTPUT

  build:
    needs: check-version-bump
    if: needs.check-version-bump.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    env:
      # Use Vercel Remote Caching
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # Configure production Supabase client
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PRODUCTION_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.PRODUCTION_SUPABASE_SECRET_KEY }}

      # Configure infrastructure
      PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
      NEXT_PUBLIC_PROXY_API_KEY: ${{ secrets.NEXT_PUBLIC_PROXY_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install

      - name: Run tests
        working-directory: packages/sdk
        run: bun run test

  publish-npm:
    needs: [build]
    runs-on: ubuntu-latest

    # Trusted publishing requires the workflow to be able to mint an OIDC
    # token. See https://docs.npmjs.com/trusted-publishers for the npm-side
    # configuration (provider: GitHub Actions, repository: tutur3u/platform,
    # workflow filename: release-sdk-package.yaml).
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: bun install

      - name: Check whether the version already exists on npm
        id: version-check
        working-directory: packages/sdk
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm; skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      # npm CLI 11.5.1+ auto-detects the GitHub Actions OIDC environment and
      # exchanges it for a short-lived publish token, so no NPM_TOKEN is set.
      # Provenance attestations are generated automatically for public packages
      # in public repositories when publishing via trusted publishing.
      - name: Publish package
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/sdk
        run: npm publish