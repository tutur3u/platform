name: Cancel PR Runs On Close

on:
  pull_request_target:
    types:
      - closed

permissions:
  actions: write
  contents: read

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: cancel-pr-runs-on-close.yaml
    permissions:
      contents: read
      deployments: read

  cancel-runs:
    name: Cancel Active Runs And Delete PR Caches
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Check out trusted default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          repository: ${{ github.repository }}

      - name: Use Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24

      - name: Cancel active runs and delete caches for the closed PR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node --experimental-strip-types scripts/ci/cancel-closed-pr-runs.ts
