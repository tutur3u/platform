name: Release @tuturuuu/hooks package

on:
  push:
    branches: [production]
    paths:
      - "packages/hooks/package.json"
      - ".github/workflows/release-hooks-package.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reject-non-production-ref:
    if: github.ref != 'refs/heads/production'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Reject non-production release ref
        run: |
          echo "::error::@tuturuuu/hooks releases can only run from refs/heads/production. Current ref: ${GITHUB_REF}."
          exit 1

  check-ci:
    if: github.ref == 'refs/heads/production'
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: release-hooks-package.yaml

  check-version-bump:
    needs: [check-ci]
    if: github.ref == 'refs/heads/production' && needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - id: check
        run: echo "should_release=true" >> $GITHUB_OUTPUT

  release-gate:
    needs: [check-version-bump]
    if: github.ref == 'refs/heads/production' && needs.check-version-bump.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.gate.outputs.package_name }}
      package_version: ${{ steps.gate.outputs.package_version }}
      should_publish: ${{ steps.gate.outputs.should_publish }}
      dependencies_ready: ${{ steps.gate.outputs.dependencies_ready }}
      dependent_workflows: ${{ steps.gate.outputs.dependent_workflows }}
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Gate package release
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/ci/package-release-readiness.js gate-package-release packages/hooks

  build:
    needs: release-gate
    if: github.ref == 'refs/heads/production' && needs.release-gate.outputs.should_publish == 'true' && needs.release-gate.outputs.dependencies_ready == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: ./.github/actions/setup-bun-with-retry
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bash scripts/ci/run-with-backoff.sh bun install

      - name: Build workspace dependencies
        run: bun run --filter @tuturuuu/types build

      - name: Run type-check
        working-directory: packages/hooks
        run: bun run type-check

  prepare-publish-npm:
    needs: [build]
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.version-check.outputs.package_name }}
      package_version: ${{ steps.version-check.outputs.package_version }}
      should_publish: ${{ steps.version-check.outputs.should_publish }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup bun
        uses: ./.github/actions/setup-bun-with-retry
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: bash scripts/ci/run-with-backoff.sh bun install

      - name: Check whether the version already exists on npm
        id: version-check
        working-directory: packages/hooks
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm; skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi


      - name: Prepare npm package manifest
        if: steps.version-check.outputs.should_publish == 'true'
        run: node scripts/ci/prepare-npm-package-manifest.js packages/hooks

      - name: Pack publish artifact
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/hooks
        run: |
          mkdir -p "$RUNNER_TEMP/tuturuuu-hooks-package"
          npm pack --pack-destination "$RUNNER_TEMP/tuturuuu-hooks-package"

      - name: Upload publish artifact
        if: steps.version-check.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: tuturuuu-hooks-npm-package
          path: ${{ runner.temp }}/tuturuuu-hooks-package/*.tgz
          retention-days: 1

  publish-npm:
    needs: [prepare-publish-npm]
    if: github.ref == 'refs/heads/production' && needs.prepare-publish-npm.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: hooks-release-production

    # Trusted publishing requires the workflow to be able to mint an OIDC
    # token. Keep dependency installation, tool upgrades, package builds, and
    # lifecycle scripts out of this job so only the final artifact publish runs
    # with npm publish authority.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Check npm trusted publishing support
        run: |
          NPM_VERSION=$(npm --version)
          node - "$NPM_VERSION" <<'NODE'
          const version = process.argv[2];
          const [major = 0, minor = 0, patch = 0] = version
            .split('.')
            .map((value) => Number.parseInt(value, 10));
          const supportsTrustedPublishing =
            major > 11 ||
            (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)));

          if (!supportsTrustedPublishing) {
            throw new Error(
              `npm ${version} does not support trusted publishing. ` +
                'Use Node 24 with npm 11.5.1+ instead of installing npm ' +
                'inside the OIDC publish job.'
            );
          }

          console.log(`npm ${version} supports trusted publishing.`);
          NODE

      - name: Download publish artifact
        uses: actions/download-artifact@v8
        with:
          name: tuturuuu-hooks-npm-package
          path: hooks-package

      - name: Verify package artifact
        id: artifact
        env:
          EXPECTED_PACKAGE_NAME: ${{ needs.prepare-publish-npm.outputs.package_name }}
          EXPECTED_PACKAGE_VERSION: ${{ needs.prepare-publish-npm.outputs.package_version }}
        run: |
          PACKAGE_TARBALL=$(find hooks-package -maxdepth 1 -name '*.tgz' -type f | sort)
          TARBALL_COUNT=$(printf '%s\n' "$PACKAGE_TARBALL" | sed '/^$/d' | wc -l | tr -d ' ')

          if [ "$TARBALL_COUNT" != "1" ]; then
            echo "Expected exactly one package tarball, found ${TARBALL_COUNT}." >&2
            exit 1
          fi

          node - "$PACKAGE_TARBALL" <<'NODE'
          const { execFileSync } = require('node:child_process');
          const tarball = process.argv[2];
          const manifest = JSON.parse(
            execFileSync('tar', ['-xOf', tarball, 'package/package.json'], {
              encoding: 'utf8',
            })
          );

          if (manifest.name !== process.env.EXPECTED_PACKAGE_NAME) {
            throw new Error(
              `Artifact package name mismatch: expected ` +
                `${process.env.EXPECTED_PACKAGE_NAME}, got ${manifest.name}`
            );
          }

          if (manifest.version !== process.env.EXPECTED_PACKAGE_VERSION) {
            throw new Error(
              `Artifact package version mismatch: expected ` +
                `${process.env.EXPECTED_PACKAGE_VERSION}, got ${manifest.version}`
            );
          }

          console.log(`Verified ${manifest.name}@${manifest.version}.`);
          NODE

          echo "path=./${PACKAGE_TARBALL}" >> "$GITHUB_OUTPUT"

      # npm CLI auto-detects the GitHub Actions OIDC environment and
      # exchanges it for a short-lived publish token, so no registry token
      # secret is set.
      - name: Publish package
        env:
          EXPECTED_PACKAGE_NAME: ${{ needs.prepare-publish-npm.outputs.package_name }}
          EXPECTED_PACKAGE_VERSION: ${{ needs.prepare-publish-npm.outputs.package_version }}
        run: |
          set -o pipefail
          PUBLISH_LOG="${RUNNER_TEMP}/npm-publish.log"

          if ! npm publish "${{ steps.artifact.outputs.path }}" --ignore-scripts 2>&1 | tee "$PUBLISH_LOG"; then
            if grep -Eiq 'E404|404 Not Found|not have permission|ENEEDAUTH' "$PUBLISH_LOG"; then
              echo "::error::npm could not publish ${EXPECTED_PACKAGE_NAME}@${EXPECTED_PACKAGE_VERSION}. Ensure the npm package exists when npm requires first-publish setup, package access is public, and the trusted publisher is configured for this repository, workflow filename, and environment."
            fi

            exit 1
          fi

      - name: Wait for npm publication
        env:
          EXPECTED_PACKAGE_NAME: ${{ needs.prepare-publish-npm.outputs.package_name }}
          EXPECTED_PACKAGE_VERSION: ${{ needs.prepare-publish-npm.outputs.package_version }}
        run: |
          for attempt in {1..60}; do
            if npm view "${EXPECTED_PACKAGE_NAME}@${EXPECTED_PACKAGE_VERSION}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
              echo "${EXPECTED_PACKAGE_NAME}@${EXPECTED_PACKAGE_VERSION} is visible on npm."
              exit 0
            fi

            echo "Waiting for ${EXPECTED_PACKAGE_NAME}@${EXPECTED_PACKAGE_VERSION} on npm (${attempt}/60)."
            sleep 10
          done

          echo "::error::${EXPECTED_PACKAGE_NAME}@${EXPECTED_PACKAGE_VERSION} was published but did not become visible on npm before timeout."
          exit 1

  dispatch-dependent-releases:
    needs: [release-gate, publish-npm]
    if: github.ref == 'refs/heads/production' && needs.publish-npm.result == 'success' && needs.release-gate.outputs.dependent_workflows != '[]'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Dispatch dependent package releases
        env:
          DEPENDENT_WORKFLOWS: ${{ needs.release-gate.outputs.dependent_workflows }}
          GH_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          const workflows = JSON.parse(process.env.DEPENDENT_WORKFLOWS || '[]');
          const token = process.env.GH_TOKEN;
          const repository = process.env.GITHUB_REPOSITORY;
          const ref =
            process.env.GITHUB_REF_NAME ||
            (process.env.GITHUB_REF || '').replace(/^refs\/heads\//u, '');

          if (!Array.isArray(workflows)) {
            throw new Error('DEPENDENT_WORKFLOWS must be a JSON array.');
          }

          if (workflows.length === 0) {
            console.log('No dependent package release workflows to dispatch.');
            process.exit(0);
          }

          if (!token || !repository || !ref) {
            throw new Error('Missing GitHub token, repository, or ref for dependent dispatch.');
          }

          (async () => {
            for (const workflowName of workflows) {
              const url =
                'https://api.github.com/repos/' +
                repository +
                '/actions/workflows/' +
                encodeURIComponent(workflowName) +
                '/dispatches';

              const response = await fetch(url, {
                body: JSON.stringify({ ref }),
                headers: {
                  Authorization: `Bearer ${token}`,
                  'Content-Type': 'application/json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'User-Agent': 'tuturuuu-package-release-dispatch',
                },
                method: 'POST',
              });

              if (!response.ok) {
                const body = await response.text().catch(() => '');
                throw new Error(
                  `Unable to dispatch ${workflowName} on ${ref}: ${response.status} ${response.statusText}${
                    body ? ` ${body}` : ''
                  }`
                );
              }

              console.log(`Dispatched ${workflowName} on ${ref}.`);
            }
          })().catch((error) => {
            console.error(`::error::${error.message}`);
            process.exit(1);
          });
          NODE
