name: E2E Tests

on:
  push:

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: e2e-tests.yaml

  e2e:
    name: Playwright E2E (${{ matrix.shard }}/${{ matrix.total_shards }})
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    timeout-minutes: 45
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total_shards: [4]

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      BASE_URL: http://localhost:7803
      DOCKER_WEB_COMPOSE_PROJECT_NAME: ttr-e2e-${{ github.run_id }}-${{ matrix.shard }}
      E2E_SHARD_INDEX: ${{ matrix.shard }}
      E2E_TOTAL_SHARDS: ${{ matrix.total_shards }}
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:8001

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Free runner disk for Dockerized E2E
        run: |
          df -h /
          docker system prune -af --volumes || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      # --- Supabase local stack ---
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Get Supabase CLI version
        id: supabase-version
        run: echo "version=$(supabase --version)" >> "$GITHUB_OUTPUT"

      - name: Restore cached Docker images
        id: cache-supabase
        uses: actions/cache/restore@v5
        with:
          path: /tmp/supabase-docker
          key: supabase-docker-${{ runner.os }}-${{ steps.supabase-version.outputs.version }}

      - name: Load cached Docker images
        if: steps.cache-supabase.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-docker/images.tar || true

      # --- Node / Bun ---
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache turbo build
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-e2e-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-e2e-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        working-directory: apps/web
        run: bunx playwright install chromium

      # --- Run E2E tests against Docker web + local Docker Supabase ---
      - name: Run Playwright shard
        working-directory: apps/web
        run: bun test:e2e -- --shard=${{ matrix.shard }}/${{ matrix.total_shards }}

      - name: Save Supabase Docker images for cache
        if: ${{ always() && matrix.shard == 1 && steps.cache-supabase.outputs.cache-hit != 'true' }}
        run: |
          mkdir -p /tmp/supabase-docker
          docker images --format '{{.Repository}}:{{.Tag}}' | grep 'supabase/' | grep -v '<none>' | xargs -r docker save -o /tmp/supabase-docker/images.tar

      - name: Cache Supabase Docker images
        if: ${{ always() && matrix.shard == 1 && steps.cache-supabase.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: /tmp/supabase-docker
          key: supabase-docker-${{ runner.os }}-${{ steps.supabase-version.outputs.version }}

      # --- Upload artifacts on failure ---
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.shard }}-of-${{ matrix.total_shards }}
          path: apps/web/blob-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-results-${{ matrix.shard }}-of-${{ matrix.total_shards }}
          path: apps/web/test-results/
          retention-days: 14

      # --- Cleanup ---
      - name: Stop Docker web and Supabase
        if: always()
        run: |
          node scripts/docker-web.js down --mode prod --strategy blue-green --env-file tmp/e2e/web.env || true
          bun sb:stop || true
