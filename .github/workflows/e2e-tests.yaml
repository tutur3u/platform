name: E2E Tests

on:
  push:
    branches-ignore:
      - production
  workflow_dispatch:

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: e2e-tests.yaml

  e2e:
    name: Playwright E2E (${{ matrix.shard }}/${{ matrix.total_shards }})
    needs: [check-ci]
    if: github.ref != 'refs/heads/production' && needs.check-ci.outputs.should_run == 'true'
    timeout-minutes: 45
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total_shards: [4]

    env:
      BASE_URL: https://tuturuuu.localhost:1355
      DOCKER_WEB_CACHE_BACKEND_FROM: type=gha,scope=docker-backend,timeout=10m
      DOCKER_WEB_CACHE_CHAT_REALTIME_FROM: type=gha,scope=docker-chat-realtime,timeout=10m
      DOCKER_WEB_CACHE_HIVE_FROM: type=gha,scope=docker-hive-prod,timeout=10m
      DOCKER_WEB_CACHE_HIVE_REALTIME_FROM: type=gha,scope=docker-hive-realtime,timeout=10m
      DOCKER_WEB_CACHE_MARKITDOWN_FROM: type=gha,scope=docker-markitdown,timeout=10m
      DOCKER_WEB_CACHE_MEET_REALTIME_FROM: type=gha,scope=docker-meet-realtime,timeout=10m
      DOCKER_WEB_CACHE_STORAGE_UNZIP_FROM: type=gha,scope=docker-storage-unzip-proxy,timeout=10m
      DOCKER_WEB_CACHE_SUPERMEMORY_FROM: type=gha,scope=docker-supermemory,timeout=10m
      DOCKER_WEB_CACHE_TANSTACK_FROM: type=gha,scope=docker-tanstack-web-prod,timeout=10m
      DOCKER_WEB_CACHE_WEB_FROM: type=gha,scope=docker-web-prod,timeout=10m
      DOCKER_WEB_COMPOSE_PROJECT_NAME: ttr-e2e-${{ github.run_id }}-${{ matrix.shard }}
      E2E_SHARD_INDEX: ${{ matrix.shard }}
      E2E_TOTAL_SHARDS: ${{ matrix.total_shards }}
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:8001
      PORTLESS_PORT: "1355"

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Free runner disk for Dockerized E2E
        run: |
          df -h /
          docker system prune -af --volumes || true
          docker builder prune -af || true
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/share/swift \
            /opt/az \
            /opt/ghc \
            /opt/google \
            /opt/hostedtoolcache/CodeQL || true
          df -h /

      # --- Supabase local stack ---
      - name: Setup Supabase CLI
        uses: ./.github/actions/setup-supabase-cli-with-retry
        with:
          github-token: ${{ github.token }}

      - name: Get Supabase CLI version
        id: supabase-version
        run: echo "version=$(supabase --version)" >> "$GITHUB_OUTPUT"

      - name: Restore cached Docker images
        id: cache-supabase
        uses: actions/cache/restore@v6
        with:
          path: /tmp/supabase-docker
          key: supabase-docker-v2-${{ runner.os }}-${{ runner.arch }}-${{ steps.supabase-version.outputs.version }}-images
          restore-keys: |
            supabase-docker-v2-${{ runner.os }}-${{ runner.arch }}-${{ steps.supabase-version.outputs.version }}-

      - name: Load cached Docker images
        if: steps.cache-supabase.outputs.cache-matched-key != ''
        run: docker load -i /tmp/supabase-docker/images.tar || true

      # --- Node / Bun ---
      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-retry
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Expose GitHub cache runtime to BuildKit
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      - name: Configure trusted BuildKit cache exports
        if: ${{ github.ref == 'refs/heads/main' && matrix.shard == 1 }}
        run: |
          {
            echo 'DOCKER_WEB_CACHE_CHAT_REALTIME_TO=type=gha,scope=docker-chat-realtime,mode=min,timeout=10m,ignore-error=true'
            echo 'DOCKER_WEB_CACHE_HIVE_TO=type=gha,scope=docker-hive-prod,mode=min,timeout=10m,ignore-error=true'
            echo 'DOCKER_WEB_CACHE_HIVE_REALTIME_TO=type=gha,scope=docker-hive-realtime,mode=min,timeout=10m,ignore-error=true'
            echo 'DOCKER_WEB_CACHE_MARKITDOWN_TO=type=gha,scope=docker-markitdown,mode=min,timeout=10m,ignore-error=true'
            echo 'DOCKER_WEB_CACHE_MEET_REALTIME_TO=type=gha,scope=docker-meet-realtime,mode=min,timeout=10m,ignore-error=true'
            echo 'DOCKER_WEB_CACHE_SUPERMEMORY_TO=type=gha,scope=docker-supermemory,mode=min,timeout=10m,ignore-error=true'
          } >> "$GITHUB_ENV"

      - name: Prepare trusted Turbo BuildKit secrets
        if: ${{ github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]' }}
        env:
          CACHE_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
          CACHE_TOKEN: ${{ secrets.TURBO_TOKEN }}
        run: |
          if [ -z "${CACHE_TOKEN:-}" ]; then
            echo "::notice title=Turbo BuildKit cache disabled::TURBO_TOKEN is not configured."
            exit 0
          fi
          if [ -z "${CACHE_TEAM:-}" ]; then
            echo "::error title=Invalid Turbo BuildKit cache configuration::TURBO_TEAM is required when TURBO_TOKEN is configured."
            exit 1
          fi

          umask 077
          printf '%s' "$CACHE_TEAM" > "$RUNNER_TEMP/turbo-team"
          printf '%s' "$CACHE_TOKEN" > "$RUNNER_TEMP/turbo-token"
          {
            echo "DOCKER_WEB_TURBO_TEAM_SECRET_FILE=$RUNNER_TEMP/turbo-team"
            echo "DOCKER_WEB_TURBO_TOKEN_SECRET_FILE=$RUNNER_TEMP/turbo-token"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bash scripts/ci/run-with-backoff.sh bun install

      - name: Install Playwright browsers
        working-directory: apps/web
        run: bun x playwright install chromium

      # --- Run E2E tests against Docker web + local Docker Supabase ---
      - name: Run Playwright shard
        working-directory: apps/web
        run: |
          mkdir -p ../../tmp/e2e-diagnostics
          set -o pipefail
          bun test:e2e -- --shard=${{ matrix.shard }}/${{ matrix.total_shards }} 2>&1 | tee ../../tmp/e2e-diagnostics/run-playwright-shard.log

      - name: Collect Dockerized E2E diagnostics
        if: ${{ failure() }}
        run: |
          set +e
          diagnostics_dir="tmp/e2e-diagnostics"
          mkdir -p "$diagnostics_dir"

          {
            printf 'run_id=%s\n' "${GITHUB_RUN_ID}"
            printf 'job=%s\n' "${GITHUB_JOB}"
            printf 'sha=%s\n' "${GITHUB_SHA}"
            printf 'ref=%s\n' "${GITHUB_REF}"
            printf 'shard=%s/%s\n' "${E2E_SHARD_INDEX}" "${E2E_TOTAL_SHARDS}"
            printf 'base_url=%s\n' "${BASE_URL}"
            printf 'portless_port=%s\n' "${PORTLESS_PORT}"
            printf 'docker_web_proxy_host_port=%s\n' "${DOCKER_WEB_PROXY_HOST_PORT:-7803}"
            printf 'compose_project=%s\n' "${DOCKER_WEB_COMPOSE_PROJECT_NAME}"
            date -u +"collected_at=%Y-%m-%dT%H:%M:%SZ"
          } > "$diagnostics_dir/summary.txt"

          if [ -f tmp/e2e/web.env ]; then
            sed -E 's/^([^=]+)=.*/\1=<redacted>/' tmp/e2e/web.env > "$diagnostics_dir/web-env.keys.txt"
          else
            echo "tmp/e2e/web.env not found" > "$diagnostics_dir/web-env.keys.txt"
          fi

          docker ps -a --filter "label=com.docker.compose.project=${DOCKER_WEB_COMPOSE_PROJECT_NAME}" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" > "$diagnostics_dir/docker-containers.txt" 2>&1 || true
          docker compose --env-file tmp/e2e/web.env -f docker-compose.web.prod.yml -p "${DOCKER_WEB_COMPOSE_PROJECT_NAME}" ps -a > "$diagnostics_dir/docker-compose-ps.txt" 2>&1 || true
          docker compose --env-file tmp/e2e/web.env -f docker-compose.web.prod.yml -p "${DOCKER_WEB_COMPOSE_PROJECT_NAME}" logs --tail=1000 web-proxy web-blue web-green hive-blue hive-green hive-realtime meet-realtime backend markitdown storage-unzip-proxy web-cron-runner > "$diagnostics_dir/docker-compose-services.log" 2>&1 || true
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" > "$diagnostics_dir/docker-images.txt" 2>&1 || true
          web_proxy_login_url="http://127.0.0.1:${DOCKER_WEB_PROXY_HOST_PORT:-7803}/login"
          curl -i --max-time 10 "$web_proxy_login_url" > "$diagnostics_dir/web-proxy-login.txt" 2>&1 || true
          bun x portless list > "$diagnostics_dir/portless-list.txt" 2>&1 || true
          portless_login_url="${BASE_URL%/}/login"
          curl -k -i --max-time 10 "$portless_login_url" > "$diagnostics_dir/portless-login.txt" 2>&1 || true
          bun sb:status > "$diagnostics_dir/supabase-status.txt" 2>&1 || true

          if [ -f apps/web/test-results/.last-run.json ]; then
            cp apps/web/test-results/.last-run.json "$diagnostics_dir/playwright-last-run.json"
          else
            echo "apps/web/test-results/.last-run.json not found" > "$diagnostics_dir/playwright-last-run.json"
          fi

          echo "::group::Docker containers for E2E project"
          cat "$diagnostics_dir/docker-containers.txt"
          echo "::endgroup::"

          echo "::group::Docker Compose status"
          cat "$diagnostics_dir/docker-compose-ps.txt"
          echo "::endgroup::"

          echo "::group::Docker Compose logs"
          tail -n 300 "$diagnostics_dir/docker-compose-services.log"
          echo "::endgroup::"

          echo "::group::Docker web proxy login probe"
          cat "$diagnostics_dir/web-proxy-login.txt"
          echo "::endgroup::"

          echo "::group::Supabase status"
          cat "$diagnostics_dir/supabase-status.txt"
          echo "::endgroup::"

          echo "::group::Portless login probe"
          cat "$diagnostics_dir/portless-login.txt"
          echo "::endgroup::"

          echo "::group::Playwright last run"
          cat "$diagnostics_dir/playwright-last-run.json"
          echo "::endgroup::"

      - name: Redact E2E diagnostics artifact
        if: ${{ failure() }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const diagnosticsDir = path.join('tmp', 'e2e-diagnostics');
          const sensitiveEnvNamePattern =
            /(token|secret|key|password|cookie|credential|authorization|session)/i;
          const sensitiveKeyValuePattern =
            /\b([A-Z0-9_]*(?:TOKEN|SECRET|KEY|PASSWORD|COOKIE|CREDENTIAL|AUTHORIZATION|SESSION)[A-Z0-9_]*)\s*[:=]\s*("[^"\n]*"|'[^'\n]*'|[^\s,;}\]]+)/gi;
          const sensitiveQueryPattern =
            /([?&](?:access[_-]?token|api[_-]?key|authorization|code|cookie|key|password|refresh[_-]?token|secret|session|token)=)[^&\s]+/gi;
          const bearerPattern = /\b(Authorization:\s*Bearer\s+)[^\s'"]+/gi;
          const jwtPattern =
            /\beyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\b/g;

          function walkFiles(dir) {
            if (!fs.existsSync(dir)) return [];

            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const entryPath = path.join(dir, entry.name);
              if (entry.isDirectory()) return walkFiles(entryPath);
              return entry.isFile() ? [entryPath] : [];
            });
          }

          const literalSecrets = Object.entries(process.env)
            .filter(([name, value]) => sensitiveEnvNamePattern.test(name) && value)
            .map(([, value]) => value)
            .filter((value) => value.length >= 8);

          function redact(value) {
            let redacted = value;

            for (const secret of literalSecrets) {
              redacted = redacted.split(secret).join('<redacted>');
            }

            return redacted
              .replace(bearerPattern, '$1<redacted>')
              .replace(sensitiveQueryPattern, '$1<redacted>')
              .replace(sensitiveKeyValuePattern, '$1=<redacted>')
              .replace(jwtPattern, '<redacted-jwt>');
          }

          for (const filePath of walkFiles(diagnosticsDir)) {
            const original = fs.readFileSync(filePath, 'utf8');
            const redacted = redact(original);
            if (redacted !== original) {
              fs.writeFileSync(filePath, redacted);
            }
          }
          NODE

      - name: Save Supabase Docker images for cache
        id: prepare-supabase-docker-cache
        if: ${{ always() && github.ref == 'refs/heads/main' && matrix.shard == 1 && steps.cache-supabase.outputs.cache-matched-key == '' }}
        run: |
          mkdir -p /tmp/supabase-docker
          docker images --format '{{.Repository}}:{{.Tag}}' | grep 'supabase/' | grep -v '<none>' | xargs -r docker save -o /tmp/supabase-docker/images.tar
          if [ -s /tmp/supabase-docker/images.tar ]; then
            echo "cache-ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Supabase Docker images were available to cache."
            echo "cache-ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Supabase Docker images
        if: ${{ always() && steps.prepare-supabase-docker-cache.outputs.cache-ready == 'true' }}
        uses: actions/cache/save@v6
        with:
          path: /tmp/supabase-docker
          key: supabase-docker-v2-${{ runner.os }}-${{ runner.arch }}-${{ steps.supabase-version.outputs.version }}-images

      # --- Upload one consolidated artifact per failed shard ---
      - name: Upload E2E failure artifact
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: e2e-failure-${{ matrix.shard }}-of-${{ matrix.total_shards }}
          path: |
            tmp/e2e-diagnostics/
            apps/web/blob-report/
            apps/web/test-results/
          if-no-files-found: warn
          retention-days: 7

      # --- Cleanup ---
      - name: Stop Docker web and Supabase
        if: always()
        run: |
          node scripts/docker-web.js down --mode prod --strategy blue-green --env-file tmp/e2e/web.env || true
          bun sb:stop || true

      - name: Remove Turbo BuildKit secret files
        if: always()
        run: rm -f "$RUNNER_TEMP/turbo-team" "$RUNNER_TEMP/turbo-token"

  migration-e2e:
    name: Migration E2E (${{ matrix.mode }})
    needs: [check-ci]
    if: github.ref != 'refs/heads/production' && needs.check-ci.outputs.should_run == 'true'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: tanstack-dual-stack
            command: bun test:e2e:tanstack:docker -- -- --project=chromium
            playwright_workdir: apps/tanstack-web
            setup_supabase: "false"
          - mode: compare-smoke
            command: bun test:e2e:web:docker:compare -- public-marketing-routes.noauth.spec.ts --project=chromium-no-auth
            playwright_workdir: apps/web
            setup_supabase: "true"

    env:
      BASE_URL: https://tuturuuu.localhost:1355
      DOCKER_WEB_CACHE_BACKEND_FROM: type=gha,scope=docker-backend,timeout=10m
      DOCKER_WEB_CACHE_CHAT_REALTIME_FROM: type=gha,scope=docker-chat-realtime,timeout=10m
      DOCKER_WEB_CACHE_HIVE_FROM: type=gha,scope=docker-hive-prod,timeout=10m
      DOCKER_WEB_CACHE_HIVE_REALTIME_FROM: type=gha,scope=docker-hive-realtime,timeout=10m
      DOCKER_WEB_CACHE_MARKITDOWN_FROM: type=gha,scope=docker-markitdown,timeout=10m
      DOCKER_WEB_CACHE_MEET_REALTIME_FROM: type=gha,scope=docker-meet-realtime,timeout=10m
      DOCKER_WEB_CACHE_STORAGE_UNZIP_FROM: type=gha,scope=docker-storage-unzip-proxy,timeout=10m
      DOCKER_WEB_CACHE_SUPERMEMORY_FROM: type=gha,scope=docker-supermemory,timeout=10m
      DOCKER_WEB_CACHE_TANSTACK_FROM: type=gha,scope=docker-tanstack-web-prod,timeout=10m
      DOCKER_WEB_CACHE_WEB_FROM: type=gha,scope=docker-web-prod,timeout=10m
      COMPOSE_PROJECT_NAME: ttr-migration-e2e-${{ github.run_id }}-${{ matrix.mode }}
      DOCKER_WEB_COMPOSE_PROJECT_NAME: ttr-migration-e2e-${{ github.run_id }}-${{ matrix.mode }}
      E2E_COMPARE_REPORT_PATH: tmp/e2e/web-migration/${{ matrix.mode }}-compare-report.json
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:8001
      PORTLESS_PORT: "1355"

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Free runner disk for Dockerized migration E2E
        run: |
          df -h /
          docker system prune -af --volumes || true
          docker builder prune -af || true
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/share/swift \
            /opt/az \
            /opt/ghc \
            /opt/google \
            /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Setup Supabase CLI
        if: matrix.setup_supabase == 'true'
        uses: ./.github/actions/setup-supabase-cli-with-retry
        with:
          github-token: ${{ github.token }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun-with-retry
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Expose GitHub cache runtime to BuildKit
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      - name: Prepare trusted Turbo BuildKit secrets
        if: ${{ github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]' }}
        env:
          CACHE_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
          CACHE_TOKEN: ${{ secrets.TURBO_TOKEN }}
        run: |
          if [ -z "${CACHE_TOKEN:-}" ]; then
            echo "::notice title=Turbo BuildKit cache disabled::TURBO_TOKEN is not configured."
            exit 0
          fi
          if [ -z "${CACHE_TEAM:-}" ]; then
            echo "::error title=Invalid Turbo BuildKit cache configuration::TURBO_TEAM is required when TURBO_TOKEN is configured."
            exit 1
          fi

          umask 077
          printf '%s' "$CACHE_TEAM" > "$RUNNER_TEMP/turbo-team"
          printf '%s' "$CACHE_TOKEN" > "$RUNNER_TEMP/turbo-token"
          {
            echo "DOCKER_WEB_TURBO_TEAM_SECRET_FILE=$RUNNER_TEMP/turbo-team"
            echo "DOCKER_WEB_TURBO_TOKEN_SECRET_FILE=$RUNNER_TEMP/turbo-token"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bash scripts/ci/run-with-backoff.sh bun install

      - name: Install Playwright browsers
        working-directory: ${{ matrix.playwright_workdir }}
        run: bun x playwright install chromium

      - name: Run migration E2E
        run: ${{ matrix.command }}

      - name: Upload migration E2E artifacts
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: migration-e2e-${{ matrix.mode }}
          path: |
            apps/tanstack-web/playwright-report/
            apps/tanstack-web/test-results/
            apps/web/blob-report/
            apps/web/test-results/
            tmp/e2e/web-migration/*.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop migration E2E stacks
        if: always()
        run: |
          docker compose -f docker-compose.tanstack-dual.yml down || true
          node scripts/docker-web.js down --mode prod --strategy blue-green --env-file tmp/e2e/web.env || true
          bun sb:stop || true

      - name: Remove Turbo BuildKit secret files
        if: always()
        run: rm -f "$RUNNER_TEMP/turbo-team" "$RUNNER_TEMP/turbo-token"
