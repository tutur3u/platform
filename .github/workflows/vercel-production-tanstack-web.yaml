name: Vercel TanStack Web Production Build
on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production-tanstack-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: vercel-production-tanstack-web.yaml
    permissions:
      contents: read
      deployments: read

  Build-Production:
    needs: [check-ci]
    if: github.ref == 'refs/heads/production' && needs.check-ci.outputs.should_run == 'true'
    environment: vercel-production-tanstack-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      TANSTACK_WEB_RUNTIME: vercel
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Check for newer commits
        id: check_commits
        run: |
          git fetch origin production || { echo "Remote branch not found, continuing with build"; echo "skip_build=false" >> $GITHUB_OUTPUT; exit 0; }
          LATEST_COMMIT=$(git rev-parse origin/production 2>/dev/null || echo "")
          CURRENT_COMMIT=${GITHUB_SHA}
          if [ -n "$LATEST_COMMIT" ] && [ "$LATEST_COMMIT" != "$CURRENT_COMMIT" ]; then
            echo "Newer commit found on production branch. Skipping build."
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "This is the latest commit. Proceeding with build."
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup bun
        if: steps.check_commits.outputs.skip_build != 'true'
        uses: ./.github/actions/setup-bun-with-retry
        with:
          bun-version: 1.3.14

      - name: Use Node.js 24
        if: steps.check_commits.outputs.skip_build != 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24

      - name: Install dependencies
        if: steps.check_commits.outputs.skip_build != 'true'
        run: bash scripts/ci/run-with-backoff.sh bun install

      - name: Install Vercel CLI
        if: steps.check_commits.outputs.skip_build != 'true'
        run: bash scripts/ci/run-with-backoff.sh bun install --global vercel@latest

      - name: Check Vercel project configuration
        id: vercel_config
        if: steps.check_commits.outputs.skip_build != 'true'
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_TANSTACK_WEB_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::notice title=TanStack Web Vercel deployment skipped::VERCEL_TANSTACK_WEB_PROJECT_ID is not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel Environment Information
        if: steps.check_commits.outputs.skip_build != 'true' && steps.vercel_config.outputs.configured == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_TANSTACK_WEB_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate shared build metadata
        if: steps.check_commits.outputs.skip_build != 'true' && steps.vercel_config.outputs.configured == 'true'
        env:
          PLATFORM_BUILD_ENVIRONMENT: production
          PLATFORM_BUILD_REF_NAME: production
        run: bun run --silent scripts/ci/generate-build-metadata.ts

      - name: Build Project Artifacts
        if: steps.check_commits.outputs.skip_build != 'true' && steps.vercel_config.outputs.configured == 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          TURBO_CONCURRENCY: "2"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_TANSTACK_WEB_PROJECT_ID }}
        uses: ./.github/actions/run-with-turbo-remote-cache
        with:
          command: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          token: ${{ github.actor != 'dependabot[bot]' && secrets.TURBO_TOKEN || '' }}
          team: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}

      - name: Record successful Vercel build marker
        if: steps.check_commits.outputs.skip_build != 'true' && steps.vercel_config.outputs.configured == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERCEL_MARKER_KIND: build
          VERCEL_WORKFLOW_NAME: vercel-production-tanstack-web.yaml
        run: bun run --silent scripts/ci/record-vercel-deployment.ts
