name: Vercel TanStack Web Production Build
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production-tanstack-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build-Production:
    if: github.ref == 'refs/heads/production'
    environment: vercel-production-tanstack-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      TANSTACK_WEB_RUNTIME: vercel
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Setup bun
        uses: ./.github/actions/setup-bun-with-retry
        with:
          bun-version: 1.3.14

      - name: Use Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24

      - name: Install dependencies
        run: bash scripts/ci/run-with-backoff.sh bun install

      - name: Install Vercel CLI
        run: bash scripts/ci/run-with-backoff.sh bun install --global vercel@latest

      - name: Check Vercel project configuration
        id: vercel_config
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_TANSTACK_WEB_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "::notice title=TanStack Web Vercel deployment skipped::VERCEL_TANSTACK_WEB_PROJECT_ID is not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel Environment Information
        if: steps.vercel_config.outputs.configured == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_TANSTACK_WEB_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate shared build metadata
        if: steps.vercel_config.outputs.configured == 'true'
        env:
          PLATFORM_BUILD_ENVIRONMENT: production
          PLATFORM_BUILD_REF_NAME: production
        run: bun run --silent scripts/ci/generate-build-metadata.ts

      - name: Build Project Artifacts
        if: steps.vercel_config.outputs.configured == 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          TURBO_CONCURRENCY: "2"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_TANSTACK_WEB_PROJECT_ID }}
        uses: ./.github/actions/run-with-turbo-remote-cache
        with:
          command: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          token: ${{ github.actor != 'dependabot[bot]' && secrets.TURBO_TOKEN || '' }}
          team: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}

      - name: Record successful Vercel build marker
        if: steps.vercel_config.outputs.configured == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERCEL_MARKER_KIND: build
          VERCEL_WORKFLOW_NAME: vercel-production-tanstack-web.yaml
        run: bun run --silent scripts/ci/record-vercel-deployment.ts
