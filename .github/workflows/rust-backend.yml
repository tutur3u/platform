name: Rust Backend CI/CD

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "apps/tanstack-web/migration/**"
      - ".github/workflows/rust-backend.yml"
      - "tuturuuu.ts"
  push:
    branches: ["main", "production"]
    paths:
      - "apps/backend/**"
      - "apps/tanstack-web/migration/**"
      - ".github/workflows/rust-backend.yml"
      - "tuturuuu.ts"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: rust-backend.yml

  verify:
    name: Verify
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Check formatting
        run: cargo fmt --check

      - name: Download modules
        run: cargo fetch --locked

      - name: Clippy
        run: cargo clippy --locked --all-targets --features native -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Check Cloudflare Worker target
        run: cargo check --locked --target wasm32-unknown-unknown --no-default-features --features worker

      - name: Install worker-build
        run: cargo install worker-build --locked

      - name: Build Cloudflare Worker bundle
        run: worker-build --release -- --no-default-features --features worker

      - name: Build
        run: cargo build --locked --release --features native --bin backend

  docker:
    name: Docker Image
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile .
