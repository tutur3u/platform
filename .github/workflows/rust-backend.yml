name: Rust Backend CI/CD

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "apps/tanstack-web/migration/**"
      - "apps/tanstack-web/package.json"
      - "apps/tanstack-web/src/lib/cloudflare/backend.ts"
      - "apps/tanstack-web/src/lib/migration-status.ts"
      - "apps/tanstack-web/src/routeTree.gen.ts"
      - "apps/tanstack-web/vite.config.ts"
      - "apps/tanstack-web/wrangler.jsonc"
      - "apps/backend/README.md"
      - "apps/docs/build/devops/web-docker-deployment.mdx"
      - "apps/docs/platform/architecture/tanstack-rust-migration.mdx"
      - "packages/internal-api/src/backend.ts"
      - ".github/workflows/rust-backend.yml"
      - "package.json"
      - "scripts/check-cloudflare-workers.js"
      - "scripts/check-cloudflare-workers.test.js"
      - "scripts/smoke-cloudflare-workers.js"
      - "scripts/smoke-cloudflare-workers.test.js"
      - "tuturuuu.ts"
  push:
    branches: ["main", "production"]
    paths:
      - "apps/backend/**"
      - "apps/tanstack-web/migration/**"
      - "apps/tanstack-web/package.json"
      - "apps/tanstack-web/src/lib/cloudflare/backend.ts"
      - "apps/tanstack-web/src/lib/migration-status.ts"
      - "apps/tanstack-web/src/routeTree.gen.ts"
      - "apps/tanstack-web/vite.config.ts"
      - "apps/tanstack-web/wrangler.jsonc"
      - "apps/backend/README.md"
      - "apps/docs/build/devops/web-docker-deployment.mdx"
      - "apps/docs/platform/architecture/tanstack-rust-migration.mdx"
      - "packages/internal-api/src/backend.ts"
      - ".github/workflows/rust-backend.yml"
      - "package.json"
      - "scripts/check-cloudflare-workers.js"
      - "scripts/check-cloudflare-workers.test.js"
      - "scripts/smoke-cloudflare-workers.js"
      - "scripts/smoke-cloudflare-workers.test.js"
      - "tuturuuu.ts"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    permissions:
      contents: read
      deployments: read
    with:
      workflow_name: rust-backend.yml

  verify:
    name: Verify
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Check Cloudflare deployment config
        working-directory: .
        run: node scripts/check-cloudflare-workers.js

      - name: Check Cloudflare smoke reporter
        working-directory: .
        run: node --test scripts/smoke-cloudflare-workers.test.js

      - name: Check formatting
        run: cargo fmt --check

      - name: Download modules
        run: cargo fetch --locked

      - name: Clippy
        run: cargo clippy --locked --all-targets --features native -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Check Cloudflare Worker target
        run: cargo check --locked --target wasm32-unknown-unknown --no-default-features --features worker

      - name: Install worker-build
        run: cargo install worker-build --locked

      - name: Build Cloudflare Worker bundle
        run: worker-build --release -- --no-default-features --features worker

      - name: Build
        run: cargo build --locked --release --features native --bin backend

  docker:
    name: Docker Image
    needs: [check-ci]
    if: needs.check-ci.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile .
