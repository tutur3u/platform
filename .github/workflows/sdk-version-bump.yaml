name: SDK Version Bump

on:
  pull_request:
    paths:
      - ".github/workflows/sdk-version-bump.yaml"
      - "packages/sdk/**"
      - "scripts/ci/check-sdk-version-bump.mjs"
      - "tuturuuu.ts"
  push:
    branches:
      - production
    paths:
      - ".github/workflows/sdk-version-bump.yaml"
      - "packages/sdk/**"
      - "scripts/ci/check-sdk-version-bump.mjs"
      - "tuturuuu.ts"
  workflow_dispatch:

jobs:
  check-ci:
    uses: ./.github/workflows/ci-check.yml
    with:
      workflow_name: sdk-version-bump.yaml

  validate-version:
    name: Validate SDK Version Bump
    runs-on: ubuntu-latest
    needs: [check-ci]
    if: github.event_name == 'pull_request' && needs.check-ci.outputs.should_run == 'true'
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check SDK version bump
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          node scripts/ci/check-sdk-version-bump.mjs \
            --base "$BASE_REF" \
            --head "$HEAD_REF" \
            --mode check

  auto-bump-version:
    name: Open SDK Version Bump PR
    runs-on: ubuntu-latest
    needs: [check-ci]
    if: github.event_name != 'pull_request' && needs.check-ci.outputs.should_run == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve comparison base
        id: refs
        env:
          EVENT_BEFORE: ${{ github.event.before || '' }}
        run: |
          if [ -n "$EVENT_BEFORE" ] && ! [[ "$EVENT_BEFORE" =~ ^0+$ ]]; then
            BASE_REF="$EVENT_BEFORE"
          else
            BASE_REF="$(git rev-parse HEAD^)"
          fi

          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_ref=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Detect SDK version bump need
        id: detect
        run: |
          node scripts/ci/check-sdk-version-bump.mjs \
            --base "${{ steps.refs.outputs.base_ref }}" \
            --head "${{ steps.refs.outputs.head_ref }}" \
            --mode detect

      - name: Bump SDK patch version
        if: steps.detect.outputs.needs_bump == 'true'
        run: |
          node scripts/ci/check-sdk-version-bump.mjs \
            --base "${{ steps.refs.outputs.base_ref }}" \
            --head "${{ steps.refs.outputs.head_ref }}" \
            --mode bump

      - name: Create SDK version bump PR
        if: steps.detect.outputs.needs_bump == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(sdk): bump version to ${{ steps.detect.outputs.next_version }}"
          title: "chore(sdk): bump version to ${{ steps.detect.outputs.next_version }}"
          body: |
            Release-impacting SDK files changed without a package version bump.

            This PR bumps `packages/sdk/package.json` from `${{ steps.detect.outputs.current_version }}` to `${{ steps.detect.outputs.next_version }}` so `.github/workflows/release-sdk-package.yaml` can publish the new `tuturuuu` release after merge.

            Changed release-impacting files:

            ```text
            ${{ steps.detect.outputs.changed_files }}
            ```
          branch: chore/sdk-version-bump-${{ github.sha }}
          base: ${{ github.ref_name }}
          delete-branch: true
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
