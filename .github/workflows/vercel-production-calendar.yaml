name: Vercel Calendar Production Deployment
on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: vercel-production-calendar-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Deploy-Production:
    if: github.ref == 'refs/heads/production'
    environment: vercel-production-calendar
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Setup bun
        uses: ./.github/actions/setup-bun-with-retry
        with:
          bun-version: 1.3.14

      - name: Use Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install dependencies
        run: bash scripts/ci/run-with-backoff.sh bun install

      - name: Install Vercel CLI
        run: bash scripts/ci/run-with-backoff.sh bun install --global vercel@latest

      - name: Pull Vercel Environment Information
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CALENDAR_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate shared build metadata
        env:
          PLATFORM_BUILD_ENVIRONMENT: production
          PLATFORM_BUILD_REF_NAME: production
        run: bun run --silent scripts/ci/generate-build-metadata.ts

      - name: Build Project Artifacts
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          TURBO_CONCURRENCY: "2"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CALENDAR_PROJECT_ID }}
        uses: ./.github/actions/run-with-turbo-remote-cache
        with:
          command: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          token: ${{ github.actor != 'dependabot[bot]' && secrets.TURBO_TOKEN || '' }}
          team: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}

      - name: Deploy Project Artifacts to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CALENDAR_PROJECT_ID }}
        run: vercel deploy --archive=tgz --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Record successful Vercel deployment marker
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERCEL_WORKFLOW_NAME: vercel-production-calendar.yaml
        run: bun run --silent scripts/ci/record-vercel-deployment.ts
