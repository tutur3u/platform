name: CI Configuration Check

on:
  workflow_call:
    inputs:
      workflow_name:
        required: true
        type: string
        description: "The name of the workflow file (e.g., biome-check.yaml)"
    outputs:
      should_run:
        description: "Whether the workflow should run"
        value: ${{ jobs.check.outputs.should_run }}

permissions:
  contents: read
  deployments: read

jobs:
  check:
    name: Check CI Config
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check_config.outputs.should_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          sparse-checkout: |
            .github/workflows/*
            apps/*/package.json
            bun.lock
            package.json
            packages/*/package.json
            scripts/ci/check-workflow-config.ts
            scripts/ci/github-deployment-markers.ts
            scripts/ci/resolve-changed-files-core.ts
            scripts/ci/resolve-changed-files.ts
            turbo.json
            tuturuuu.ts
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Compute changed files
        id: changed_files
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
        run: |
          node --experimental-strip-types scripts/ci/resolve-changed-files.ts

      - name: Check Configuration
        id: check_config
        shell: bash
        env:
          CHANGED_FILES_FILE: ${{ steps.changed_files.outputs.changed_files_path }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
        run: |
          CONFIG_FILE="tuturuuu.ts"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::warning::Configuration file $CONFIG_FILE not found. Defaulting to true."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          node --experimental-strip-types scripts/ci/check-workflow-config.ts
