          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceSuccess"
        "500":
          description: Legacy validation error when collapsed is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceValidationError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - POST, DELETE
    delete:
      summary: Clear sidebar collapsed preference cookie
      responses:
        "200":
          description: Sidebar collapsed cookie was cleared.
          headers:
            Set-Cookie:
              schema:
                type: string
                examples:
                  - sidebar-collapsed=; Path=/; Max-Age=0; Expires=Thu, 01 Jan 1970 00:00:00 GMT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceSuccess"
        "405":
          description: Unsupported HTTP method.
  /api/v1/infrastructure/sidebar/sizes:
    post:
      summary: Set sidebar size preference cookies
      description: Migrated replacement for apps/web/src/app/api/v1/infrastructure/sidebar/sizes/route.ts. Preserves legacy validation and writes sidebar-size plus main-content-size cookies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sidebar
                - main
              properties:
                sidebar:
                  description: Raw JSON value stored as the sidebar-size cookie value.
                main:
                  description: Raw JSON value stored as the main-content-size cookie value.
      responses:
        "200":
          description: Sidebar size cookies were set.
          headers:
            Set-Cookie:
              schema:
                type: array
                items:
                  type: string
                examples:
                  - sidebar-size=28; Path=/
                  - main-content-size=72; Path=/
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceSuccess"
        "500":
          description: Legacy validation error when either size is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceValidationError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - POST, DELETE
    delete:
      summary: Clear sidebar size preference cookie
      description: Preserves the legacy DELETE behavior, which clears sidebar-size only.
      responses:
        "200":
          description: Sidebar size cookie was cleared.
          headers:
            Set-Cookie:
              schema:
                type: string
                examples:
                  - sidebar-size=; Path=/; Max-Age=0; Expires=Thu, 01 Jan 1970 00:00:00 GMT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceSuccess"
        "405":
          description: Unsupported HTTP method.
  /api/v1/workspaces/{wsId}/user-groups/{groupId}/group-checks/{postId}/email:
