openapi: 3.1.0
info:
  title: Tuturuuu Rust Backend API
  version: 0.1.0
  description: >
    API contract for the dedicated Rust backend used by the TanStack Start
    migration and future Cloudflare Workers deployment. JSON responses include
    Content-Security-Policy, Referrer-Policy, X-Content-Type-Options, and
    X-Frame-Options security headers in both native and Worker runtimes.
servers:
  - url: http://localhost:7820
    description: Local backend runtime
paths:
  /api/share/course/{courseId}:
    parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
        description: Legacy shared-course identifier.
    get:
      deprecated: true
      summary: Retired legacy shared course API
      description: Terminal decommission replacement for apps/web/src/app/api/share/course/[courseId]/route.ts. The maintained shared-course reader remains GET /api/v1/course?courseId=..., so the legacy alias returns 410 instead of preserving duplicate route ownership.
      responses:
        "410":
          description: Legacy shared course API was intentionally removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetiredLegacyApiRoute"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/sync-logs:
    get:
      deprecated: true
      summary: Retired legacy all-workspace sync logs API
      description: Terminal decommission replacement for apps/web/src/app/api/sync-logs/route.ts. Calendar sync monitoring now uses workspace-scoped server-owned data fetching, so the broad legacy API returns 410.
      responses:
        "410":
          description: Legacy sync logs API was intentionally removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetiredLegacyApiRoute"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/payment/migrations/subscriptions/cross-check:
    post:
      deprecated: true
      summary: Retired monolithic subscription cross-check API
      description: Terminal decommission replacement for apps/web/src/app/api/payment/migrations/subscriptions/cross-check/route.ts. Billing maintenance now uses the phase-1, phase-2, and phase-3 cross-check endpoints, so the old monolithic route returns 410.
      responses:
        "410":
          description: Legacy subscription cross-check API was intentionally removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetiredLegacyApiRoute"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - POST
  /api/users/search:
    get:
      deprecated: true
      summary: Retired legacy user search API
      description: Terminal decommission replacement for apps/web/src/app/api/users/search/route.ts. The legacy unauthenticated RPC wrapper is not preserved for the Rust backend cutover; future people search must use a maintained server-owned API.
      responses:
        "410":
          description: Legacy user search API was intentionally removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetiredLegacyApiRoute"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/v1/proxy/tuturuuu:
    get:
      deprecated: true
      summary: Retired development Tuturuuu API proxy
      description: Terminal decommission replacement for apps/web/src/app/api/v1/proxy/tuturuuu/route.ts. The legacy route was a development-only Next.js/Undici proxy for arbitrary allowlisted Tuturuuu API paths; the Cloudflare cutover uses maintained internal API clients or direct backend routes instead of preserving the SSRF-sensitive proxy surface.
      responses:
        "410":
          description: Legacy development proxy was intentionally removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetiredLegacyApiRoute"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/{wsId}/crawlers/domains:
    parameters:
      - name: wsId
        in: path
        required: true
        schema:
          type: string
        description: Legacy workspace path segment. The legacy Next.js route ignored this value, and the Rust migration preserves that behavior until crawler workspace ownership is redesigned.
    get:
      summary: List crawler domains
      description: Migrated replacement for apps/web/src/app/api/[wsId]/crawlers/domains/route.ts. Reads `crawled_urls.url` and non-skipped `crawled_url_next_urls.url` through the server-owned Supabase REST adapter, extracts valid URL hostnames, deduplicates them, and returns the sorted legacy domain list with `cached: false`.
      responses:
        "200":
          description: Sorted unique crawler domains.
          content:
            application/json:
              schema:
                type: object
                required:
                  - cached
                  - domains
                properties:
                  cached:
                    type: boolean
                    description: Always false for the migrated parity endpoint.
                  domains:
                    type: array
                    items:
                      type: string
        "500":
          description: Supabase crawler data access is not configured or failed.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    examples:
                      - Internal Server Error
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/{wsId}/crawlers/uncrawled:
    parameters:
      - name: wsId
        in: path
        required: true
        schema:
          type: string
        description: Legacy workspace path segment. The legacy Next.js route ignored this value, and the Rust migration preserves that behavior until crawler workspace ownership is redesigned.
    get:
      summary: List uncrawled crawler URLs
      description: Migrated replacement for apps/web/src/app/api/[wsId]/crawlers/uncrawled/route.ts. Reads non-skipped `crawled_url_next_urls` through the server-owned Supabase REST adapter, preserves the legacy domain/search URL filters and pagination shape, removes URLs that already exist in `crawled_urls`, groups the remaining rows by `origin_id`, and returns the legacy `uncrawledUrls`, `groupedUrls`, and `pagination` payload.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: domain
          in: query
          required: false
          schema:
            type: string
          description: Optional URL substring filter. The `all` sentinel disables this filter.
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Optional URL substring search filter.
      responses:
        "200":
          description: Paginated uncrawled crawler URLs.
          content:
            application/json:
              schema:
                type: object
                required:
                  - groupedUrls
                  - pagination
                  - uncrawledUrls
                properties:
                  uncrawledUrls:
                    type: array
                    items:
                      $ref: "#/components/schemas/CrawlerUncrawledUrl"
                  groupedUrls:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        $ref: "#/components/schemas/CrawlerUncrawledUrl"
                  pagination:
                    type: object
                    required:
                      - page
                      - pageSize
                      - totalItems
                      - totalPages
                    properties:
                      page:
                        type: integer
                      pageSize:
                        type: integer
                      totalItems:
                        type: integer
                      totalPages:
                        type: integer
        "500":
          description: Supabase crawler data access is not configured or failed.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    examples:
                      - Internal Server Error
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /.well-known/{slug}:
    get:
      summary: Blocked well-known probe path
      description: Migrated replacement for apps/web/src/app/.well-known/[...slug]/route.ts. Returns the same cacheable empty 404 response used to suppress unsupported browser/tooling probes.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Well-known path segment or catch-all slug.
      responses:
        "404":
          description: Empty cacheable not-found response.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - public, max-age=300, must-revalidate
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET, HEAD
    head:
      summary: Blocked well-known probe path headers
      description: Header-only variant of the migrated cacheable empty 404 well-known response.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Well-known path segment or catch-all slug.
      responses:
        "404":
          description: Empty cacheable not-found response.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - public, max-age=300, must-revalidate
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET, HEAD
  /~recover-browser-state:
    get:
      summary: Legacy browser-state recovery confirmation page
      description: Migrated replacement for apps/web/src/app/~recover-browser-state/route.ts. Returns the same no-store HTML form used to clear cached browser state and recover from broken client sessions.
      responses:
        "200":
          description: Browser-state recovery confirmation HTML.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
            CDN-Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
          content:
            text/html:
              schema:
                type: string
    post:
      summary: Legacy browser-state recovery reset action
      description: Requires same-origin confirmation through Origin or Referer, clears browser/site data and Supabase auth cookies, then redirects to login with browserStateReset=1.
      responses:
        "307":
          description: Same-origin recovery request accepted and redirected to login.
          headers:
            Location:
              schema:
                type: string
                examples:
                  - https://tuturuuu.localhost/login?browserStateReset=1
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
            CDN-Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
            Clear-Site-Data:
              schema:
                type: string
                examples:
                  - '"cache", "cookies", "storage", "executionContexts"'
            Set-Cookie:
              schema:
                type: array
                items:
                  type: string
                examples:
                  - sb-project-ref-auth-token=; Path=/; Max-Age=0; Expires=Thu, 01 Jan 1970 00:00:00 GMT
        "403":
          description: Request did not include same-origin confirmation.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
            CDN-Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserStateRecoveryForbidden"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET, POST
  /serwist/{path}:
    get:
      summary: Legacy Serwist service-worker decommission route
      description: Migrated replacement for apps/web/src/app/serwist/[path]/route.ts. The Rust backend owns the Cloudflare cutover route by serving a no-store service worker that unregisters the legacy Serwist registration; sw.js.map returns deterministic source-map metadata and unknown artifacts return an empty 404.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
            enum:
              - sw.js
              - sw.js.map
          description: Single Serwist artifact path segment.
      responses:
        "200":
          description: Decommission service worker or source-map metadata.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
            CDN-Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
            Service-Worker-Allowed:
              schema:
                type: string
                examples:
                  - /
          content:
            application/javascript:
              schema:
                type: string
            application/json:
              schema:
                type: object
        "404":
          description: Unknown Serwist artifact.
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/health:
    get:
      summary: Legacy-compatible platform health probe
      description: Migrated replacement for apps/web/src/app/api/health/route.ts. Returns the same body and no-store cache behavior through the Rust backend.
      responses:
        "200":
          description: Legacy-compatible health response.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
            X-Content-Type-Options:
              schema:
                type: string
                examples:
                  - nosniff
            Content-Security-Policy:
              schema:
                type: string
                examples:
                  - default-src 'none'; frame-ancestors 'none'; base-uri 'none'
            Referrer-Policy:
              schema:
                type: string
                examples:
                  - no-referrer
            X-Frame-Options:
              schema:
                type: string
                examples:
                  - DENY
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyHealth"
        "405":
          description: Unsupported HTTP method.
  /api/cron/discord/daily-report:
    get:
      summary: Discord daily report cron proxy
      description: >
        Migrated replacement for apps/web/src/app/api/cron/discord/daily-report/route.ts.
        Requires the cron bearer token, then proxies a POST request to
        DISCORD_APP_DEPLOYMENT_URL/daily-report with Content-Type application/json
        and the same bearer token. The Rust backend preserves upstream JSON body
        and status passthrough, and returns the legacy invalid-JSON fallback when
        the Discord app response is not JSON.
      security:
        - CronBearer: []
      responses:
        "200":
          description: Discord app JSON response passthrough.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid cron bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CronUnauthorized"
        "500":
          description: Cron secret or Discord deployment URL is not configured, or upstream returned status 500.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CronConfigurationError"
                  - $ref: "#/components/schemas/DiscordCronInvalidJson"
                  - type: object
                    additionalProperties: true
        "502":
          description: Rust backend could not reach the Discord app.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscordCronRequestFailed"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
        default:
          description: Discord app JSON response or invalid-JSON fallback with the upstream status code.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    additionalProperties: true
                  - $ref: "#/components/schemas/DiscordCronInvalidJson"
  /api/cron/discord/wol/daily/remind:
    get:
      summary: Discord WOL daily reminder cron proxy
      description: >
        Migrated replacement for apps/web/src/app/api/cron/discord/wol/daily/remind/route.ts.
        Requires the cron bearer token, then proxies a POST request to
        DISCORD_APP_DEPLOYMENT_URL/wol-reminder with Content-Type application/json
        and the same bearer token. The Rust backend preserves upstream JSON body
        and status passthrough, and returns the legacy invalid-JSON fallback when
        the Discord app response is not JSON.
      security:
        - CronBearer: []
      responses:
        "200":
          description: Discord app JSON response passthrough.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid cron bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CronUnauthorized"
        "500":
          description: Cron secret or Discord deployment URL is not configured, or upstream returned status 500.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CronConfigurationError"
                  - $ref: "#/components/schemas/DiscordCronInvalidJson"
                  - type: object
                    additionalProperties: true
        "502":
          description: Rust backend could not reach the Discord app.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscordCronRequestFailed"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
        default:
          description: Discord app JSON response or invalid-JSON fallback with the upstream status code.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    additionalProperties: true
                  - $ref: "#/components/schemas/DiscordCronInvalidJson"
  /api/v1/calendar/mock:
    get:
      summary: Legacy-compatible mock calendar events
      description: Migrated replacement for apps/web/src/app/api/v1/calendar/mock/route.ts. Returns the same deterministic mock calendar payload through the Rust backend.
      responses:
        "200":
          description: Deterministic mock calendar events.
          headers:
            X-Content-Type-Options:
              schema:
                type: string
                examples:
                  - nosniff
            Content-Security-Policy:
              schema:
                type: string
                examples:
                  - default-src 'none'; frame-ancestors 'none'; base-uri 'none'
            Referrer-Policy:
              schema:
                type: string
                examples:
                  - no-referrer
            X-Frame-Options:
              schema:
                type: string
                examples:
                  - DENY
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarMockResponse"
        "405":
          description: Unsupported HTTP method.
  /api/v1/auth/password-login:
    options:
      summary: Legacy password login CORS preflight
      description: Method-level migrated replacement for the OPTIONS export in apps/web/src/app/api/v1/auth/password-login/route.ts. POST remains legacy-owned until password auth/session handling moves behind the Rust backend.
      responses:
        "204":
          description: Empty CORS preflight response.
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                examples:
                  - "*"
            Access-Control-Allow-Methods:
              schema:
                type: string
                examples:
                  - GET, POST, OPTIONS
            Access-Control-Allow-Headers:
              schema:
                type: string
                examples:
                  - Content-Type, Authorization
            Access-Control-Max-Age:
              schema:
                type: string
                examples:
                  - "86400"
  /api/v1/auth/mobile/password-login:
    options:
      summary: Legacy mobile password login CORS preflight
      description: Method-level migrated replacement for the OPTIONS export in apps/web/src/app/api/v1/auth/mobile/password-login/route.ts. POST remains legacy-owned until password auth/session handling moves behind the Rust backend.
      responses:
        "204":
          description: Empty CORS preflight response.
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                examples:
                  - "*"
            Access-Control-Allow-Methods:
              schema:
                type: string
                examples:
                  - GET, POST, OPTIONS
            Access-Control-Allow-Headers:
              schema:
                type: string
                examples:
                  - Content-Type, Authorization
            Access-Control-Max-Age:
              schema:
                type: string
                examples:
                  - "86400"
  /api/v1/auth/mobile/send-otp:
    options:
      summary: Legacy mobile send OTP CORS preflight
      description: Method-level migrated replacement for the OPTIONS export in apps/web/src/app/api/v1/auth/mobile/send-otp/route.ts. POST remains legacy-owned until OTP send side effects move behind the Rust backend.
      responses:
        "204":
          description: Empty CORS preflight response.
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                examples:
                  - "*"
            Access-Control-Allow-Methods:
              schema:
                type: string
                examples:
                  - GET, POST, OPTIONS
            Access-Control-Allow-Headers:
              schema:
                type: string
                examples:
                  - Content-Type, Authorization
            Access-Control-Max-Age:
              schema:
                type: string
                examples:
                  - "86400"
  /api/v1/auth/mobile/verify-otp:
    options:
      summary: Legacy mobile verify OTP CORS preflight
      description: Method-level migrated replacement for the OPTIONS export in apps/web/src/app/api/v1/auth/mobile/verify-otp/route.ts. POST remains legacy-owned until OTP verification and session responses move behind the Rust backend.
      responses:
        "204":
          description: Empty CORS preflight response.
