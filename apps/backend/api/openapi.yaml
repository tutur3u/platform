  /api/v1/users/me/profile:
    get:
      summary: Current user profile app-session foundation
      description: >
        Rust backend foundation for apps/web/src/app/api/v1/users/me/profile/route.ts.
        This operation verifies Tuturuuu app-session JWTs in native and Cloudflare
        Worker runtimes and returns the token-derived identity preview with the
        legacy profile response shape. It is not full profile route ownership yet:
        Supabase session revalidation and private profile row hydration still need
        the Rust data adapter before the migration manifest can mark the legacy
        route artifact migrated.
      security:
        - AppSessionBearer: []
        - AppSessionCookie: []
      responses:
        "200":
          description: Token-derived current user profile preview.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
            CDN-Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserProfile"
        "401":
          description: Missing or invalid app-session token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactUnauthorized"
        "503":
          description: App coordination secret is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSessionConfigurationError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET, PATCH
    patch:
      summary: Current user profile mutation foundation
      description: >
        Authenticates the same app-session sources as GET and enforces
        same-origin confirmation for cookie-authenticated requests before
        returning CONTACT_DATA_LAYER_NOT_READY. This preserves the protected
        mutation boundary while Rust profile persistence is still being built.
      security:
        - AppSessionBearer: []
        - AppSessionCookie: []
      responses:
        "403":
          description: Cookie-authenticated mutation did not include same-origin confirmation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSameOriginRequired"
        "501":
          description: Rust profile persistence has not been configured yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactDataLayerNotReady"
        "401":
          description: Missing or invalid app-session token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactUnauthorized"
        "503":
          description: App coordination secret is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSessionConfigurationError"
        "405":
          description: Unsupported HTTP method.
  /api/v1/inquiries:
    post:
      summary: Support inquiry app-session foundation
      description: >
        Rust backend foundation for apps/web/src/app/api/v1/inquiries/route.ts.
        The route verifies Tuturuuu app-session JWTs, enforces same-origin
        confirmation for cookie-authenticated mutations, validates the legacy
        inquiry JSON shape and field limits, then returns
        CONTACT_DATA_LAYER_NOT_READY until Supabase service-role persistence is
        implemented. Do not mark the legacy inquiry route migrated until the
        persistence adapter inserts support_inquiries with creator_id from the
        resolved user.
      security:
        - AppSessionBearer: []
        - AppSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportInquiryRequest"
      responses:
        "400":
          description: Invalid inquiry payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactValidationError"
        "403":
          description: Cookie-authenticated mutation did not include same-origin confirmation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSameOriginRequired"
        "501":
          description: Rust support inquiry persistence has not been configured yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactDataLayerNotReady"
        "401":
          description: Missing or invalid app-session token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactUnauthorized"
        "503":
          description: App coordination secret is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSessionConfigurationError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - POST
  /api/v1/infrastructure/languages:
