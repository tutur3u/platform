      description: Returns migration progress grouped by target owner and route kind, with representative remaining legacy artifacts. Requires the internal backend bearer token because entries include legacy source file paths.
      security:
        - BackendInternalToken: []
      responses:
        "200":
          description: Route ownership migration progress.
          content:
