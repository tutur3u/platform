  /api/v1/workspaces/{wsId}/posts/permissions:
    get:
      summary: Workspace post permissions
      description: >-
        Migrated replacement for
        apps/web/src/app/api/v1/workspaces/[wsId]/posts/permissions/route.ts
        GET. The Rust backend keeps the legacy quiet-failure contract by
        returning `{ canApprovePosts: false, canForceSendPosts: false }` for
        missing auth, inaccessible workspaces, permission RPC failures, or
        missing permissions. When a Supabase browser session or non-app-session
        Bearer token resolves, it calls the server-owned
        `has_workspace_permission` RPC for the workspace `approve_posts`
        permission and the root workspace `manage_workspace_roles` permission.
      security:
        - SupabaseBrowserSessionCookie: []
        - SupabaseBearer: []
      parameters:
        - name: wsId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workspace post permission flags. Failures are represented as false flags for legacy compatibility.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePostPermissionsResponse"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/v1/workspaces/{wsId}/settings/permissions/check:
    get:
      summary: Workspace setting permission check
      description: Migrated replacement for apps/web/src/app/api/v1/workspaces/[wsId]/settings/permissions/check/route.ts GET. The Rust backend revalidates a normal Supabase browser session or non-app-session Bearer token with Supabase Auth, ignores app-session tokens and the legacy userId query parameter, resolves personal and workspace handles, verifies workspace access, and mirrors getPermissions-style role/default/creator/admin behavior before returning `{ hasPermission }`.
      security:
        - SupabaseBrowserSessionCookie: []
        - SupabaseBearer: []
      parameters:
        - name: wsId
          in: path
          required: true
          schema:
            type: string
        - name: permission
          in: query
          required: true
          schema:
            type: string
          description: Workspace permission identifier to check.
      responses:
        "200":
          description: Permission check result for the authenticated workspace caller.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePermissionCheckResponse"
        "400":
          description: Missing permission query parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePermissionCheckError"
        "403":
          description: Workspace access denied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePermissionCheckError"
        "500":
          description: Internal permission check error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePermissionCheckError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
