              schema:
                $ref: "#/components/schemas/InternalAuthorizationError"
        "503":
          description: Backend internal token is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalConfigurationError"
        "405":
          description: Unsupported HTTP method.
components:
  securitySchemes:
    AppSessionBearer:
      type: http
      scheme: bearer
      description: Tuturuuu-managed app-session JWT with `ttr_app_` prefix, HS256 signature, `internal-app:session` scope, and an accepted current-user target app.
    AppSessionCookie:
      type: apiKey
      in: cookie
      name: tuturuuu_app_session
      description: Tuturuuu-managed app-session cookie. Mutating routes also require same-origin Origin or Referer confirmation.
    BackendInternalToken:
      type: http
      scheme: bearer
      description: Server-only BACKEND_INTERNAL_TOKEN configured through Cloudflare secrets or local environment variables.
    CronBearer:
      type: http
      scheme: bearer
      description: CRON_SECRET or VERCEL_CRON_SECRET configured through Cloudflare secrets or local environment variables.
    SupabaseBrowserSessionCookie:
      type: apiKey
      in: cookie
      name: sb-{project-ref}-auth-token
      description: Supabase browser auth cookie, including chunked `sb-{project-ref}-auth-token.N` variants, revalidated through Supabase Auth before protected data access.
    SupabaseBearer:
      type: http
      scheme: bearer
      description: Non-app-session Supabase access token supplied by mobile or API callers and revalidated through Supabase Auth before protected data access.
  parameters:
    InfrastructureExportWorkspaceId:
      name: ws_id
      in: query
      required: true
      schema:
        type: string
      description: Workspace identifier used to filter the legacy infrastructure export table.
    InfrastructureExportLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 1000
      description: Legacy page size parsed with Number.parseInt semantics.
    InfrastructureExportOffset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
      description: Legacy zero-based row offset parsed with Number.parseInt semantics.
  responses:
    RequestBodyLengthRequired:
      description: Buffered JSON mutations require Content-Length so the Rust backend can enforce the 64 KiB body limit before reading.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RequestBodyLengthRequiredError"
    RequestBodyTooLarge:
      description: Buffered JSON request body exceeded the Rust backend 64 KiB limit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RequestBodyTooLargeError"
  schemas:
    AuthMeResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/SupabaseAuthUser"
    SupabaseAuthUser:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        email:
          type:
            - string
            - "null"
          format: email
        aud:
          type: string
        app_metadata:
          type: object
          additionalProperties: true
        user_metadata:
          type: object
          additionalProperties: true
    AuthMeUnauthorized:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - Unauthorized
    AuthMfaAssuranceLevelResponse:
      type: object
      required:
        - currentLevel
        - nextLevel
        - currentAuthenticationMethods
      properties:
        currentLevel:
          type:
            - string
            - "null"
          examples:
            - aal1
        nextLevel:
          type:
            - string
            - "null"
          examples:
            - aal2
        currentAuthenticationMethods:
          type: array
          items:
            type: object
            additionalProperties: true
          examples:
            - - method: password
                timestamp: 1710000000
    AuthMfaAssuranceLevelError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          examples:
            - Unauthorized
            - Internal server error
    AuthMfaError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          examples:
            - Unauthorized
            - Factor not found
            - Internal server error
    AuthMfaFactor:
      type: object
      additionalProperties: true
      required:
        - id
        - factor_type
        - status
      properties:
        id:
          type: string
          examples:
            - factor-123
        factor_type:
          type: string
          examples:
            - totp
        status:
          type: string
          examples:
            - verified
        friendly_name:
          type:
            - string
            - "null"
    AuthMfaFactorsResponse:
      type: object
      required:
        - all
        - phone
        - totp
        - webauthn
      properties:
        all:
          type: array
          items:
            $ref: "#/components/schemas/AuthMfaFactor"
        phone:
          type: array
          items:
            $ref: "#/components/schemas/AuthMfaFactor"
        totp:
          type: array
          items:
            $ref: "#/components/schemas/AuthMfaFactor"
        webauthn:
          type: array
          items:
            $ref: "#/components/schemas/AuthMfaFactor"
    AuthMfaEnrollTotpRequest:
      type: object
      properties:
        friendlyName:
          type: string
          examples:
            - Authenticator
    AuthMfaEnrollTotpResponse:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          examples:
            - factor-123
        type:
          type: string
          examples:
            - totp
        totp:
          type: object
          additionalProperties: true
    AuthMfaUnenrollResponse:
      type: object
      required:
        - message
        - data
      properties:
        message:
          type: string
          examples:
            - Factor unenrolled successfully
        data:
          type: object
          additionalProperties: true
          properties:
            id:
              type: string
              examples:
                - factor-123
    UserProfilePatchRequest:
      type: object
      additionalProperties: true
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 100
        bio:
          type:
            - string
            - "null"
          maxLength: 1000
        avatar_url:
          type:
            - string
            - "null"
          format: uri
    UserProfilePatchResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - Profile updated successfully
    UserProfilePatchMessage:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - Not authenticated
            - Error updating profile
    CurrentUserDefaultWorkspaceResponse:
      oneOf:
        - $ref: "#/components/schemas/CurrentUserDefaultWorkspace"
        - type: "null"
    CurrentUserDefaultWorkspace:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          examples:
            - 00000000-0000-0000-0000-000000000001
        name:
          type: string
          examples:
            - Personal
        personal:
          type: boolean
          examples:
            - true
    CurrentUserDefaultWorkspacePatchRequest:
      type: object
      required:
        - workspaceId
      properties:
        workspaceId:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
          description: Set a workspace UUID that the caller belongs to, or null to clear the saved default workspace.
          examples:
            - 00000000-0000-0000-0000-000000000001
    CurrentUserDefaultWorkspacePatchResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          examples:
            - true
    CurrentUserDefaultWorkspaceError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          examples:
            - Unauthorized
            - Invalid request data
            - Workspace not found or access denied
        errors:
          type: array
          items:
            type: object
            required:
              - message
              - path
            properties:
              message:
                type: string
              path:
                type: array
                items:
                  type: string
            additionalProperties: true
    CurrentUserFullNamePatchRequest:
      type: object
      required:
        - full_name
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 100
          description: The Rust route trims this value before validating and persisting it.
          examples:
            - Ada Lovelace
    CurrentUserFullNamePatchMessage:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - Full name updated successfully
            - Error updating full name
    CurrentUserFullNameUnauthorized:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          examples:
            - Unauthorized
    CurrentUserFullNameValidationError:
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
          examples:
            - Invalid full name
        errors:
          type: array
          items:
            type: object
            required:
              - message
              - path
            properties:
              message:
                type: string
              path:
                type: array
