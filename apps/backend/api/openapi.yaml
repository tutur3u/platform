              type: string
              examples:
                - backend
            toolchain:
              type: string
              examples:
                - rustc 1.95.0
        contactData:
          $ref: "#/components/schemas/ContactDataLayerStatus"
        environment:
          type: string
          examples:
            - development
        frontendTargets:
          type: array
          items:
            type: string
            enum:
              - next
              - tanstack-start
        ok:
          type: boolean
        routeOwnership:
          type: object
          required:
            - legacyAllowed
            - manifest
            - status
          properties:
            legacyAllowed:
              type: boolean
            manifest:
              type: string
              examples:
                - apps/tanstack-web/migration/route-manifest.json
            status:
              type: string
              examples:
                - migration-foundation
    ContactDataLayerStatus:
      type: object
      required:
        - configured
        - missing
        - supabaseOrigin
      properties:
        configured:
          type: boolean
          description: True only when the Rust backend has a valid Supabase URL and service-role credential configured for the contact data adapter.
        missing:
          type: array
          items:
            type: string
            enum:
              - SUPABASE_URL
              - SUPABASE_SERVICE_ROLE_KEY
          description: Logical settings still required before the Rust contact data adapter can own profile hydration and inquiry persistence.
        supabaseOrigin:
          type:
            - string
            - "null"
          examples:
            - https://project-ref.supabase.co
