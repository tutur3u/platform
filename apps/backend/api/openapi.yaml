      summary: Disabled grouped score names infrastructure migration
      description: Migrated replacement for apps/web/src/app/api/v1/infrastructure/migrate/grouped-score-names/route.ts. The legacy migration is no longer available because the backing user_group_indicators table was removed; the Rust route preserves the development-only guard and disabled 410 response.
      responses:
        "410":
          description: Migration endpoint is intentionally disabled.
          headers:
            X-Content-Type-Options:
              schema:
                type: string
                examples:
