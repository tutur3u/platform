          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferenceSuccess"
        "405":
          description: Unsupported HTTP method.
  /api/v1/infrastructure/sidebar:
    post:
      summary: Set sidebar collapsed preference cookie
