openapi: 3.1.0
info:
  title: Tuturuuu Rust Backend API
  version: 0.1.0
  description: >
    API contract for the dedicated Rust backend used by the TanStack Start
    migration and future Cloudflare Workers deployment. JSON responses include
    Content-Security-Policy, Referrer-Policy, X-Content-Type-Options, and
    X-Frame-Options security headers in both native and Worker runtimes.
servers:
  - url: http://localhost:7820
    description: Local backend runtime
paths:
  /api/auth/me:
    get:
      summary: Legacy-compatible current Supabase user
      description: Migrated replacement for apps/web/src/app/api/auth/me/route.ts GET. The Rust backend revalidates the browser Supabase session cookie or non-app-session Bearer token with Supabase Auth, then returns the raw legacy `{ user }` payload. Tuturuuu app-session tokens are intentionally ignored for this Supabase browser-session route.
      security:
        - SupabaseBrowserSessionCookie: []
        - SupabaseBearer: []
      responses:
        "200":
          description: Current Supabase Auth user wrapped in the legacy response shape.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
            CDN-Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: Caller is missing a valid Supabase browser session or Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeUnauthorized"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/auth/mfa/totp/assurance-level:
    get:
      summary: Legacy-compatible Supabase MFA assurance level
      description: Migrated replacement for apps/web/src/app/api/auth/mfa/totp/assurance-level/route.ts GET. The Rust backend revalidates the browser Supabase session cookie or non-app-session Bearer token with Supabase Auth, then derives the no-argument Supabase Auth MFA assurance-level response from the JWT `aal` and `amr` claims plus verified factors on the revalidated user JSON. Tuturuuu app-session tokens are intentionally ignored for this Supabase browser-session route.
      security:
        - SupabaseBrowserSessionCookie: []
        - SupabaseBearer: []
      responses:
        "200":
          description: Authenticator assurance level for the current Supabase session.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
            CDN-Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaAssuranceLevelResponse"
        "401":
          description: Caller is missing a valid Supabase browser session or Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaAssuranceLevelError"
        "500":
          description: The Supabase user could not be revalidated or the session JWT could not be decoded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaAssuranceLevelError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/auth/mfa/totp/factors:
    get:
      summary: Legacy-compatible Supabase MFA factor list
      description: Migrated replacement for apps/web/src/app/api/auth/mfa/totp/factors/route.ts GET. The Rust backend revalidates the browser Supabase session cookie or non-app-session Bearer token with Supabase Auth, then mirrors Auth JS listFactors by grouping factors from the revalidated user JSON.
      security:
        - SupabaseBrowserSessionCookie: []
        - SupabaseBearer: []
      responses:
        "200":
          description: Auth JS-compatible MFA factor groups for the current Supabase user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaFactorsResponse"
        "401":
          description: Caller is missing a valid Supabase browser session or Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaError"
        "500":
          description: The Supabase user could not be revalidated or parsed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET, POST
    post:
      summary: Legacy-compatible Supabase TOTP factor enrollment
      description: Migrated replacement for apps/web/src/app/api/auth/mfa/totp/factors/route.ts POST. The Rust backend revalidates the browser Supabase session cookie or non-app-session Bearer token with Supabase Auth, then enrolls a TOTP factor through Supabase Auth REST and preserves Auth JS QR-code normalization.
      security:
        - SupabaseBrowserSessionCookie: []
        - SupabaseBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthMfaEnrollTotpRequest"
      responses:
        "200":
          description: Supabase Auth TOTP enrollment payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaEnrollTotpResponse"
        "400":
          description: Supabase Auth rejected the enrollment request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaError"
        "401":
          description: Caller is missing a valid Supabase browser session or Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaError"
        "411":
          $ref: "#/components/responses/RequestBodyLengthRequired"
        "413":
          $ref: "#/components/responses/RequestBodyTooLarge"
        "500":
          description: Supabase Auth could not be reached or returned invalid JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET, POST
  /api/auth/mfa/totp/factors/{factorId}:
    parameters:
      - name: factorId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Legacy-compatible Supabase TOTP factor detail
      description: Migrated replacement for apps/web/src/app/api/auth/mfa/totp/factors/[factorId]/route.ts GET. The Rust backend revalidates the browser Supabase session cookie or non-app-session Bearer token, derives the Auth JS factor list from the user JSON, and returns the matching verified TOTP factor.
      security:
        - SupabaseBrowserSessionCookie: []
        - SupabaseBearer: []
      responses:
        "200":
          description: Matching verified TOTP factor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaFactor"
        "401":
          description: Caller is missing a valid Supabase browser session or Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaError"
        "404":
          description: No verified TOTP factor with this id exists in the current user's factor list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaError"
        "500":
          description: The Supabase user could not be revalidated or parsed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET, DELETE
    delete:
      summary: Legacy-compatible Supabase TOTP factor unenrollment
      description: Migrated replacement for apps/web/src/app/api/auth/mfa/totp/factors/[factorId]/route.ts DELETE. The Rust backend revalidates the browser Supabase session cookie or non-app-session Bearer token with Supabase Auth, then unenrolls the factor through Supabase Auth REST and returns the legacy success wrapper.
      security:
        - SupabaseBrowserSessionCookie: []
        - SupabaseBearer: []
      responses:
        "200":
          description: Factor was unenrolled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaUnenrollResponse"
        "400":
          description: Supabase Auth rejected the unenrollment request or the factor id is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaError"
        "401":
          description: Caller is missing a valid Supabase browser session or Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaError"
        "500":
          description: Supabase Auth could not be reached or returned invalid JSON.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMfaError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET, DELETE
  /api/v1/user/profile:
    patch:
      summary: Legacy-compatible Supabase browser-session profile update
      description: Migrated replacement for apps/web/src/app/api/v1/user/profile/route.ts PATCH. The Rust backend revalidates the browser Supabase session cookie or non-app-session Bearer token with Supabase Auth, validates the legacy display_name, bio, and avatar_url payload, and updates only the authenticated user's users row through the server-owned Supabase REST adapter.
      security:
        - SupabaseBrowserSessionCookie: []
        - SupabaseBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfilePatchRequest"
      responses:
        "200":
          description: Profile updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfilePatchResponse"
        "400":
          description: The profile payload failed legacy validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfilePatchValidationError"
        "401":
          description: Caller is missing a valid Supabase browser session or Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfilePatchMessage"
        "411":
          $ref: "#/components/responses/RequestBodyLengthRequired"
        "413":
          $ref: "#/components/responses/RequestBodyTooLarge"
        "500":
          description: Supabase profile update failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfilePatchMessage"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - PATCH
  /api/admin/tasks/embeddings/stats:
    get:
      summary: Legacy-compatible admin task embedding statistics
      description: Migrated replacement for apps/web/src/app/api/admin/tasks/embeddings/stats/route.ts GET. The Rust backend validates the browser Supabase auth cookie with Supabase Auth, requires a Tuturuuu admin email domain, then reads only exact task counts through the server-owned Supabase REST adapter. It returns the derived legacy statistics payload without exposing raw task rows or service-role access.
      responses:
        "200":
          description: System-wide task embedding coverage statistics.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTaskEmbeddingStats"
        "401":
          description: Caller is missing a valid Tuturuuu admin browser session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTaskEmbeddingStatsUnauthorized"
        "500":
          description: Task statistics could not be loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTaskEmbeddingStatsError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/v1/workspaces/limits:
    get:
      summary: Legacy-compatible workspace creation limit check
      description: Migrated replacement for apps/web/src/app/api/v1/workspaces/limits/route.ts GET. The Rust backend validates the browser Supabase auth cookie with Supabase Auth, treats `tuturuuu.com` and `xwf.tuturuuu.com` users as unlimited, and otherwise reads only an exact count of non-deleted workspaces created by the authenticated user through the server-owned Supabase REST adapter. Browser callers receive the derived legacy limit payload without raw workspace rows or service-role access.
      responses:
        "200":
          description: Workspace creation limit result for the authenticated user.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceLimitResponse"
        "401":
          description: Caller is missing a valid browser Supabase session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceLimitUnauthorized"
        "500":
          description: Workspace count could not be loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceLimitError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/v1/user/onboarding-progress:
    get:
      summary: Current user onboarding progress
      description: Migrated replacement for apps/web/src/app/api/v1/user/onboarding-progress/route.ts GET. The Rust backend validates the browser Supabase session with Supabase Auth, reads only the authenticated user's onboarding_progress row through the server-owned Supabase REST adapter, and preserves the legacy null response when no row exists.
      security:
        - SupabaseBrowserSessionCookie: []
        - SupabaseBearer: []
      responses:
        "200":
          description: Current user's onboarding progress row, or null when no row exists.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
            CDN-Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/OnboardingProgress"
                  - type: "null"
        "401":
          description: Caller is missing a valid browser Supabase session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProgressMessage"
        "500":
          description: Onboarding progress row could not be fetched.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProgressMessage"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET, PATCH
    patch:
      summary: Update current user onboarding progress
      description: Migrated replacement for apps/web/src/app/api/v1/user/onboarding-progress/route.ts PATCH. The Rust backend validates the browser Supabase session with Supabase Auth, filters the JSON body to the legacy allowed onboarding fields, fixes user_id to the authenticated user, and upserts through the server-owned Supabase REST adapter.
      security:
        - SupabaseBrowserSessionCookie: []
        - SupabaseBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchOnboardingProgressRequest"
      responses:
        "200":
          description: Upserted onboarding progress row.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
            CDN-Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProgress"
        "400":
          description: Invalid JSON body or no allowlisted fields were provided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProgressMessage"
        "401":
          description: Caller is missing a valid browser Supabase session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProgressMessage"
        "500":
          description: Onboarding progress row could not be updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProgressMessage"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET, PATCH
  /api/v1/ai/whitelist/me:
    get:
      summary: Current user AI whitelist status
      description: Migrated replacement for apps/web/src/app/api/v1/ai/whitelist/me/route.ts GET. The Rust backend preserves the legacy app-session-first auth behavior for satellite app-session targets, falls back to browser Supabase auth cookies only when no app-session token is present, reads only the `enabled` flag for the authenticated user's email from `private.ai_whitelisted_emails`, and returns the derived `{ email, enabled }` payload without exposing private whitelist rows.
      security:
        - AppSessionBearer: []
        - AppSessionCookie: []
        - SupabaseBrowserSessionCookie: []
      responses:
        "200":
          description: Current user's AI whitelist status.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiWhitelistMeResponse"
        "401":
          description: Caller is missing a valid app-session or browser Supabase session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiWhitelistUnauthorized"
        "500":
          description: AI whitelist status could not be loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactServerError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/v1/nova/me/team:
    get:
      summary: Current user Nova team
      description: Migrated replacement for apps/web/src/app/api/v1/nova/me/team/route.ts GET. The Rust backend preserves the legacy app-session-first auth behavior for the Nova app-session target, falls back to browser Supabase auth cookies only when no app-session token is present, reads only `team_id` from `private.nova_team_members` for the authenticated user through the server-owned private-schema REST adapter, and returns the derived `{ teamId }` payload without exposing private membership rows.
      security:
        - AppSessionBearer: []
        - AppSessionCookie: []
        - SupabaseBrowserSessionCookie: []
      responses:
        "200":
          description: Current user's Nova team id, if any.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NovaCurrentTeamResponse"
        "401":
          description: Caller is missing a valid Nova app-session or browser Supabase session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NovaUnauthorized"
        "500":
          description: Current Nova team could not be loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NovaCurrentTeamError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/v1/task-board-status-templates:
    get:
      summary: Task board status templates
      description: Migrated replacement for apps/web/src/app/api/v1/task-board-status-templates/route.ts GET. The Rust backend preserves authenticated Supabase session access for browser cookies and non-app-session Bearer tokens, rejects Tuturuuu app-session tokens without falling back to stale cookies, reads the global `task_board_status_templates` catalog through the server-owned Supabase REST adapter, preserves the legacy `is_default.desc,name.asc` ordering, and returns the raw template row payload behind `{ templates }`.
      security:
        - SupabaseBearer: []
        - SupabaseBrowserSessionCookie: []
      responses:
        "200":
          description: Ordered task-board status template catalog.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskBoardStatusTemplatesResponse"
        "401":
          description: Caller is missing a valid Supabase browser cookie or non-app-session Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskBoardStatusTemplatesUnauthorized"
        "500":
          description: Status templates could not be loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskBoardStatusTemplatesError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/v1/users/me/hive-access:
    get:
      summary: Current user Hive access status
      description: Migrated replacement for apps/web/src/app/api/v1/users/me/hive-access/route.ts GET. The Rust backend preserves the legacy app-session-first auth behavior for current-user app-session targets, falls back to browser Supabase auth cookies only when no app-session token is present, reads only `hive_members.enabled` and `platform_user_roles.enabled,allow_role_management` for the authenticated user through the server-owned Supabase REST adapter, and returns the derived `{ hasAccess, isAdmin, isMember }` payload without exposing private membership rows.
      security:
        - AppSessionBearer: []
        - AppSessionCookie: []
        - SupabaseBrowserSessionCookie: []
      responses:
        "200":
          description: Current user's Hive access status.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - private, max-age=300, stale-while-revalidate=60
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiveAccessResponse"
        "401":
          description: Caller is missing a valid app-session or browser Supabase session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiveAccessUnauthorized"
        "500":
          description: Hive access could not be resolved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiveAccessError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/v1/hive/ai/models:
    get:
      summary: Hive AI model catalog
      description: Migrated replacement for apps/web/src/app/api/v1/hive/ai/models/route.ts GET. The Rust backend preserves Hive-only app-session auth and browser Supabase cookie fallback, requires Hive member or admin access before private reads, reads only the UI-safe model columns from `private.ai_gateway_models`, applies legacy `enabled` and `type` filters, orders by provider then name, and returns the derived `{ models }` UI payload without exposing private rows or service-role access to the browser.
      security:
        - AppSessionBearer: []
        - AppSessionCookie: []
        - SupabaseBrowserSessionCookie: []
      parameters:
        - name: enabled
          in: query
          required: false
          schema:
            type: string
            enum:
              - "false"
          description: When set to `false`, disabled models are included. Any other value preserves the legacy default enabled-only filter.
        - name: type
          in: query
          required: false
          schema:
            type: string
            default: language
          description: Model type filter. The `all` sentinel disables type filtering.
      responses:
        "200":
          description: Hive-visible AI models mapped to the shared UI model shape.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiveAiModelsResponse"
        "401":
          description: Caller is missing a valid Hive app-session or browser Supabase session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiveAccessUnauthorized"
        "403":
          description: Caller is authenticated but lacks Hive member/admin access.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HiveAccessRequired"
        "500":
          description: Hive access or private model lookup failed.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HiveAccessError"
                  - $ref: "#/components/schemas/HiveAiModelsError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET
  /api/v1/inventory/storefronts/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
        description: Public storefront slug.
    get:
      summary: Public inventory storefront
      description: Migrated replacement for apps/web/src/app/api/v1/inventory/storefronts/[slug]/route.ts GET. The Rust backend reads the storefront payload through the server-owned private.get_public_inventory_storefront RPC. Public storefronts receive short CDN cache headers. Private storefronts require a valid storefront/inventory app-session token or browser Supabase session plus workspace membership, and never expose private inventory tables directly to browser code.
      security:
        - {}
        - AppSessionBearer: []
        - AppSessionCookie: []
        - SupabaseBearer: []
        - SupabaseBrowserSessionCookie: []
      responses:
        "200":
          description: Public storefront payload, including storefront metadata and commerce content.
          headers:
            Cache-Control:
              schema:
                type: string
                examples:
                  - public, s-maxage=60, stale-while-revalidate=300
                  - private, no-store
          content:
            application/json:
              schema:
                type: object
                required:
                  - storefront
                additionalProperties: true
                properties:
                  storefront:
                    type: object
                    additionalProperties: true
        "401":
          description: Private storefront requires a valid app-session or browser Supabase session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactUnauthorized"
        "403":
          description: Caller is authenticated but is not a workspace member for the private storefront.
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    examples:
