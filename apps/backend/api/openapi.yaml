        "400":
          description: Invalid profile payload or no valid fields to update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactValidationError"
        "403":
          description: Cookie-authenticated mutation did not include same-origin confirmation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSameOriginRequired"
        "411":
          $ref: "#/components/responses/RequestBodyLengthRequired"
        "413":
          $ref: "#/components/responses/RequestBodyTooLarge"
        "401":
          description: Missing or invalid app-session token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactUnauthorized"
        "503":
          description: App coordination secret or contact data adapter configuration is missing.
