            Access-Control-Max-Age:
              schema:
                type: string
                examples:
                  - "86400"
  /api/v1/auth/otp/send:
    options:
      summary: Legacy OTP send CORS preflight
      description: Method-level migrated replacement for the OPTIONS export in apps/web/src/app/api/v1/auth/otp/send/route.ts. POST remains legacy-owned until OTP send side effects move behind the Rust backend.
      responses:
        "204":
