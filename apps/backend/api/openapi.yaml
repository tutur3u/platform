  /api/v1/workspaces/{wsId}/external-projects/webgl-packages/upload:
    options:
      summary: Legacy WebGL package upload preflight
      description: Method-level migrated replacement for the OPTIONS export in apps/web/src/app/api/v1/workspaces/[wsId]/external-projects/webgl-packages/upload/route.ts. Allowed CMS origins receive credentialed PUT CORS headers; missing, malformed, or untrusted origins still receive the legacy bare empty 204 response. PUT remains legacy-owned until protected upload validation, storage signing, and streaming upload move behind the Rust backend.
      parameters:
        - name: wsId
          in: path
          required: true
          schema:
            type: string
          description: Workspace identifier or alias.
      responses:
        "204":
          description: Empty preflight response. Credentialed CMS CORS headers are present only when Origin matches an allowed static or configured CMS origin.
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                examples:
                  - https://cms.tuturuuu.com
            Access-Control-Allow-Credentials:
              schema:
                type: string
                examples:
                  - "true"
            Access-Control-Allow-Methods:
              schema:
                type: string
                examples:
                  - PUT, OPTIONS
            Access-Control-Allow-Headers:
              schema:
                type: string
                examples:
                  - Authorization, Content-Type
            Vary:
              schema:
                type: string
                examples:
                  - Origin
  /api/v1/infrastructure/migrate/grouped-score-names:
