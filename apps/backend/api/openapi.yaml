components:
  securitySchemes:
    AppSessionBearer:
      type: http
      scheme: bearer
      description: Tuturuuu-managed app-session JWT with `ttr_app_` prefix, HS256 signature, `internal-app:session` scope, and an accepted current-user target app.
    AppSessionCookie:
      type: apiKey
      in: cookie
      name: tuturuuu_app_session
      description: Tuturuuu-managed app-session cookie. Mutating routes also require same-origin Origin or Referer confirmation.
    BackendInternalToken:
      type: http
      scheme: bearer
      description: Server-only BACKEND_INTERNAL_TOKEN configured through Cloudflare secrets or local environment variables.
    CronBearer:
      type: http
      scheme: bearer
      description: CRON_SECRET or VERCEL_CRON_SECRET configured through Cloudflare secrets or local environment variables.
  responses:
    RequestBodyLengthRequired:
      description: Buffered JSON mutations require Content-Length so the Rust backend can enforce the 64 KiB body limit before reading.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RequestBodyLengthRequiredError"
    RequestBodyTooLarge:
      description: Buffered JSON request body exceeded the Rust backend 64 KiB limit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RequestBodyTooLargeError"
  schemas:
    RequestBodyLengthRequiredError:
      type: object
      required:
        - error
        - maxBytes
      properties:
        error:
          type: string
          enum:
            - request body content length required
        maxBytes:
          type: integer
          enum:
            - 65536
    RequestBodyTooLargeError:
      type: object
      required:
        - error
        - maxBytes
      properties:
        error:
          type: string
          enum:
            - request body too large
        maxBytes:
          type: integer
          enum:
            - 65536
    LegacyHealth:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    CalendarMockEvent:
      type: object
      required:
        - id
        - title
        - start_at
        - end_at
      properties:
        id:
          type: integer
          examples:
            - 1
        title:
          type: string
          examples:
            - Event 1
        start_at:
          type: string
          format: date-time
          examples:
            - "2023-10-01T10:00:00Z"
        end_at:
          type: string
          format: date-time
          examples:
            - "2023-10-01T11:00:00Z"
    CalendarMockResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CalendarMockEvent"
    VietnameseHoliday:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        name:
          type: string
        year:
          type: integer
    HolidaysError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - Error fetching holidays
    CrawlerUncrawledUrl:
      type: object
      required:
        - created_at
        - origin_id
        - skipped
        - url
      properties:
        created_at:
          type: string
          format: date-time
        origin_id:
          type: string
        origin_url:
          type: string
        skipped:
          type: boolean
        url:
          type: string
    CronUnauthorized:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
          enum:
            - false
    CronConfigurationError:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: string
          enum:
            - CRON_SECRET or VERCEL_CRON_SECRET is not set
            - DISCORD_APP_DEPLOYMENT_URL is not set
    DiscordCronInvalidJson:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: string
          enum:
            - Invalid JSON from Discord app
    DiscordCronRequestFailed:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: string
          enum:
            - Discord app request failed
    UserFieldType:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          enum:
            - TEXT
            - NUMBER
            - BOOLEAN
            - DATE
            - DATETIME
    UserFieldTypes:
      type: array
      minItems: 5
      maxItems: 5
      items:
        $ref: "#/components/schemas/UserFieldType"
    CurrentUserProfile:
      type: object
      required:
        - id
        - email
        - display_name
        - avatar_url
        - full_name
        - new_email
        - created_at
        - default_workspace_id
      properties:
        id:
          type: string
          examples:
            - app-session-user-1
        email:
          type:
            - string
            - "null"
          format: email
          examples:
            - app-session@example.com
        display_name:
          type:
            - string
            - "null"
        avatar_url:
          type:
            - string
            - "null"
          format: uri
        full_name:
          type:
            - string
            - "null"
        new_email:
          type:
            - string
            - "null"
          format: email
        created_at:
          type: string
          format: date-time
          examples:
            - "1970-01-01T00:00:00.000Z"
        default_workspace_id:
          type:
            - string
            - "null"
    PatchCurrentUserProfileRequest:
      type: object
      additionalProperties: false
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 100
        bio:
          type:
            - string
            - "null"
          maxLength: 1000
        avatar_url:
          type:
            - string
            - "null"
          format: uri
    ProfileUpdateResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          enum:
            - Profile updated successfully
    CreateSupportInquiryRequest:
      type: object
      required:
        - name
        - email
        - type
        - product
        - subject
        - message
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 320
        type:
          type: string
          enum:
            - bug
            - feature-request
            - support
            - job-application
        product:
          type: string
          enum:
            - web
            - nova
            - rewise
            - calendar
            - finance
            - tudo
            - tumeet
            - shortener
            - qr
            - drive
            - mail
            - other
        subject:
          type: string
          minLength: 5
          maxLength: 255
        message:
          type: string
          minLength: 10
          maxLength: 5000
    CreateSupportInquiryResponse:
      type: object
      required:
        - success
        - inquiryId
      properties:
        success:
          type: boolean
          enum:
            - true
        inquiryId:
          type: string
          examples:
            - support-inquiry-123
    ContactUnauthorized:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - Unauthorized
            - App session target mismatch
    AppSessionConfigurationError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - App coordination secret is not configured
    ContactSameOriginRequired:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - Support inquiry creation requires same-origin confirmation
    ContactValidationError:
      type: object
      required:
        - errors
        - message
      properties:
        errors:
          type: array
          items:
            type: string
