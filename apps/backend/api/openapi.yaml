  /healthz:
    get:
      summary: Backend liveness probe
      responses:
        "200":
          description: Backend is running.
  /readyz:
    get:
      summary: Backend readiness probe
      responses:
        "200":
          description: Backend is ready to accept protected internal work.
        "503":
          description: Backend is missing required internal configuration.
  /api/migration/status:
    get:
      summary: TanStack migration backend status
      description: Returns the Rust-owned status contract consumed by apps/tanstack-web. Requires the internal backend bearer token because the response discloses deployment and route-ownership metadata.
      security:
        - BackendInternalToken: []
      responses:
        "200":
          description: Migration backend status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationStatus"
        "401":
          description: Missing or invalid backend internal bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalAuthorizationError"
        "503":
          description: Backend internal token is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalConfigurationError"
        "405":
          description: Unsupported HTTP method.
  /api/migration/manifest:
    get:
      summary: Checked TanStack route migration manifest
      description: Returns the checked route inventory from apps/tanstack-web/migration/route-manifest.json. Requires the internal backend bearer token because entries include legacy source file paths.
      security:
        - BackendInternalToken: []
      responses:
        "200":
          description: Route migration manifest.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteMigrationManifest"
        "401":
          description: Missing or invalid backend internal bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalAuthorizationError"
        "503":
          description: Backend internal token is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalConfigurationError"
        "405":
          description: Unsupported HTTP method.
  /api/migration/cutover-gates:
    get:
      summary: TanStack and Rust cutover gates
      description: Returns backend-owned cutover gates derived from the route migration manifest plus required external evidence placeholders. Requires the internal backend bearer token.
      security:
        - BackendInternalToken: []
      responses:
        "200":
          description: Cutover gate status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationCutoverGates"
        "401":
          description: Missing or invalid backend internal bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalAuthorizationError"
        "503":
          description: Backend internal token is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalConfigurationError"
        "405":
          description: Unsupported HTTP method.
  /api/migration/progress:
    get:
      summary: TanStack and Rust route ownership progress
      description: Returns migration progress grouped by target owner and route kind, with representative remaining legacy artifacts. Requires the internal backend bearer token because entries include legacy source file paths.
      security:
        - BackendInternalToken: []
      responses:
        "200":
          description: Route ownership migration progress.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationProgress"
        "401":
          description: Missing or invalid backend internal bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalAuthorizationError"
        "503":
          description: Backend internal token is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalConfigurationError"
        "405":
          description: Unsupported HTTP method.
components:
  securitySchemes:
    AppSessionBearer:
      type: http
      scheme: bearer
      description: Tuturuuu-managed app-session JWT with `ttr_app_` prefix, HS256 signature, `internal-app:session` scope, and an accepted current-user target app.
    AppSessionCookie:
      type: apiKey
      in: cookie
      name: tuturuuu_app_session
      description: Tuturuuu-managed app-session cookie. Mutating routes also require same-origin Origin or Referer confirmation.
    BackendInternalToken:
      type: http
      scheme: bearer
      description: Server-only BACKEND_INTERNAL_TOKEN configured through Cloudflare secrets or local environment variables.
  schemas:
    LegacyHealth:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    CalendarMockEvent:
      type: object
      required:
        - id
        - title
        - start_at
        - end_at
      properties:
        id:
          type: integer
          examples:
            - 1
        title:
          type: string
          examples:
            - Event 1
        start_at:
          type: string
          format: date-time
          examples:
            - "2023-10-01T10:00:00Z"
        end_at:
          type: string
          format: date-time
          examples:
            - "2023-10-01T11:00:00Z"
    CalendarMockResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CalendarMockEvent"
    UserFieldType:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          enum:
            - TEXT
            - NUMBER
            - BOOLEAN
            - DATE
            - DATETIME
    UserFieldTypes:
      type: array
      minItems: 5
      maxItems: 5
      items:
        $ref: "#/components/schemas/UserFieldType"
    CurrentUserProfile:
      type: object
      required:
        - id
        - email
        - display_name
        - avatar_url
        - full_name
        - new_email
        - created_at
        - default_workspace_id
      properties:
        id:
          type: string
          examples:
            - app-session-user-1
        email:
          type:
            - string
            - "null"
          format: email
          examples:
            - app-session@example.com
        display_name:
          type:
            - string
            - "null"
        avatar_url:
          type:
            - string
            - "null"
          format: uri
        full_name:
          type:
            - string
            - "null"
        new_email:
          type:
            - string
            - "null"
          format: email
        created_at:
          type: string
          format: date-time
          examples:
            - "1970-01-01T00:00:00.000Z"
        default_workspace_id:
          type:
            - string
            - "null"
    CreateSupportInquiryRequest:
      type: object
      required:
        - name
        - email
        - type
        - product
        - subject
        - message
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 320
        type:
          type: string
          enum:
            - bug
            - feature-request
            - support
            - job-application
        product:
          type: string
          enum:
            - web
            - nova
            - rewise
            - calendar
            - finance
            - tudo
            - tumeet
            - shortener
            - qr
            - drive
            - mail
            - other
        subject:
          type: string
          minLength: 5
          maxLength: 255
        message:
          type: string
          minLength: 10
          maxLength: 5000
    ContactUnauthorized:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - Unauthorized
            - App session target mismatch
    AppSessionConfigurationError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - App coordination secret is not configured
    ContactSameOriginRequired:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - Support inquiry creation requires same-origin confirmation
    ContactValidationError:
      type: object
      required:
        - errors
        - message
      properties:
        errors:
          type: array
          items:
            type: string
        message:
          type: string
          examples:
            - Invalid request body
    ContactDataLayerNotReady:
      type: object
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
          enum:
            - CONTACT_DATA_LAYER_NOT_READY
        message:
          type: string
          examples:
            - Rust contact data persistence is not configured yet
        requestId:
          type: string
          examples:
            - rust-abc123
    BrowserStateRecoveryForbidden:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          examples:
            - Browser state reset requires same-origin confirmation
    GroupedScoreNamesMigrationDisabled:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          enum:
            - MIGRATION_DISABLED
        message:
          type: string
          examples:
            - Grouped score names migration is no longer available. The user_group_indicators table was removed in a recent database migration.
    InfrastructureMigrationForbidden:
      type: object
      required:
        - error
        - hint
        - message
      properties:
        error:
          type: string
          enum:
            - Forbidden
        hint:
          type: string
          examples:
            - These routes are intended for internal data migration and should not be used in production.
        message:
          type: string
          examples:
            - Infrastructure migration routes are only accessible in development mode
    InternalAuthorizationError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - unauthorized
    InternalConfigurationError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - backend internal token is not configured
    PreferenceSuccess:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          enum:
            - Success
    PreferenceValidationError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - Locale is required
            - Locale is not supported
            - Collapse is required
            - Sizes is required
    NotImplemented:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          enum:
            - Not implemented
    DisabledGroupCheckEmail:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          enum:
            - Direct post email sending has been removed. Emails are now sent by the system queue after approval.
    RouteManifestSummary:
      type: object
      required:
        - apiRoutes
        - cronRoutes
        - layouts
        - methodCounts
        - pages
        - routeHandlers
        - total
      properties:
        apiRoutes:
          type: integer
          minimum: 0
        cronRoutes:
          type: integer
          minimum: 0
        layouts:
          type: integer
          minimum: 0
        methodCounts:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
          properties:
            GET:
              type: integer
              minimum: 0
            HEAD:
              type: integer
              minimum: 0
            POST:
              type: integer
              minimum: 0
            PUT:
              type: integer
              minimum: 0
            PATCH:
              type: integer
              minimum: 0
            DELETE:
              type: integer
              minimum: 0
            OPTIONS:
              type: integer
              minimum: 0
        pages:
          type: integer
          minimum: 0
        routeHandlers:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
    RouteMigrationManifest:
      type: object
      required:
        - generatedBy
        - progress
        - routes
        - summary
      properties:
        generatedBy:
          type: string
        progress:
          $ref: "#/components/schemas/RouteManifestProgress"
        routes:
          type: array
          items:
            type: object
            required:
              - id
              - kind
              - methods
              - routePath
              - sourceFile
              - status
              - targetOwner
            properties:
              id:
                type: string
              kind:
                type: string
              method:
                type: string
                enum:
                  - GET
                  - HEAD
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
              methods:
                type: array
                items:
                  type: string
                  enum:
                    - GET
                    - HEAD
                    - POST
                    - PUT
                    - PATCH
                    - DELETE
                    - OPTIONS
              parentId:
                type: string
              routePath:
                type: string
              sourceFile:
                type: string
              status:
                type: string
                enum:
                  - legacy-next
                  - migrated
                  - accepted-removal
              targetOwner:
                type: string
                enum:
                  - rust-backend
                  - tanstack-start
        summary:
          $ref: "#/components/schemas/RouteManifestSummary"
    RouteManifestProgressBucket:
      type: object
      required:
        - acceptedRemoval
        - key
        - label
        - legacyNext
        - migrated
        - percentComplete
        - remaining
        - terminal
        - total
        - unknownStatus
      properties:
        acceptedRemoval:
          type: integer
          minimum: 0
        key:
          type: string
        label:
          type: string
        legacyNext:
          type: integer
          minimum: 0
        migrated:
          type: integer
          minimum: 0
        percentComplete:
          type: number
          minimum: 0
          maximum: 100
        remaining:
          type: integer
          minimum: 0
        terminal:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
        unknownStatus:
          type: integer
          minimum: 0
    RouteManifestProgressRoute:
      type: object
      required:
        - kind
        - methods
        - routePath
        - sourceFile
        - status
        - targetOwner
      properties:
        id:
          type: string
        kind:
          type: string
        method:
          type: string
          enum:
            - GET
            - HEAD
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
        methods:
          type: array
          items:
            type: string
            enum:
              - GET
              - HEAD
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
        parentId:
          type: string
        routePath:
          type: string
        sourceFile:
          type: string
        status:
          type: string
          enum:
            - legacy-next
            - migrated
            - accepted-removal
        targetOwner:
          type: string
          enum:
            - rust-backend
            - tanstack-start
    RouteManifestProgress:
      type: object
      required:
        - byKind
        - byOwner
        - topLegacyRoutes
        - totals
      properties:
        byKind:
          type: array
          items:
            $ref: "#/components/schemas/RouteManifestProgressBucket"
        byOwner:
          type: array
          items:
            $ref: "#/components/schemas/RouteManifestProgressBucket"
        topLegacyRoutes:
          type: array
          items:
            $ref: "#/components/schemas/RouteManifestProgressRoute"
        totals:
          $ref: "#/components/schemas/RouteManifestProgressBucket"
    MigrationProgress:
      type: object
      required:
        - generatedBy
        - manifest
        - ok
        - progress
        - summary
      properties:
        generatedBy:
          type: string
        manifest:
          type: string
          examples:
            - apps/tanstack-web/migration/route-manifest.json
        ok:
          type: boolean
        progress:
          $ref: "#/components/schemas/RouteManifestProgress"
        summary:
          $ref: "#/components/schemas/RouteManifestSummary"
    MigrationCutoverGates:
      type: object
      required:
        - counts
        - gates
        - generatedBy
        - manifest
        - ok
        - summary
      properties:
        counts:
          type: object
          required:
            - acceptedRemoval
            - backendOwned
            - backendRouteArtifacts
            - frontendOwned
            - legacyNext
            - migrated
            - total
            - unknownStatus
            - unmapped
          properties:
            acceptedRemoval:
              type: integer
              minimum: 0
            backendOwned:
              type: integer
              minimum: 0
            backendRouteArtifacts:
              type: integer
              minimum: 0
            frontendOwned:
              type: integer
              minimum: 0
            legacyNext:
              type: integer
              minimum: 0
            migrated:
              type: integer
              minimum: 0
            total:
              type: integer
              minimum: 0
            unknownStatus:
              type: integer
              minimum: 0
            unmapped:
              type: integer
              minimum: 0
        gates:
          type: array
          items:
            type: object
            required:
              - detail
              - id
              - label
              - ok
              - status
            properties:
              detail:
                type: string
              id:
                type: string
              label:
                type: string
              ok:
                type: boolean
              status:
                type: string
                enum:
                  - pass
                  - blocked
        generatedBy:
          type: string
        manifest:
          type: string
          examples:
            - apps/tanstack-web/migration/route-manifest.json
        ok:
          type: boolean
        summary:
          $ref: "#/components/schemas/RouteManifestSummary"
    MigrationStatus:
      type: object
      required:
        - backend
        - contactData
        - environment
        - frontendTargets
        - ok
        - routeOwnership
      properties:
        backend:
          type: object
          required:
            - deploymentTarget
            - runtime
            - service
            - toolchain
          properties:
            deploymentTarget:
              type: string
              examples:
                - container
                - cloudflare-workers
            runtime:
              type: string
              examples:
                - rust
            service:
              type: string
              examples:
                - backend
            toolchain:
              type: string
              examples:
                - rustc 1.95.0
        contactData:
          $ref: "#/components/schemas/ContactDataLayerStatus"
        environment:
          type: string
          examples:
            - development
        frontendTargets:
          type: array
          items:
            type: string
            enum:
              - next
              - tanstack-start
        ok:
          type: boolean
        routeOwnership:
          type: object
          required:
            - legacyAllowed
            - manifest
            - status
          properties:
            legacyAllowed:
              type: boolean
            manifest:
              type: string
              examples:
                - apps/tanstack-web/migration/route-manifest.json
            status:
              type: string
              examples:
                - migration-foundation
    ContactDataLayerStatus:
      type: object
      required:
        - configured
        - missing
        - supabaseOrigin
      properties:
        configured:
          type: boolean
          description: True only when the Rust backend has a valid Supabase URL and service-role credential configured for the contact data adapter.
        missing:
          type: array
          items:
            type: string
            enum:
              - SUPABASE_URL
              - SUPABASE_SERVICE_ROLE_KEY
          description: Logical settings still required before the Rust contact data adapter can own profile hydration and inquiry persistence.
        supabaseOrigin:
          type:
            - string
            - "null"
          examples:
            - https://project-ref.supabase.co
