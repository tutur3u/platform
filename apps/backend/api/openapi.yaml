            Cache-Control:
              schema:
                type: string
                examples:
                  - no-store, no-cache, must-revalidate
            CDN-Cache-Control:
              schema:
                type: string
                examples:
                  - no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserProfile"
        "401":
          description: Missing or invalid app-session token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactUnauthorized"
        "503":
          description: App coordination secret or contact data adapter configuration is missing.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AppSessionConfigurationError"
                  - $ref: "#/components/schemas/ContactDataLayerNotReady"
        "500":
          description: Supabase profile read failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactServerError"
        "405":
          description: Unsupported HTTP method.
          headers:
            Allow:
              schema:
                type: string
                examples:
                  - GET, PATCH
    patch:
      summary: Update current user profile
      description: >
        Migrated profile mutation. Authenticates the same app-session sources as
        GET, enforces same-origin confirmation for cookie-authenticated
        mutations, validates the legacy display_name/bio/avatar_url JSON shape,
        and updates the users row through the server-owned Supabase REST adapter.
      security:
        - AppSessionBearer: []
        - AppSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchCurrentUserProfileRequest"
      responses:
        "200":
          description: Profile updated successfully.
          content:
            application/json:
              schema:
