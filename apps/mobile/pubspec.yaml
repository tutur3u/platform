name: mobile
description: Tuturuuu Mobile
version: 0.2.8+24
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ^3.41.0

dependencies:
  bloc: ^9.2.0
  cached_network_image: ^3.4.1
  camera: ^0.12.0+1
  cloudflare_turnstile: ^3.6.2
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.9
  device_info_plus: ^12.4.0
  equatable: ^2.0.8
  file_picker: ^10.3.10
  firebase_analytics: ^12.2.0
  firebase_core: ^4.6.0
  firebase_crashlytics: ^5.1.0
  firebase_messaging: ^16.1.3
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_colorpicker: ^1.1.0
  flutter_inappwebview: ^6.1.5
  flutter_local_notifications: ^21.0.0
  flutter_localizations:
    sdk: flutter
  flutter_markdown: ^0.7.7+1
  flutter_native_splash: ^2.4.7
  flutter_pcm_sound: ^3.3.3
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  flutter_timezone: ^5.0.2
  go_router: ^17.1.0
  google_sign_in: ^7.2.0
  hive: ^2.2.3
  http: ^1.6.0
  http_parser: ^4.1.2
  image: ^4.8.0
  image_cropper: ^12.1.1
  image_picker: ^1.2.1
  intl: ^0.20.2
  json_annotation: ^4.11.0
  lucide_icons: ^0.257.0
  markdown: ^7.3.1
  mime: ^2.0.0
  package_info_plus: ^9.0.1
  path_provider: ^2.1.5
  path_provider_foundation: 2.5.1
  permission_handler: ^12.0.1
  record: ^6.2.0
  shadcn_flutter: ^0.0.52
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.12.2
  url_launcher: ^6.3.2
  web_socket_channel: ^3.0.3

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  json_serializable: ^6.13.1
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

dependency_overrides:
  flutter_pcm_sound:
    path: vendor/flutter_pcm_sound

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  image_path_ios: assets/app_icon.png
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logos/light.png
    - assets/mermaid/mermaid.min.js
    - assets/logos/nova-transparent.png
    - assets/logos/transparent.png
    - assets/logos/apple.svg
    - assets/logos/google-logo.png
    - assets/logos/google.svg
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans.ttf
