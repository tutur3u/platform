# Bun configuration
# We use Vitest for testing via Turborepo

[test]
# Redirect to turbo test runner
preload = ["./tests/bun-test-redirect.ts"]

[install]
# Explicitly set the linker to isolated
linker = "isolated"
# Require npm releases to be at least 1 hour old before Bun can install them
# minimumReleaseAge = 3600
