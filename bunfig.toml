# Bun configuration
# We use Vitest for testing via Turborepo

[test]
# Redirect to turbo test runner
preload = ["./tests/bun-test-redirect.ts"]

[install]
# Explicitly set the linker to isolated
linker = "isolated"
# Require npm releases to be at least 1 day old before Bun can install them
minimumReleaseAge = 86400
minimumReleaseAgeExcludes = [
  # Vercel maintains Next.js and publishes its framework packages together.
  # Bun currently matches exact package names here, so keep this list aligned
  # with every @next package present in bun.lock.
  "next",
  "@next/bundle-analyzer",
  "@next/env",
  "@next/playwright",
  "@next/swc-darwin-arm64",
  "@next/swc-darwin-x64",
  "@next/swc-linux-arm64-gnu",
  "@next/swc-linux-arm64-musl",
  "@next/swc-linux-x64-gnu",
  "@next/swc-linux-x64-musl",
  "@next/swc-win32-arm64-msvc",
  "@next/swc-win32-x64-msvc",
  # Vercel also maintains the AI SDK packages, which are released in sync.
  # Keep this exact-name list aligned with every @ai-sdk package in bun.lock.
  "ai",
  "@ai-sdk/amazon-bedrock",
  "@ai-sdk/anthropic",
  "@ai-sdk/azure",
  "@ai-sdk/cerebras",
  "@ai-sdk/cohere",
  "@ai-sdk/deepgram",
  "@ai-sdk/deepinfra",
  "@ai-sdk/deepseek",
  "@ai-sdk/elevenlabs",
  "@ai-sdk/fal",
  "@ai-sdk/fireworks",
  "@ai-sdk/gateway",
  "@ai-sdk/gladia",
  "@ai-sdk/google",
  "@ai-sdk/google-vertex",
  "@ai-sdk/groq",
  "@ai-sdk/hume",
  "@ai-sdk/lmnt",
  "@ai-sdk/luma",
  "@ai-sdk/mcp",
  "@ai-sdk/mistral",
  "@ai-sdk/openai",
  "@ai-sdk/openai-compatible",
  "@ai-sdk/perplexity",
  "@ai-sdk/provider",
  "@ai-sdk/provider-utils",
  "@ai-sdk/react",
  "@ai-sdk/replicate",
  "@ai-sdk/revai",
  "@ai-sdk/togetherai",
  "@ai-sdk/xai",
  # next-intl's first-party packages are maintained and released together.
  "next-intl",
  "next-intl-swc-plugin-extractor",
  "use-intl",
  # Lucide's first-party packages are trusted and published together.
  "@lucide/lab",
  "lucide-react",
  "lucide-static",
  # Cloudflare's developer platform packages are trusted and versioned together.
  "@cloudflare/kv-asset-handler",
  "@cloudflare/unenv-preset",
  "@cloudflare/vite-plugin",
  "@cloudflare/workerd-darwin-64",
  "@cloudflare/workerd-darwin-arm64",
  "@cloudflare/workerd-linux-64",
  "@cloudflare/workerd-linux-arm64",
  "@cloudflare/workerd-windows-64",
  "miniflare",
  "workerd",
  "wrangler",
  "typescript",
  "@typescript/typescript-aix-ppc64",
  "@typescript/typescript-darwin-arm64",
  "@typescript/typescript-darwin-x64",
  "@typescript/typescript-freebsd-arm64",
  "@typescript/typescript-freebsd-x64",
  "@typescript/typescript-linux-arm",
  "@typescript/typescript-linux-arm64",
  "@typescript/typescript-linux-loong64",
  "@typescript/typescript-linux-mips64el",
  "@typescript/typescript-linux-ppc64",
  "@typescript/typescript-linux-riscv64",
  "@typescript/typescript-linux-s390x",
  "@typescript/typescript-linux-x64",
  "@typescript/typescript-netbsd-arm64",
  "@typescript/typescript-netbsd-x64",
  "@typescript/typescript-openbsd-arm64",
  "@typescript/typescript-openbsd-x64",
  "@typescript/typescript-sunos-x64",
  "@typescript/typescript-win32-arm64",
  "@typescript/typescript-win32-x64",
]
